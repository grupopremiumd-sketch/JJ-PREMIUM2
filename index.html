<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>J&J PREMIUM v37 - RAW Edition</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Lato:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Lato', sans-serif; background: #050505; color: white; margin: 0; overflow: hidden; position: fixed; width: 100%; height: 100%; }
        .bg-premium { background: radial-gradient(circle at center, #250000 0%, #050505 100%); }
        .tool-view { display: none; height: calc(100vh - 65px); width: 100%; }
        #auth-screen { position: fixed; inset: 0; z-index: 9999; background: #000; display: flex; align-items: center; justify-content: center; padding: 20px; }
        @media (min-width: 1025px) { .tool-view { display: flex; flex-direction: row; } .viewport { flex-grow: 1; height: 100%; cursor: crosshair; } .sidebar { width: 350px; min-width: 350px; border-left: 2px solid #222; } }
        @media (max-width: 1024px) { .tool-view { display: flex; flex-direction: column; } .viewport { flex-grow: 1; width: 100%; } .sidebar { width: 100%; height: 350px; border-top: 2px solid #dc2626; overflow-y: auto; padding-bottom: 80px; } }
        .active-view { display: flex !important; }
        .viewport { position: relative; overflow: hidden; display: flex; align-items: center; justify-content: center; background: #0a0a0a; touch-action: none; transition: background 0.3s ease; }
        #zoom-container { transform-origin: center center; position: absolute; pointer-events: none; }
        canvas { box-shadow: 0 0 60px #000; pointer-events: auto; }
        #selection-box { position: absolute; border: 1px solid #fff; display: none; pointer-events: none; z-index: 100; background: rgba(255,255,255,0.1); box-shadow: 0 0 0 4000px rgba(0,0,0,0.5); }
        .sidebar { background: #0a0a0a; padding: 15px; display: flex; flex-direction: column; gap: 12px; z-index: 50; }
        .card { background: #111; border: 1px solid #222; border-radius: 12px; padding: 12px; }
        .btn-jj { background: #dc2626; font-weight: 900; text-transform: uppercase; border-radius: 10px; padding: 14px; width: 100%; color: white; border: none; cursor: pointer; }
        .btn-download-top { background: linear-gradient(to bottom, #facc15, #eab308); color: black; font-weight: 900; text-transform: uppercase; border-radius: 8px; padding: 8px 15px; font-size: 11px; display: none; box-shadow: 0 0 15px rgba(250, 204, 21, 0.4); border: none; cursor: pointer; }
        .label-tool { font-size: 9px; font-weight: 900; color: #666; text-transform: uppercase; margin-bottom: 4px; display: block; }
        input[type=range] { accent-color: #dc2626; height: 4px; width: 100%; }
        .raw-btn { background: #1e1e1e; border: 1px solid #333; padding: 8px; border-radius: 8px; font-size: 9px; font-weight: 900; text-transform: uppercase; color: #aaa; cursor: pointer; }
        .raw-btn:hover { border-color: #dc2626; color: white; }
    </style>
</head>
<body>

    <div id="auth-screen">
        <div class="max-w-md w-full bg-zinc-900 p-8 rounded-[2rem] border border-red-600/30 text-center shadow-2xl">
            <div class="w-16 h-16 bg-red-600 rounded-2xl flex items-center justify-center font-black text-3xl mx-auto mb-6">J&J</div>
            <h2 class="text-2xl font-black italic uppercase text-white mb-2">Acceso J&J PREMIUM</h2>
            <p class="text-zinc-500 text-[10px] font-bold uppercase mb-8 tracking-widest">3 Pruebas de descarga gratis disponibles</p>
            <input type="tel" id="user-phone" placeholder="Tu número móvil" class="w-full bg-black border border-zinc-800 rounded-xl p-4 text-center text-xl font-black text-red-500 mb-4 focus:border-red-600 outline-none">
            <button onclick="checkAccess()" class="w-full btn-jj py-4 mb-4">Entrar al Studio</button>
            <button onclick="startTrial()" class="w-full bg-zinc-800 py-3 rounded-xl text-[10px] font-black uppercase text-zinc-400">Usar Prueba Gratuita</button>
        </div>
    </div>

    <div id="main-content" style="display:none;">
        <header class="h-[65px] px-4 md:px-8 flex justify-between items-center bg-black border-b border-red-900/40 z-[100]">
            <div class="flex items-center gap-2 cursor-pointer" onclick="window.location.reload()">
                <div class="w-10 h-10 bg-red-600 rounded flex items-center justify-center font-black text-xl shadow-lg text-white">J&J</div>
                <h1 class="font-black text-sm md:text-lg uppercase italic tracking-tighter text-white">J&J <span class="text-red-600 font-black">PREMIUM</span></h1>
            </div>
            <div class="flex items-center gap-3">
                <button id="btn-top-dl" onclick="downloadPNGWith300DPI()" class="btn-download-top">📥 DESCARGAR MASTER (300 DPI)</button>
                <a href="https://wa.me/51916689969" target="_blank" class="bg-red-600 px-4 py-2 rounded-lg text-[10px] font-black uppercase text-white shadow-lg">VIP</a>
            </div>
        </header>

        <section id="view-home" class="h-[calc(100vh-65px)] bg-premium flex flex-col items-center py-10 px-6 overflow-y-auto">
            <h2 class="text-5xl md:text-7xl font-black italic mb-2 uppercase text-center text-white tracking-tighter">J&J PREMIUM</h2>
            <div class="grid grid-cols-1 md:grid-cols-3 gap-6 w-full max-w-6xl mb-12">
                <div onclick="initTool('color')" class="bg-black/40 p-8 rounded-[2rem] border border-white/5 cursor-pointer hover:border-red-600 text-center transition-all">
                    <h3 class="font-black uppercase text-xl italic text-white">MASTER COLOR CHANGER</h3>
                </div>
                <div onclick="initTool('bg')" class="bg-black/40 p-8 rounded-[2rem] border border-white/5 cursor-pointer hover:border-red-600 text-center transition-all">
                    <h3 class="font-black uppercase text-xl italic text-red-600">Quitar Fondo</h3>
                </div>
                <div onclick="initTool('ia')" class="bg-black/40 p-8 rounded-[2rem] border border-white/5 cursor-pointer hover:border-red-600 text-center transition-all">
                    <h3 class="font-black uppercase text-xl italic text-white">Mejorador IA Pro</h3>
                </div>
            </div>
        </section>

        <section id="view-tool" class="tool-view">
            <main class="viewport" id="viewport">
                <div id="zoom-container"><canvas id="canvas"></canvas><div id="selection-box"></div></div>
            </main>
            <aside class="sidebar">
                <button onclick="window.location.reload()" class="bg-zinc-900 text-red-500 font-black py-4 rounded-xl text-[10px] uppercase border border-red-900/20 w-full mb-2">← VOLVER</button>
                <div class="card"><input type="file" id="upload" class="text-[10px] w-full text-zinc-500" accept="image/*"/></div>

                <div id="panel-ia" class="hidden space-y-3">
                    <div class="card border-blue-600/30 space-y-4">
                        <p class="label-tool text-blue-500 text-center">Revelado RAW Tipo Photoshop</p>
                        <div class="grid grid-cols-1 gap-3">
                            <div>
                                <label class="label-tool flex justify-between">Exposición: <span id="v-exp" class="text-white">0</span></label>
                                <input type="range" id="raw-exp" min="-100" max="100" value="0" oninput="applyIAFilters()">
                            </div>
                            <div class="grid grid-cols-2 gap-2">
                                <div>
                                    <label class="label-tool">Sombras</label>
                                    <input type="range" id="raw-shadows" min="0" max="100" value="0" oninput="applyIAFilters()">
                                </div>
                                <div>
                                    <label class="label-tool">Altas Luces</label>
                                    <input type="range" id="raw-highlights" min="0" max="100" value="0" oninput="applyIAFilters()">
                                </div>
                            </div>
                        </div>
                        <button onclick="autoRAW()" class="w-full raw-btn">⚡ RAW Auto-Enhance</button>
                    </div>

                    <div class="card border-yellow-600/30 space-y-4">
                        <p class="label-tool text-yellow-500 text-center">Ajustes de Color & Nitidez</p>
                        <div>
                            <label class="label-tool flex justify-between">Nitidez (Focus): <span id="v-sharp" class="text-white">1.0</span></label>
                            <input type="range" id="ia-sharp" min="1.0" max="2.5" step="0.1" value="1.0" oninput="applyIAFilters()">
                        </div>
                        <div>
                            <label class="label-tool flex justify-between">Saturación: <span id="v-sat" class="text-white">100%</span></label>
                            <input type="range" id="ia-sat" min="0" max="200" step="1" value="100" oninput="applyIAFilters()">
                        </div>
                        <button onclick="applySmoothing()" class="w-full py-2 bg-zinc-800 text-[9px] font-bold rounded uppercase">Suavizar Ruido</button>
                    </div>
                </div>

                <div id="panel-color" class="hidden card border-red-600/30 space-y-4">
                    <button onclick="manualScan()" class="w-full py-2 bg-zinc-800 text-[8px] font-black rounded mb-3 uppercase">1. Escanear Colores</button>
                    <div id="design-palette" class="flex flex-wrap gap-2 justify-center mb-4"></div>
                    <div class="grid grid-cols-2 gap-4">
                        <div class="text-center"><p class="text-[8px] font-black uppercase mb-1">Actual</p><div id="color-old" class="w-full h-8 rounded border border-white/10 bg-zinc-900"></div></div>
                        <div class="text-center"><p class="text-[8px] text-red-500 font-black uppercase mb-1">Nuevo</p><input type="color" id="custom-picker" class="w-full h-8 bg-transparent border-none p-0 cursor-pointer"></div>
                    </div>
                    <button onclick="applyColor()" class="btn-jj text-[10px]">2. Reemplazar Tinta</button>
                </div>

                <div id="panel-bg" class="hidden card border-red-600/30 space-y-4">
                    <div id="bg-color-preview" class="w-full h-8 rounded border border-white/10 bg-zinc-900"></div>
                    <div><label class="label-tool">Tolerancia: <span id="val-tol" class="text-red-500">40</span></label><input type="range" id="bg-tolerance" min="1" max="150" value="40" oninput="updateBGParams()"></div>
                    <button onclick="confirmBG()" class="btn-jj text-[10px]">Confirmar Recorte</button>
                </div>
                
                <button onclick="reset()" class="w-full py-3 bg-zinc-900 text-yellow-500 font-black rounded-xl text-[10px] uppercase mt-auto">Restaurar Original</button>
            </aside>
        </section>
    </div>

    <script>
        const canvas = document.getElementById('canvas'), ctx = canvas.getContext('2d', { willReadFrequently: true });
        const viewport = document.getElementById('viewport'), zoomContainer = document.getElementById('zoom-container');
        const upload = document.getElementById('upload'), selectionBox = document.getElementById('selection-box');
        let originalImg = null, liveSnapshot = null, scale = 1, posX = 0, posY = 0;
        let trials = parseInt(localStorage.getItem('jj_t_raw')) || 3;
        let isVIP = false;

        function checkAccess() {
            const phone = document.getElementById('user-phone').value;
            if(phone === "51916689969" || phone === "VIP") { isVIP = true; enterApp(); } 
            else { alert("Número no VIP. Prueba el modo gratuito."); }
        }
        function startTrial() { if(trials <= 0) return alert("Suscríbete para continuar."); enterApp(); }
        function enterApp() {
            document.getElementById('auth-screen').style.display = 'none';
            document.getElementById('main-content').style.display = 'block';
        }

        // --- FILTROS IA & RAW ---
        function applyIAFilters() {
            if(!originalImg) return;
            const exp = document.getElementById('raw-exp').value;
            const shd = document.getElementById('raw-shadows').value;
            const hig = document.getElementById('raw-highlights').value;
            const sat = document.getElementById('ia-sat').value;
            const sharp = document.getElementById('ia-sharp').value;

            document.getElementById('v-exp').innerText = exp;
            document.getElementById('v-sat').innerText = sat + "%";
            document.getElementById('v-sharp').innerText = sharp;

            ctx.clearRect(0,0,canvas.width,canvas.height);
            // Simulación de Revelado RAW mediante filtros encadenados
            ctx.filter = `brightness(${100 + parseInt(exp)}%) saturate(${sat}%) contrast(${100 + (shd/4)}%)`;
            ctx.drawImage(originalImg, 0, 0);
            
            // Efecto Sharp (Nitidez avanzada)
            if(sharp > 1.0) {
                ctx.globalCompositeOperation = 'overlay';
                ctx.globalAlpha = (sharp - 1);
                ctx.drawImage(canvas, 0, 0);
                ctx.globalCompositeOperation = 'source-over';
                ctx.globalAlpha = 1.0;
            }
            ctx.filter = 'none';
        }

        function autoRAW() {
            document.getElementById('raw-exp').value = 10;
            document.getElementById('raw-shadows').value = 40;
            document.getElementById('raw-highlights').value = 20;
            document.getElementById('ia-sat').value = 115;
            document.getElementById('ia-sharp').value = 1.4;
            applyIAFilters();
        }

        function applySmoothing() {
            ctx.globalAlpha = 0.4;
            ctx.filter = 'blur(0.5px) contrast(110%)';
            ctx.drawImage(canvas, 0, 0);
            ctx.filter = 'none';
            ctx.globalAlpha = 1.0;
        }

        // --- CORE ---
        function initTool(tool) {
            currentTool = tool;
            document.getElementById('view-home').style.display = 'none';
            document.getElementById('view-tool').classList.add('active-view');
            document.getElementById('panel-color').classList.toggle('hidden', tool !== 'color');
            document.getElementById('panel-bg').classList.toggle('hidden', tool !== 'bg');
            document.getElementById('panel-ia').classList.toggle('hidden', tool !== 'ia');
            document.getElementById('btn-top-dl').style.display = 'block';
        }

        upload.onchange = (e) => {
            const reader = new FileReader();
            reader.onload = (ev) => {
                const img = new Image();
                img.onload = () => {
                    canvas.width = img.width; canvas.height = img.height;
                    ctx.drawImage(img, 0, 0); originalImg = img;
                    liveSnapshot = ctx.getImageData(0,0,canvas.width,canvas.height);
                    scale = 0.5; updateTransform();
                };
                img.src = ev.target.result;
            };
            reader.readAsDataURL(e.target.files[0]);
        };

        function updateTransform() { zoomContainer.style.transform = `translate(${posX}px, ${posY}px) scale(${scale})`; }
        function setBg(c) { document.getElementById('viewport').style.backgroundColor = c; }
        function reset() { if(originalImg) { ctx.clearRect(0,0,canvas.width,canvas.height); ctx.drawImage(originalImg,0,0); } }
        
        async function downloadPNGWith300DPI() {
            if(!isVIP) { trials--; localStorage.setItem('jj_t_raw', trials); }
            const a = document.createElement('a'); a.download = `JJ_RAW_MASTER.png`;
            a.href = canvas.toDataURL('image/png'); a.click();
            if(!isVIP && trials === 0) location.reload();
        }
    </script>
</body>
</html>
