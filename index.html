<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>J&J PREMIUM v46</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { font-family: 'Lato', sans-serif; background: #050505; color: white; margin: 0; overflow: hidden; position: fixed; width: 100%; height: 100%; }
        .bg-premium { background: radial-gradient(circle at center, #250000 0%, #050505 100%); }
        .tool-view { display: none; height: calc(100vh - 65px); width: 100%; }
        #auth-screen { position: fixed; inset: 0; z-index: 9999; background: #000; display: flex; align-items: center; justify-content: center; padding: 20px; }
        .active-view { display: flex !important; }
        .viewport { position: relative; overflow: hidden; display: flex; align-items: center; justify-content: center; background: #0a0a0a; touch-action: none; }
        #zoom-container { transform-origin: center center; position: absolute; pointer-events: none; will-change: transform; }
        canvas { box-shadow: 0 0 60px #000; pointer-events: auto; }
        .sidebar { background: #0a0a0a; padding: 15px; display: flex; flex-direction: column; gap: 12px; z-index: 50; border-left: 2px solid #222; width: 350px; }
        .btn-jj { background: #dc2626; font-weight: 900; text-transform: uppercase; border-radius: 10px; padding: 14px; width: 100%; color: white; border: none; cursor: pointer; }
        .card { background: #111; border: 1px solid #222; border-radius: 12px; padding: 12px; }
        @media (max-width: 1024px) { .tool-view { flex-direction: column; } .sidebar { width: 100%; height: auto; border-left: none; border-top: 2px solid #dc2626; } }
    </style>
</head>
<body>

    <div id="auth-screen">
        <div class="max-w-md w-full bg-zinc-900 p-8 rounded-[2rem] border border-red-600/30 text-center">
            <div class="w-16 h-16 bg-red-600 rounded-2xl flex items-center justify-center font-black text-3xl mx-auto mb-6">J&J</div>
            <h2 class="text-2xl font-black italic uppercase mb-2">Acceso J&J PREMIUM</h2>
            <input type="tel" id="user-phone" placeholder="Número registrado" class="w-full bg-black border border-zinc-800 rounded-xl p-4 text-center text-xl font-black text-red-500 mb-4 outline-none">
            <button onclick="checkAccess()" class="w-full btn-jj py-4 mb-4">Entrar</button>
            <button onclick="startTrial()" class="w-full bg-zinc-800 py-3 rounded-xl text-[10px] font-black uppercase text-zinc-400">Pruebas Gratis: <span id="trial-count-ui">2</span></button>
        </div>
    </div>

    <div id="main-content" style="display:none;">
        <header class="h-[65px] px-4 flex justify-between items-center bg-black border-b border-red-900/40">
            <div class="flex items-center gap-2 cursor-pointer" onclick="location.reload()">
                <div class="w-10 h-10 bg-red-600 rounded flex items-center justify-center font-black text-xl text-white">J&J</div>
                <h1 class="font-black uppercase italic text-white">J&J <span class="text-red-600">PREMIUM</span></h1>
            </div>
            <button onclick="download300DPI()" class="bg-yellow-500 text-black font-black text-[10px] px-4 py-2 rounded uppercase">📥 DESCARGAR 300 DPI</button>
        </header>

        <section id="view-home" class="h-[calc(100vh-65px)] bg-premium flex flex-col items-center py-10">
            <div class="grid grid-cols-1 md:grid-cols-3 gap-6 w-full max-w-5xl px-6">
                <div onclick="initTool('color')" class="bg-black/60 p-10 rounded-3xl border border-white/5 cursor-pointer hover:border-red-600 text-center transition-all">
                    <h3 class="font-black uppercase italic text-white">Extractor de Tintas</h3>
                </div>
                <div onclick="initTool('bg')" class="bg-black/60 p-10 rounded-3xl border border-white/5 cursor-pointer hover:border-red-600 text-center transition-all">
                    <h3 class="font-black uppercase italic text-red-600">Quitar Fondo</h3>
                </div>
                <div onclick="initTool('ia')" class="bg-black/60 p-10 rounded-3xl border border-white/5 cursor-pointer hover:border-red-600 text-center transition-all">
                    <h3 class="font-black uppercase italic text-white">Mejorador IA</h3>
                </div>
            </div>
        </section>

        <section id="view-tool" class="tool-view">
            <main class="viewport flex-grow h-full overflow-hidden" id="viewport">
                <div id="zoom-container"><canvas id="canvas"></canvas></div>
            </main>
            <aside class="sidebar">
                <button onclick="location.reload()" class="bg-zinc-900 text-red-500 font-black py-3 rounded-xl text-[10px] uppercase w-full">← VOLVER</button>
                <div class="card"><input type="file" id="upload" class="text-[10px] w-full" accept="image/*"/></div>

                <div id="panel-color" class="hidden card border-red-600/30 space-y-4">
                    <button onclick="manualScan()" class="w-full py-2 bg-zinc-800 text-[8px] font-black rounded uppercase">1. Escanear Imagen</button>
                    <div id="design-palette" class="flex flex-wrap gap-2 justify-center"></div>
                    <div class="grid grid-cols-2 gap-2 pt-2">
                        <div id="color-old" class="h-10 rounded border border-white/10 bg-zinc-900"></div>
                        <input type="color" id="custom-picker" class="w-full h-10 bg-transparent border-none p-0 cursor-pointer">
                    </div>
                    <button onclick="applyColor()" class="btn-jj text-[10px]">2. Cambiar Color</button>
                </div>

                <div id="panel-bg" class="hidden card border-red-600/30 space-y-4">
                    <label class="text-[9px] uppercase text-zinc-500">Tolerancia de Blanco</label>
                    <input type="range" id="bg-tolerance" min="1" max="150" value="40" class="w-full accent-red-600">
                    <button onclick="removeBG()" class="btn-jj text-[10px]">Limpiar Fondo</button>
                </div>

                <div id="panel-ia" class="hidden card border-yellow-600/30">
                    <button onclick="upscaleIA()" class="w-full py-5 bg-gradient-to-r from-yellow-600 to-red-600 text-white font-black text-[11px] rounded-xl uppercase">⚡ Resolución x2</button>
                </div>
                
                <button onclick="reset()" class="w-full py-3 bg-zinc-900 text-yellow-500 font-black rounded-xl text-[10px] uppercase mt-auto">Reset</button>
            </aside>
        </section>
    </div>

    <script>
        const canvas = document.getElementById('canvas'), ctx = canvas.getContext('2d', { willReadFrequently: true });
        const viewport = document.getElementById('viewport'), zoomContainer = document.getElementById('zoom-container');
        const fileInput = document.getElementById('upload');
        let originalImg = null, isVIP = false, trials = parseInt(localStorage.getItem('jj_46')) || 2;
        let scale = 1, posX = 0, posY = 0, targetRGB = [0,0,0], isPanning = false, startX, startY;

        document.getElementById('trial-count-ui').innerText = trials;

        function checkAccess() {
            const p = document.getElementById('user-phone').value;
            if(p === "51916689969" || p === "VIP") { isVIP = true; enterApp(true); } else { alert("No autorizado."); }
        }
        function startTrial() { if(trials <= 0) return alert("Sin pruebas."); enterApp(false); }
        function enterApp(vip) {
            document.getElementById('auth-screen').style.display = 'none';
            document.getElementById('main-content').style.display = 'block';
        }

        // CARGA DE IMAGEN (ASEGURADA)
        fileInput.addEventListener('change', (e) => {
            const file = e.target.files[0];
            if(!file) return;
            const reader = new FileReader();
            reader.onload = (event) => {
                const img = new Image();
                img.onload = () => {
                    canvas.width = img.width; canvas.height = img.height;
                    ctx.drawImage(img, 0, 0);
                    originalImg = img;
                    // Auto-ajuste inicial
                    scale = Math.min(viewport.clientWidth / img.width, viewport.clientHeight / img.height) * 0.8;
                    posX = 0; posY = 0;
                    updateTransform();
                };
                img.src = event.target.result;
            };
            reader.readAsDataURL(file);
        });

        // ZOOM CORREGIDO (AHORA ACHICA SIN LÍMITES)
        viewport.onwheel = (e) => {
            e.preventDefault();
            const zoomSpeed = 0.1;
            if (e.deltaY > 0) {
                scale *= (1 - zoomSpeed); // Achicar
            } else {
                scale *= (1 + zoomSpeed); // Agrandar
            }
            // Límite mínimo extremo para que no desaparezca del todo
            scale = Math.max(0.01, scale); 
            updateTransform();
        };

        // MOVIMIENTO (PAN)
        viewport.onmousedown = (e) => { isPanning = true; startX = e.clientX - posX; startY = e.clientY - posY; };
        window.onmousemove = (e) => { if(isPanning) { posX = e.clientX - startX; posY = e.clientY - startY; updateTransform(); } };
        window.onmouseup = () => isPanning = false;

        function updateTransform() {
            zoomContainer.style.transform = `translate(${posX}px, ${posY}px) scale(${scale})`;
        }

        // FUNCIONES DE HERRAMIENTA
        function manualScan() {
            if(!originalImg) return;
            const data = ctx.getImageData(0,0,canvas.width,canvas.height).data;
            const colors = {};
            for(let i=0; i<data.length; i+=Math.max(4, Math.floor(data.length/3000)*4)) {
                if(data[i+3] < 100) continue;
                const h = "#" + ((1 << 24) + (data[i] << 16) + (data[i+1] << 8) + data[i+2]).toString(16).slice(1).toUpperCase();
                colors[h] = (colors[h] || 0) + 1;
            }
            const sorted = Object.keys(colors).sort((a,b) => colors[b]-colors[a]).slice(0, 12);
            const container = document.getElementById('design-palette'); container.innerHTML = "";
            sorted.forEach(hex => {
                const div = document.createElement('div');
                div.className = "w-7 h-7 rounded-full border border-zinc-700 cursor-pointer hover:scale-110 transition-transform";
                div.style.backgroundColor = hex;
                div.onclick = () => {
                    targetRGB = [parseInt(hex.slice(1,3), 16), parseInt(hex.slice(3,5), 16), parseInt(hex.slice(5,7), 16)];
                    document.getElementById('color-old').style.backgroundColor = hex;
                };
                container.appendChild(div);
            });
        }

        function applyColor() {
            const id = ctx.getImageData(0,0,canvas.width,canvas.height); const d = id.data;
            const hex = document.getElementById('custom-picker').value;
            const rN = parseInt(hex.slice(1,3),16), gN = parseInt(hex.slice(3,5),16), bN = parseInt(hex.slice(5,7),16);
            for(let i=0; i<d.length; i+=4) {
                const diff = Math.sqrt(Math.pow(d[i]-targetRGB[0],2)+Math.pow(d[i+1]-targetRGB[1],2)+Math.pow(d[i+2]-targetRGB[2],2));
                if(diff < 40) { d[i]=rN; d[i+1]=gN; d[i+2]=bN; }
            }
            ctx.putImageData(id, 0, 0);
        }

        function removeBG() {
            const tol = document.getElementById('bg-tolerance').value;
            const id = ctx.getImageData(0,0,canvas.width,canvas.height); const d = id.data;
            for(let i=0; i<d.length; i+=4) {
                if(d[i] > 255-tol && d[i+1] > 255-tol && d[i+2] > 255-tol) d[i+3] = 0;
            }
            ctx.putImageData(id, 0, 0);
        }

        function upscaleIA() {
            const temp = document.createElement('canvas');
            temp.width = canvas.width * 2; temp.height = canvas.height * 2;
            const tctx = temp.getContext('2d');
            tctx.imageSmoothingEnabled = true;
            tctx.imageSmoothingQuality = 'high';
            tctx.drawImage(canvas, 0, 0, temp.width, temp.height);
            canvas.width = temp.width; canvas.height = temp.height;
            ctx.drawImage(temp, 0, 0);
            updateTransform();
        }

        function download300DPI() {
            if(!isVIP) { trials--; localStorage.setItem('jj_46', trials); }
            const link = document.createElement('a');
            link.download = 'JJ_PREMIUM_300DPI.png';
            link.href = canvas.toDataURL('image/png');
            link.click();
            if(!isVIP && trials <= 0) location.reload();
        }

        function initTool(t) {
            document.getElementById('view-home').style.display='none';
            document.getElementById('view-tool').classList.add('active-view');
            document.getElementById('panel-color').classList.toggle('hidden', t!=='color');
            document.getElementById('panel-bg').classList.toggle('hidden', t!=='bg');
            document.getElementById('panel-ia').classList.toggle('hidden', t!=='ia');
        }

        function reset() { if(originalImg) ctx.drawImage(originalImg, 0, 0); }
    </script>
</body>
</html>
