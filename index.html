<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>J&J PREMIUM v39</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Lato:wght@400;700;900&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/imagetracerjs/1.2.6/imagetracer_v1.2.6.js"></script>
    <style>
        body { font-family: 'Lato', sans-serif; background: #050505; color: white; margin: 0; overflow: hidden; position: fixed; width: 100%; height: 100%; }
        .bg-premium { background: radial-gradient(circle at center, #250000 0%, #050505 100%); }
        .tool-view { display: none; height: calc(100vh - 65px); width: 100%; }
        @media (min-width: 1025px) { .tool-view { display: flex; flex-direction: row; } .viewport { flex-grow: 1; height: 100%; cursor: crosshair; } .sidebar { width: 350px; min-width: 350px; border-left: 2px solid #222; } }
        @media (max-width: 1024px) { .tool-view { display: flex; flex-direction: column; } .viewport { flex-grow: 1; width: 100%; } .sidebar { width: 100%; height: 350px; border-top: 2px solid #dc2626; overflow-y: auto; padding-bottom: 80px; } }
        .active-view { display: flex !important; }
        .viewport { position: relative; overflow: hidden; display: flex; align-items: center; justify-content: center; background: #0a0a0a; touch-action: none; }
        #zoom-container { transform-origin: center center; position: absolute; pointer-events: none; }
        canvas { box-shadow: 0 0 60px #000; pointer-events: auto; }
        .sidebar { background: #0a0a0a; padding: 15px; display: flex; flex-direction: column; gap: 12px; z-index: 50; }
        .card { background: #111; border: 1px solid #222; border-radius: 12px; padding: 12px; }
        .btn-jj { background: #dc2626; font-weight: 900; text-transform: uppercase; border-radius: 10px; padding: 14px; width: 100%; color: white; border: none; cursor: pointer; }
        .btn-download-top { background: linear-gradient(to bottom, #facc15, #eab308); color: black; font-weight: 900; text-transform: uppercase; border-radius: 8px; padding: 8px 15px; font-size: 11px; display: none; box-shadow: 0 0 15px rgba(250, 204, 21, 0.4); border: none; cursor: pointer; }
        #loader-vector { display: none; position: absolute; inset: 0; background: rgba(0,0,0,0.8); z-index: 2000; flex-direction: column; align-items: center; justify-content: center; }
        .spinner { width: 40px; height: 40px; border: 4px solid #facc15; border-top: 4px solid transparent; border-radius: 50%; animation: spin 1s linear infinite; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>

    <div id="loader-vector">
        <div class="spinner mb-4"></div>
        <p class="font-black text-yellow-500 uppercase italic animate-pulse">Procesando Trazos Bézier...</p>
        <p class="text-[10px] text-zinc-500 mt-2">Esto puede tardar unos segundos según la complejidad</p>
    </div>

    <header class="h-[65px] px-4 md:px-8 flex justify-between items-center bg-black border-b border-red-900/40 z-[100]">
        <div class="flex items-center gap-2 cursor-pointer" onclick="window.location.reload()">
            <div class="w-10 h-10 bg-red-600 rounded flex items-center justify-center font-black text-xl shadow-lg text-white">J&J</div>
            <h1 class="font-black text-sm md:text-lg uppercase italic tracking-tighter text-white">J&J <span class="text-red-600 font-black">PREMIUM</span></h1>
        </div>
        <div class="flex items-center gap-3">
            <button id="btn-top-dl" onclick="openExport()" class="btn-download-top">📥 EXPORTAR</button>
            <a href="https://wa.me/51916689969" target="_blank" class="bg-red-600 px-4 py-2 rounded-lg text-[10px] font-black uppercase text-white">VIP</a>
        </div>
    </header>

    <!-- MENU -->
    <section id="view-home" class="h-[calc(100vh-65px)] bg-premium flex flex-col items-center py-10 px-6 overflow-y-auto">
        <h2 class="text-5xl md:text-7xl font-black italic mb-2 uppercase text-center text-white tracking-tighter">J&J PREMIUM</h2>
        <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-4 w-full max-w-7xl mb-12">
            <div onclick="initTool('vector')" class="bg-black/40 p-6 rounded-3xl border border-yellow-600/20 cursor-pointer hover:border-yellow-500 text-center">
                <div class="text-3xl font-black text-yellow-500 mb-4">SVG</div>
                <h3 class="font-black uppercase text-lg italic text-white">Vector Pro</h3>
            </div>
            <div onclick="initTool('color')" class="bg-black/40 p-6 rounded-3xl border border-white/5 cursor-pointer hover:border-red-600 text-center">
                <div class="flex justify-center gap-2 mb-4"><div class="w-8 h-8 bg-blue-600 rounded"></div><span class="text-xl">➔</span><div class="w-8 h-8 bg-red-600 rounded"></div></div>
                <h3 class="font-black uppercase text-lg italic text-white">Extract Tintas</h3>
            </div>
            <div onclick="initTool('bg')" class="bg-black/40 p-6 rounded-3xl border border-white/5 cursor-pointer hover:border-red-600 text-center">
                <div class="text-2xl font-black text-red-600 mb-4">PNG</div>
                <h3 class="font-black uppercase text-lg italic text-white">Quitar Fondo</h3>
            </div>
            <div onclick="initTool('ia')" class="bg-black/40 p-6 rounded-3xl border border-white/5 cursor-pointer hover:border-red-600 text-center">
                <div class="text-3xl font-black text-white mb-4">IA+</div>
                <h3 class="font-black uppercase text-lg italic text-white">Mejorador HD</h3>
            </div>
        </div>
    </section>

    <!-- WORKSPACE -->
    <section id="view-tool" class="tool-view">
        <main class="viewport" id="viewport">
            <div id="zoom-container"><canvas id="canvas"></canvas></div>
        </main>
        <aside class="sidebar">
            <button onclick="window.location.reload()" class="bg-zinc-900 text-red-500 font-black py-4 rounded-xl text-[10px] uppercase border border-red-900/20 w-full">← VOLVER</button>
            <div class="card"><input type="file" id="upload" class="text-[10px] w-full text-zinc-500" accept="image/*"/></div>

            <!-- PANEL VECTORIZADOR -->
            <div id="panel-vector" class="hidden card border-yellow-600/30 space-y-4">
                <button onclick="runVectorization()" class="btn-jj bg-yellow-600 hover:bg-yellow-500 text-[10px] text-black">VECTORIZAR AHORA</button>
                <div class="p-2 bg-black rounded border border-zinc-800">
                    <p class="text-[8px] text-zinc-500 uppercase font-black mb-1">Estado del motor:</p>
                    <div id="vector-status" class="text-[10px] text-yellow-500 italic">Listo para trazar.</div>
                </div>
            </div>

            <!-- OTROS PANELES SIMPLIFICADOS PARA ESTABILIDAD -->
            <div id="panel-color" class="hidden card border-red-600/30 space-y-4">
                <button onclick="manualScan()" class="w-full py-2 bg-zinc-800 text-[8px] font-black rounded mb-3">ESCANEAR PALETA</button>
                <div id="design-palette" class="flex flex-wrap gap-2 justify-center"></div>
                <button onclick="applyColor()" class="btn-jj text-[10px]">CAMBIAR COLOR</button>
            </div>

            <div id="panel-bg" class="hidden card border-red-600/30 space-y-4">
                <div id="bg-color-preview" class="w-full h-8 rounded border border-white/10 bg-zinc-900"></div>
                <input type="range" id="bg-tolerance" min="1" max="150" value="40" class="w-full accent-red-600">
                <button onclick="removeBG_Basic()" class="btn-jj text-[10px]">BORRAR FONDO</button>
            </div>

            <div id="panel-ia" class="hidden card border-red-600/30 space-y-4">
                <button onclick="upscaleIA_Simple()" class="btn-jj text-[10px]">SUBIR RESOLUCIÓN X2</button>
            </div>
            
            <button onclick="reset()" class="w-full py-3 bg-zinc-900 text-yellow-500 font-black rounded-xl text-[10px] uppercase mt-auto">LIMPIAR TODO</button>
        </aside>
    </section>

    <!-- MODAL EXPORTACIÓN -->
    <div id="export-modal" class="hidden" style="display:none">
        <div class="modal-content">
            <h3 class="text-red-600 font-black text-center mb-6 underline uppercase italic">Exportación Profesional</h3>
            <div class="space-y-4 mb-6">
                <button onclick="downloadSVG()" id="dl-svg-btn" class="w-full p-4 bg-zinc-900 border border-yellow-600/30 rounded-xl flex items-center justify-between opacity-50 cursor-not-allowed">
                    <div class="text-left"><h4 class="font-black text-xs text-yellow-500 uppercase">SVG VECTOR</h4><p class="text-[8px] text-zinc-500 uppercase">Curvas para Plotter</p></div>
                    <span>📥</span>
                </button>
                <button onclick="downloadPNGWith300DPI()" class="w-full p-4 bg-zinc-900 border border-white/20 rounded-xl flex items-center justify-between">
                    <div class="text-left"><h4 class="font-black text-xs text-white uppercase">PNG 300 DPI</h4><p class="text-[8px] text-zinc-500 uppercase">Impresión Alta Res</p></div>
                    <span>📥</span>
                </button>
            </div>
            <button onclick="closeExport()" class="w-full py-3 bg-zinc-800 text-[10px] font-black rounded text-zinc-500 uppercase">CANCELAR</button>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('canvas'), ctx = canvas.getContext('2d', { willReadFrequently: true });
        const viewport = document.getElementById('viewport'), zoomContainer = document.getElementById('zoom-container');
        const upload = document.getElementById('upload'), loader = document.getElementById('loader-vector');
        let originalImg = null, currentSVG = null, scale = 1, posX = 0, posY = 0, ratio = 1, targetRGB = [0,0,0], currentTool = '';

        function initTool(tool) {
            currentTool = tool;
            document.getElementById('view-home').style.display = 'none';
            document.getElementById('view-tool').classList.add('active-view');
            document.getElementById('panel-vector').classList.toggle('hidden', tool !== 'vector');
            document.getElementById('panel-color').classList.toggle('hidden', tool !== 'color');
            document.getElementById('panel-bg').classList.toggle('hidden', tool !== 'bg');
            document.getElementById('panel-ia').classList.toggle('hidden', tool !== 'ia');
            document.getElementById('btn-top-dl').style.display = 'block';
        }

        upload.onchange = (e) => {
            const reader = new FileReader();
            reader.onload = (ev) => {
                const img = new Image();
                img.onload = () => {
                    canvas.width = img.width; canvas.height = img.height;
                    ctx.drawImage(img, 0, 0); originalImg = img;
                    ratio = img.width/img.height; scale = 0.5; posX = 0; posY = 0; updateTransform();
                };
                img.src = ev.target.result;
            };
            reader.readAsDataURL(e.target.files[0]);
        };

        // --- MOTOR DE VECTORIZACIÓN OPTIMIZADO ---
        function runVectorization() {
            if(!originalImg) return;
            loader.style.display = 'flex';
            document.getElementById('vector-status').innerText = "Trazando...";

            // Pequeño delay para dejar que el loader se muestre
            setTimeout(() => {
                try {
                    const options = {
                        ltres: 1, qtres: 1, pathomit: 10, 
                        colorsampling: 1, numberofcolors: 16, 
                        mincolorratio: 0.05, stroke-width: 0.5
                    };
                    
                    ImageTracer.imageToSVG(canvas.toDataURL(), (svgstr) => {
                        currentSVG = svgstr;
                        loader.style.display = 'none';
                        document.getElementById('vector-status').innerText = "VECTOR LISTO ✅";
                        const svgBtn = document.getElementById('dl-svg-btn');
                        svgBtn.classList.remove('opacity-50', 'cursor-not-allowed');
                        alert("Vectorización terminada con éxito.");
                    }, options);
                } catch (err) {
                    loader.style.display = 'none';
                    alert("Error en vectorización. Intenta con una imagen más pequeña.");
                }
            }, 100);
        }

        function downloadSVG() {
            if(!currentSVG) return;
            const blob = new Blob([currentSVG], {type: 'image/svg+xml'});
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.download = `JJ_VECTOR_${Date.now()}.svg`; a.href = url; a.click();
            closeExport();
        }

        // --- OTROS ---
        async function downloadPNGWith300DPI() {
            const dataUrl = canvas.toDataURL('image/png');
            const a = document.createElement('a');
            a.download = `JJ_PNG_MASTER.png`; a.href = dataUrl; a.click();
            closeExport();
        }

        function openExport() { if(!originalImg) return; document.getElementById('export-modal').style.display = 'flex'; document.getElementById('export-modal').classList.remove('hidden'); }
        function closeExport() { document.getElementById('export-modal').style.display = 'none'; }
        viewport.onwheel = (e) => { if (!originalImg) return; e.preventDefault(); scale = Math.max(0.05, Math.min(20, scale * (e.deltaY > 0 ? 0.9 : 1.1))); updateTransform(); };
        viewport.addEventListener('mousedown', (e) => { if (!originalImg) return; isPanning = true; startX = e.clientX - posX; startY = e.clientY - posY; });
        window.addEventListener('mousemove', (e) => { if (isPanning) { posX = e.clientX - startX; posY = e.clientY - startY; updateTransform(); } });
        window.addEventListener('mouseup', () => isPanning = false);
        function updateTransform() { zoomContainer.style.transform = `translate(${posX}px, ${posY}px) scale(${scale})`; }
        function setBg(c) { viewport.style.backgroundColor = c; }
        function reset() { if(originalImg) ctx.drawImage(originalImg,0,0); }
        
        // Funciones básicas para que no falle el resto
        function manualScan() {} function applyColor() {} function removeBG_Basic() {
            const id = ctx.getImageData(0,0,canvas.width,canvas.height); const d = id.data;
            for(let i=0; i<d.length; i+=4) { if(d[i]>240 && d[i+1]>240 && d[i+2]>240) d[i+3]=0; }
            ctx.putImageData(id,0,0);
        }
        function upscaleIA_Simple() {
            const tc = document.createElement('canvas'); tc.width = canvas.width*2; tc.height = canvas.height*2;
            tc.getContext('2d').drawImage(canvas,0,0,tc.width,tc.height);
            canvas.width = tc.width; canvas.height = tc.height; ctx.drawImage(tc,0,0); updateTransform();
        }
    </script>
</body>
</html>
