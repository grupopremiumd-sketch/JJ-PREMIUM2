<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>J&J PREMIUM v47 - ZONE SELECTOR</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { font-family: 'Lato', sans-serif; background: #050505; color: white; margin: 0; overflow: hidden; position: fixed; width: 100%; height: 100%; }
        .tool-view { display: none; height: calc(100vh - 65px); width: 100%; }
        .active-view { display: flex !important; }
        .viewport { position: relative; overflow: hidden; display: flex; align-items: center; justify-content: center; background: #0a0a0a; touch-action: none; cursor: crosshair; }
        #zoom-container { transform-origin: center center; position: absolute; pointer-events: none; }
        canvas { box-shadow: 0 0 60px #000; pointer-events: auto; }
        #selection-box { position: absolute; border: 2px dashed #ff0000; background: rgba(255,0,0,0.1); pointer-events: none; display: none; z-index: 100; }
        .sidebar { background: #0a0a0a; padding: 15px; display: flex; flex-direction: column; gap: 12px; z-index: 50; border-left: 2px solid #222; width: 350px; }
        .btn-jj { background: #dc2626; font-weight: 900; text-transform: uppercase; border-radius: 10px; padding: 14px; width: 100%; color: white; border: none; cursor: pointer; }
        .card { background: #111; border: 1px solid #222; border-radius: 12px; padding: 12px; }
    </style>
</head>
<body>

    <div id="main-content">
        <header class="h-[65px] px-4 flex justify-between items-center bg-black border-b border-red-900/40">
            <div class="flex items-center gap-2 cursor-pointer" onclick="location.reload()">
                <div class="w-10 h-10 bg-red-600 rounded flex items-center justify-center font-black text-xl">J&J</div>
                <h1 class="font-black uppercase italic">J&J <span class="text-red-600">PREMIUM v47</span></h1>
            </div>
            <button onclick="download300DPI()" class="bg-yellow-500 text-black font-black text-[10px] px-4 py-2 rounded uppercase">📥 DESCARGAR 300 DPI</button>
        </header>

        <section class="tool-view active-view">
            <main class="viewport flex-grow h-full overflow-hidden" id="viewport" oncontextmenu="return false;">
                <div id="zoom-container">
                    <canvas id="canvas"></canvas>
                    <div id="selection-box"></div>
                </div>
            </main>
            <aside class="sidebar">
                <div class="card"><input type="file" id="upload" class="text-[10px] w-full" accept="image/*"/></div>
                
                <div class="card space-y-2">
                    <p class="text-[9px] font-bold text-red-500">MODO PC:</p>
                    <p class="text-[8px] text-zinc-400">• Click Izquierdo: Gotero de Color</p>
                    <p class="text-[8px] text-zinc-400">• Click Derecho: Seleccionar Zona</p>
                    <p class="text-[8px] text-zinc-400">• Rueda: Zoom / Botón Rueda: Mover</p>
                </div>

                <div id="panel-color" class="card border-red-600/30 space-y-4">
                    <button onclick="manualScan()" class="w-full py-2 bg-zinc-800 text-[8px] font-black rounded uppercase">Escanear Colores</button>
                    <div id="design-palette" class="flex flex-wrap gap-2 justify-center"></div>
                    <div class="grid grid-cols-2 gap-2">
                        <div id="color-old" class="h-10 rounded border border-white/10 bg-zinc-900"></div>
                        <input type="color" id="custom-picker" class="w-full h-10 bg-transparent border-none p-0 cursor-pointer">
                    </div>
                    <button onclick="applyColor()" class="btn-jj text-[10px]">Reemplazar en Zona</button>
                    <button onclick="clearSelection()" class="w-full py-1 text-[8px] text-zinc-500">Limpiar Zona Seleccionada</button>
                </div>

                <button onclick="reset()" class="w-full py-3 bg-zinc-900 text-yellow-500 font-black rounded-xl text-[10px] uppercase mt-auto">Restablecer Todo</button>
            </aside>
        </section>
    </div>

    <script>
        const canvas = document.getElementById('canvas'), ctx = canvas.getContext('2d', { willReadFrequently: true });
        const viewport = document.getElementById('viewport'), zoomContainer = document.getElementById('zoom-container');
        const selectionBox = document.getElementById('selection-box');
        let originalImg = null, scale = 1, posX = 0, posY = 0, isPanning = false, isSelecting = false;
        let startX, startY, selX, selY, selW, selH, targetRGB = [0,0,0];

        document.getElementById('upload').addEventListener('change', (e) => {
            const reader = new FileReader();
            reader.onload = (ev) => {
                const img = new Image();
                img.onload = () => {
                    canvas.width = img.width; canvas.height = img.height;
                    ctx.drawImage(img, 0, 0); originalImg = img;
                    scale = Math.min(viewport.clientWidth / img.width, viewport.clientHeight / img.height) * 0.9;
                    updateTransform();
                };
                img.src = ev.target.result;
            };
            reader.readAsDataURL(e.target.files[0]);
        });

        // ZOOM
        viewport.onwheel = (e) => {
            e.preventDefault();
            scale *= (e.deltaY > 0 ? 0.9 : 1.1);
            scale = Math.max(0.01, scale);
            updateTransform();
        };

        // EVENTOS DE MOUSE (PC)
        viewport.onmousedown = (e) => {
            if (e.button === 0) { // Click Izquierdo: Gotero
                pickColor(e);
            } else if (e.button === 2) { // Click Derecho: Seleccionar Zona
                isSelecting = true;
                const rect = canvas.getBoundingClientRect();
                selX = (e.clientX - rect.left) / scale;
                selY = (e.clientY - rect.top) / scale;
            } else if (e.button === 1) { // Botón Rueda: Panning
                isPanning = true;
                startX = e.clientX - posX;
                startY = e.clientY - posY;
            }
        };

        window.onmousemove = (e) => {
            if (isPanning) {
                posX = e.clientX - startX;
                posY = e.clientY - startY;
                updateTransform();
            }
            if (isSelecting) {
                const rect = canvas.getBoundingClientRect();
                const curX = (e.clientX - rect.left) / scale;
                const curY = (e.clientY - rect.top) / scale;
                selW = curX - selX;
                selH = curY - selY;
                
                selectionBox.style.display = 'block';
                selectionBox.style.left = (selW > 0 ? selX : curX) + 'px';
                selectionBox.style.top = (selH > 0 ? selY : curY) + 'px';
                selectionBox.style.width = Math.abs(selW) + 'px';
                selectionBox.style.height = Math.abs(selH) + 'px';
            }
        };

        window.onmouseup = () => {
            isPanning = false;
            isSelecting = false;
        };

        function pickColor(e) {
            const rect = canvas.getBoundingClientRect();
            const x = (e.clientX - rect.left) / scale;
            const y = (e.clientY - rect.top) / scale;
            const pixel = ctx.getImageData(x, y, 1, 1).data;
            targetRGB = [pixel[0], pixel[1], pixel[2]];
            const hex = "#" + ((1 << 24) + (pixel[0] << 16) + (pixel[1] << 8) + pixel[2]).toString(16).slice(1).toUpperCase();
            document.getElementById('color-old').style.backgroundColor = hex;
        }

        function applyColor() {
            const id = ctx.getImageData(0, 0, canvas.width, canvas.height);
            const d = id.data;
            const hex = document.getElementById('custom-picker').value;
            const rN = parseInt(hex.slice(1,3),16), gN = parseInt(hex.slice(3,5),16), bN = parseInt(hex.slice(5,7),16);
            
            // Si hay selección, limitar área
            const useZone = selectionBox.style.display === 'block';
            const zX = parseFloat(selectionBox.style.left), zY = parseFloat(selectionBox.style.top);
            const zW = parseFloat(selectionBox.style.width), zH = parseFloat(selectionBox.style.height);

            for(let i=0; i<d.length; i+=4) {
                const x = (i/4) % canvas.width;
                const y = Math.floor((i/4) / canvas.width);

                if(useZone) {
                    if(x < zX || x > zX + zW || y < zY || y > zY + zH) continue;
                }

                const diff = Math.sqrt(Math.pow(d[i]-targetRGB[0],2)+Math.pow(d[i+1]-targetRGB[1],2)+Math.pow(d[i+2]-targetRGB[2],2));
                if(diff < 45) { d[i]=rN; d[i+1]=gN; d[i+2]=bN; }
            }
            ctx.putImageData(id, 0, 0);
        }

        function clearSelection() {
            selectionBox.style.display = 'none';
        }

        function updateTransform() {
            zoomContainer.style.transform = `translate(${posX}px, ${posY}px) scale(${scale})`;
        }

        function reset() { if(originalImg) ctx.drawImage(originalImg,0,0); clearSelection(); }

        function download300DPI() {
            const link = document.createElement('a');
            link.download = 'JJ_ZONA_300.png';
            link.href = canvas.toDataURL('image/png');
            link.click();
        }

        function manualScan() {
            const data = ctx.getImageData(0,0,canvas.width,canvas.height).data;
            const colors = {};
            for(let i=0; i<data.length; i+=Math.max(4, Math.floor(data.length/2000)*4)) {
                if(data[i+3] < 128) continue;
                const h = "#" + ((1 << 24) + (data[i] << 16) + (data[i+1] << 8) + data[i+2]).toString(16).slice(1).toUpperCase();
                colors[h] = (colors[h] || 0) + 1;
            }
            const sorted = Object.keys(colors).sort((a,b) => colors[b]-colors[a]).slice(0, 10);
            const container = document.getElementById('design-palette'); container.innerHTML = "";
            sorted.forEach(hex => {
                const div = document.createElement('div');
                div.className = "w-6 h-6 rounded-full border border-zinc-700 cursor-pointer";
                div.style.backgroundColor = hex;
                div.onclick = () => {
                    targetRGB = [parseInt(hex.slice(1,3), 16), parseInt(hex.slice(3,5), 16), parseInt(hex.slice(5,7), 16)];
                    document.getElementById('color-old').style.backgroundColor = hex;
                };
                container.appendChild(div);
            });
        }
    </script>
</body>
</html>
