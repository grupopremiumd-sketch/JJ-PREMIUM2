<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>J&J PREMIUM v25</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Lato:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Lato', sans-serif; background: #050505; color: white; margin: 0; overflow: hidden; position: fixed; width: 100%; height: 100%; }
        .bg-premium { background: radial-gradient(circle at center, #250000 0%, #050505 100%); }
        .tool-view { display: none; height: calc(100vh - 65px); width: 100%; }
        @media (min-width: 1025px) {
            .tool-view { display: flex; flex-direction: row; }
            .viewport { flex-grow: 1; height: 100%; cursor: crosshair; }
            .sidebar { width: 350px; min-width: 350px; border-left: 2px solid #222; }
        }
        @media (max-width: 1024px) {
            .tool-view { display: flex; flex-direction: column; }
            .viewport { flex-grow: 1; width: 100%; }
            .sidebar { width: 100%; height: 320px; border-top: 2px solid #dc2626; overflow-y: auto; }
        }
        .active-view { display: flex !important; }
        .viewport { position: relative; overflow: hidden; display: flex; align-items: center; justify-content: center; background: #0a0a0a; touch-action: none; }
        #zoom-container { transform-origin: center center; position: absolute; transition: transform 0.08s ease-out; pointer-events: none; }
        canvas { box-shadow: 0 0 60px #000; pointer-events: auto; }
        #selection-box { position: absolute; border: 2px dashed #dc2626; display: none; pointer-events: none; z-index: 100; background: rgba(220,38,38,0.15); }
        .sidebar { background: #0a0a0a; padding: 15px; display: flex; flex-direction: column; gap: 12px; z-index: 50; }
        .card { background: #111; border: 1px solid #222; border-radius: 12px; padding: 12px; }
        .btn-jj { background: #dc2626; font-weight: 900; text-transform: uppercase; border-radius: 10px; padding: 14px; width: 100%; }
        #export-modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.95); z-index: 3000; align-items: center; justify-content: center; padding: 20px; }
        .modal-content { background: #0a0a0a; border: 1px solid #dc2626; border-radius: 20px; width: 100%; max-width: 400px; padding: 20px; }
        .btn-download-top { background: linear-gradient(to bottom, #facc15, #eab308); color: black; font-weight: 900; text-transform: uppercase; border-radius: 8px; padding: 8px 15px; font-size: 11px; display: none; box-shadow: 0 0 15px rgba(250,204,21,0.4); }
        .input-export { background: #000; border: 1px solid #333; border-radius: 6px; padding: 10px; color: white; font-weight: 700; width: 100%; font-size: 13px; outline: none; }
        .label-export { font-size: 9px; font-weight: 900; color: #666; text-transform: uppercase; display: block; margin-bottom: 4px; }
    </style>
</head>
<body>

    <header class="h-[65px] px-4 md:px-8 flex justify-between items-center bg-black border-b border-red-900/40 z-[100]">
        <div class="flex items-center gap-2 cursor-pointer" onclick="window.location.reload()">
            <div class="w-10 h-10 bg-red-600 rounded flex items-center justify-center font-black text-xl shadow-lg">J&J</div>
            <h1 class="font-black text-sm md:text-lg uppercase italic tracking-tighter text-white">J&J <span class="text-red-600">PREMIUM</span></h1>
        </div>
        <div class="flex items-center gap-3">
            <button id="btn-top-dl" onclick="openExport()" class="btn-download-top">📥 DESCARGAR</button>
            <a href="https://wa.me/51916689969" target="_blank" class="bg-red-600 px-4 py-2 rounded-lg text-[10px] font-black uppercase">VIP</a>
        </div>
    </header>

    <section id="view-home" class="h-[calc(100vh-65px)] bg-premium flex flex-col items-center py-10 px-6 overflow-y-auto">
        <h2 class="text-5xl md:text-7xl font-black italic mb-2 uppercase text-center text-white">J&J PREMIUM</h2>
        <p class="text-zinc-500 font-bold uppercase text-[9px] tracking-[0.5em] mb-12 italic text-center">Software Master de Producción Textil</p>
        <div class="grid grid-cols-1 md:grid-cols-3 gap-6 w-full max-w-6xl mb-12">
            <div onclick="initTool('color')" class="bg-black/40 p-8 rounded-[2rem] border border-white/5 cursor-pointer hover:border-red-600 text-center">
                <div class="flex justify-center gap-2 mb-4"><div class="w-10 h-10 bg-blue-600 rounded"></div><span class="text-2xl text-white">➔</span><div class="w-10 h-10 bg-red-600 rounded"></div></div>
                <h3 class="font-black uppercase text-xl italic mb-1 text-white">Extractor de Tintas</h3>
                <p class="text-[9px] text-zinc-500 font-bold uppercase italic">Edición por Zonas</p>
            </div>
            <div onclick="initTool('bg')" class="bg-black/40 p-8 rounded-[2rem] border border-white/5 cursor-pointer hover:border-red-600 text-center">
                <div class="w-24 h-12 mx-auto mb-4 bg-zinc-800 rounded border border-dashed border-zinc-600 flex items-center justify-center"><span class="text-[10px] font-black text-zinc-400">PNG PRO</span></div>
                <h3 class="font-black uppercase text-xl italic mb-1 text-red-600">Quitar Fondo</h3>
                <p class="text-[9px] text-zinc-500 font-bold uppercase italic">Limpieza Master</p>
            </div>
            <div onclick="initTool('ia')" class="bg-black/40 p-8 rounded-[2rem] border border-white/5 cursor-pointer hover:border-red-600 text-center">
                <div class="flex justify-center items-center mb-4 gap-2"><span class="text-zinc-700 text-lg">A</span><span class="text-3xl text-white font-black">A</span></div>
                <h3 class="font-black uppercase text-xl italic mb-1 text-white">Mejorador IA</h3>
                <p class="text-[9px] text-zinc-500 font-bold uppercase italic">HD Upscale x2</p>
            </div>
        </div>
        <div class="grid grid-cols-1 md:grid-cols-2 gap-4 w-full max-w-2xl pb-10">
            <a href="https://wa.me/51916689969" target="_blank" class="bg-white/5 p-6 rounded-2xl border border-white/10 flex items-center justify-between text-white"><span>👑 Suscribirme</span><span>➔</span></a>
            <a href="https://wa.me/51904503246" target="_blank" class="bg-white/5 p-6 rounded-2xl border border-white/10 flex items-center justify-between text-white"><span>🔄 Renovar</span><span>➔</span></a>
        </div>
    </section>

    <section id="view-tool" class="tool-view">
        <main class="viewport" id="viewport">
            <div id="zoom-container"><canvas id="canvas"></canvas><div id="selection-box"></div></div>
        </main>
        <aside class="sidebar">
            <button onclick="window.location.reload()" class="bg-zinc-900 text-red-500 font-black py-4 rounded-xl text-[10px] uppercase border border-red-900/20 w-full mb-2">← VOLVER</button>
            <div class="card"><input type="file" id="upload" class="text-[10px] w-full text-zinc-500" accept="image/*"/></div>
            <div id="panel-color" class="hidden card border-red-600/30 space-y-4">
                <button onclick="manualScan()" class="w-full py-2 bg-zinc-800 text-[8px] font-black rounded mb-3 uppercase">Escanear Colores</button>
                <div id="design-palette" class="flex flex-wrap gap-2 justify-center mb-4 min-h-[40px]"></div>
                <div class="grid grid-cols-2 gap-4">
                    <div class="text-center"><p class="text-[8px] font-black uppercase mb-1">Actual</p><div id="color-old" class="w-full h-10 rounded-lg border border-white/10 bg-zinc-900"></div></div>
                    <div class="text-center"><p class="text-[8px] text-red-500 font-black uppercase mb-1">Nueva Tinta</p><input type="color" id="custom-picker" class="w-full h-10 bg-transparent border-none p-0 cursor-pointer"></div>
                </div>
                <button onclick="applyColor()" class="btn-jj text-[10px] mt-4">Actualizar Tinta</button>
            </div>
            <div id="panel-bg" class="hidden card border-red-600/30 space-y-4">
                <div class="grid grid-cols-2 gap-2"><button onclick="quickBG('white')" class="py-3 bg-white text-black font-black text-[10px] rounded">Blanco</button><button onclick="quickBG('black')" class="py-3 bg-zinc-800 text-white font-black text-[10px] rounded">Negro</button></div>
                <button onclick="removeBG()" class="btn-jj text-[10px]">Borrar Fondo</button>
            </div>
            <div id="panel-ia" class="hidden card border-red-600/30 space-y-4">
                <button onclick="upscaleIA(2)" class="w-full py-4 bg-zinc-900 text-red-500 font-black text-[10px] rounded-xl border border-red-900/30 uppercase">Upscale HD x2</button>
                <button onclick="applyIA()" class="btn-jj text-[11px]">Nitidez Master</button>
            </div>
            <div class="flex gap-4 justify-center py-2"><button onclick="setBg('#ffffff')" class="w-7 h-7 bg-white rounded-full border border-zinc-200"></button><button onclick="setBg('#0a0a0a')" class="w-7 h-7 bg-black rounded-full border border-white/10"></button><button onclick="setBg('#cbd5e1')" class="w-7 h-7 bg-slate-400 rounded-full border border-zinc-400"></button></div>
            <button onclick="reset()" class="w-full py-3 bg-zinc-900 text-yellow-500 font-black rounded-xl text-[10px] uppercase italic">Restaurar Original</button>
        </aside>
    </section>

    <div id="export-modal">
        <div class="modal-content">
            <h3 class="text-red-600 font-black text-center mb-6 underline uppercase italic">Panel Master de Salida</h3>
            <div class="grid grid-cols-2 gap-4 mb-4">
                <div><label class="label-export">Unidad</label><select id="exp-unit" class="input-export text-red-500" onchange="convertUnits()"><option value="px">px</option><option value="cm">cm</option><option value="mm">mm</option></select></div>
                <div><label class="label-export">DPI</label><input type="number" id="exp-dpi" value="300" class="input-export" oninput="convertUnits()"></div>
            </div>
            <div class="grid grid-cols-2 gap-4 mb-4">
                <div><label class="label-export">Ancho</label><input type="number" id="exp-width" class="input-export" oninput="syncDim('w')"></div>
                <div><label class="label-export">Alto</label><input type="number" id="exp-height" class="input-export" oninput="syncDim('h')"></div>
            </div>
            <div class="mb-6"><label class="label-export">Calidad</label><select id="exp-quality" class="input-export text-zinc-400"><option value="high">Bicúbica (Pro)</option><option value="medium">Bilineal</option></select></div>
            <div class="flex items-center gap-3 justify-center mb-6"><input type="checkbox" id="exp-ratio" checked class="accent-red-600 w-5 h-5"><label class="text-[10px] font-black text-red-500 uppercase italic">Fijar Proporción</label></div>
            <div class="flex gap-3"><button onclick="closeExport()" class="flex-1 py-4 bg-zinc-900 text-zinc-500 font-black text-[10px] rounded-xl">Cerrar</button><button onclick="download()" class="flex-1 btn-jj text-[11px] text-white">Descargar</button></div>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('canvas'), ctx = canvas.getContext('2d', { willReadFrequently: true });
        const viewport = document.getElementById('viewport'), zoomContainer = document.getElementById('zoom-container');
        const upload = document.getElementById('upload'), selectionBox = document.getElementById('selection-box');
        let originalImg = null, scale = 1, posX = 0, posY = 0, ratio = 1, targetRGB = [0,0,0], lastDist = 0;
        let isSelecting = false, isPanning = false, startX, startY, selectArea = null, currentTool = '';

        function initTool(tool) {
            currentTool = tool;
            document.getElementById('view-home').style.display = 'none';
            document.getElementById('view-tool').classList.add('active-view');
            document.getElementById('panel-color').classList.toggle('hidden', tool !== 'color');
            document.getElementById('panel-bg').classList.toggle('hidden', tool !== 'bg');
            document.getElementById('panel-ia').classList.toggle('hidden', tool !== 'ia');
            document.getElementById('btn-top-dl').style.display = 'block';
        }

        upload.onchange = (e) => {
            const reader = new FileReader();
            reader.onload = (ev) => {
                const img = new Image();
                img.onload = () => {
                    canvas.width = img.width; canvas.height = img.height;
                    ctx.drawImage(img, 0, 0); originalImg = img; ratio = img.width/img.height;
                    document.getElementById('exp-width').value = img.width;
                    document.getElementById('exp-height').value = img.height;
                    scale = 0.5; posX = 0; posY = 0; updateTransform();
                };
                img.src = ev.target.result;
            };
            reader.readAsDataURL(e.target.files[0]);
        };

        // ZOOM & PANNING
        viewport.onwheel = (e) => { if (!originalImg) return; e.preventDefault(); scale = Math.max(0.05, Math.min(20, scale * (e.deltaY > 0 ? 0.9 : 1.1))); updateTransform(); };
        viewport.addEventListener('mousedown', (e) => {
            if (!originalImg) return;
            const rect = canvas.getBoundingClientRect();
            if (e.button === 2 || e.button === 1 || (e.button === 0 && currentTool !== 'color')) { isPanning = true; startX = e.clientX - posX; startY = e.clientY - posY; } 
            else if (e.button === 0 && currentTool === 'color') {
                isSelecting = true; startX = (e.clientX - rect.left) / scale; startY = (e.clientY - rect.top) / scale;
                selectionBox.style.display = 'block'; selectionBox.style.left = startX + 'px'; selectionBox.style.top = startY + 'px';
                selectionBox.style.width = '0px'; selectionBox.style.height = '0px';
                captureColor(startX, startY);
            }
        });
        window.addEventListener('mousemove', (e) => {
            const rect = canvas.getBoundingClientRect();
            if (isPanning) { posX = e.clientX - startX; posY = e.clientY - startY; updateTransform(); } 
            else if (isSelecting) {
                const cx = (e.clientX - rect.left) / scale; const cy = (e.clientY - rect.top) / scale;
                let x = Math.min(startX, cx), y = Math.min(startY, cy), w = Math.abs(cx - startX), h = Math.abs(cy - startY);
                selectionBox.style.left = x + 'px'; selectionBox.style.top = y + 'px'; selectionBox.style.width = w + 'px'; selectionBox.style.height = h + 'px';
                selectArea = {x, y, w, h};
            }
        });
        window.addEventListener('mouseup', () => { isSelecting = isPanning = false; });
        viewport.addEventListener('contextmenu', e => e.preventDefault());

        // TÁCTIL
        viewport.addEventListener('touchstart', (e) => {
            if(!originalImg) return;
            const rect = canvas.getBoundingClientRect();
            if(e.touches.length === 2) { lastDist = Math.hypot(e.touches[0].pageX - e.touches[1].pageX, e.touches[0].pageY - e.touches[1].pageY); isPanning = true; } 
            else {
                startX = (e.touches[0].clientX - rect.left) / scale; startY = (e.touches[0].clientY - rect.top) / scale;
                if(currentTool === 'color') { isSelecting = true; selectionBox.style.display = 'block'; selectionBox.style.left = startX + 'px'; selectionBox.style.top = startY + 'px'; captureColor(startX, startY); } 
                else { isPanning = true; startX = e.touches[0].clientX - posX; startY = e.touches[0].clientY - posY; }
            }
        }, {passive: false});
        viewport.addEventListener('touchmove', (e) => {
            if(!originalImg) return; e.preventDefault();
            const rect = canvas.getBoundingClientRect();
            if(e.touches.length === 2) { const dist = Math.hypot(e.touches[0].pageX - e.touches[1].pageX, e.touches[0].pageY - e.touches[1].pageY); scale *= (dist/lastDist); lastDist = dist; } 
            else if(isSelecting) { const cx = (e.touches[0].clientX - rect.left) / scale; const cy = (e.touches[0].clientY - rect.top) / scale; let x = Math.min(startX, cx), y = Math.min(startY, cy), w = Math.abs(cx - startX), h = Math.abs(cy - startY); selectionBox.style.left = x + 'px'; selectionBox.style.top = y + 'px'; selectionBox.style.width = w + 'px'; selectionBox.style.height = h + 'px'; selectArea = {x, y, w, h}; } 
            else if(isPanning) { posX = e.touches[0].clientX - startX; posY = e.touches[0].clientY - startY; }
            updateTransform();
        }, {passive: false});
        viewport.addEventListener('touchend', () => { isSelecting = isPanning = false; });

        function captureColor(x, y) { const p = ctx.getImageData(Math.max(0,Math.min(x,canvas.width-1)), Math.max(0,Math.min(y,canvas.height-1)), 1, 1).data; targetRGB = [p[0], p[1], p[2]]; document.getElementById('color-old').style.backgroundColor = `rgb(${p[0]},${p[1]},${p[2]})`; }
        function updateTransform() { zoomContainer.style.transform = `translate(${posX}px, ${posY}px) scale(${scale})`; }
        function manualScan() { if(!originalImg) return; const data = ctx.getImageData(0,0,canvas.width,canvas.height).data; const colors = {}; for(let i=0; i<data.length; i+=Math.max(4, Math.floor(data.length/2000)*4)) { if(data[i+3] < 128) continue; const h = "#" + ((1 << 24) + (data[i] << 16) + (data[i+1] << 8) + data[i+2]).toString(16).slice(1).toUpperCase(); colors[h] = (colors[h] || 0) + 1; } const sorted = Object.keys(colors).sort((a,b) => colors[b]-colors[a]).slice(0, 10); const container = document.getElementById('design-palette'); container.innerHTML = ""; sorted.forEach(hex => { const div = document.createElement('div'); div.className = "w-8 h-8 rounded border border-zinc-800 cursor-pointer"; div.style.backgroundColor = hex; div.onclick = () => { const r = parseInt(hex.slice(1,3), 16), g = parseInt(hex.slice(3,5), 16), b = parseInt(hex.slice(5,7), 16); targetRGB = [r,g,b]; document.getElementById('color-old').style.backgroundColor = hex; }; container.appendChild(div); }); }
        function applyColor() { const area = selectArea || {x:0, y:0, w:canvas.width, h:canvas.height}; const id = ctx.getImageData(area.x, area.y, area.w, area.h); const d = id.data, hex = document.getElementById('custom-picker').value, rN = parseInt(hex.slice(1,3),16), gN = parseInt(hex.slice(3,5),16), bN = parseInt(hex.slice(5,7),16); for(let i=0; i<d.length; i+=4) { if(d[i+3]<10) continue; const diff = Math.sqrt(Math.pow(d[i]-targetRGB[0],2)+Math.pow(d[i+1]-targetRGB[1],2)+Math.pow(d[i+2]-targetRGB[2],2)); if(diff < 35) { d[i]=rN; d[i+1]=gN; d[i+2]=bN; } } ctx.putImageData(id, area.x, area.y); selectionBox.style.display='none'; selectArea=null; }
        function removeBG() { const id = ctx.getImageData(0,0,canvas.width,canvas.height); const d = id.data; for(let i=0; i<d.length; i+=4) { const diff = Math.sqrt(Math.pow(d[i]-targetRGB[0],2)+Math.pow(d[i+1]-targetRGB[1],2)+Math.pow(d[i+2]-targetRGB[2],2)); if(diff < 45) d[i+3]=0; } ctx.putImageData(id,0,0); }
        function upscaleIA(f) { const tc = document.createElement('canvas'); tc.width = canvas.width*f; tc.height = canvas.height*f; tc.getContext('2d').drawImage(canvas,0,0,tc.width,tc.height); canvas.width = tc.width; canvas.height = tc.height; ctx.drawImage(tc,0,0); updateTransform(); }
        function applyIA() { ctx.filter = 'contrast(120%)'; ctx.drawImage(canvas,0,0); ctx.filter = 'none'; }
        function openExport() { if(!originalImg) return; document.getElementById('export-modal').style.display='flex'; }
        function closeExport() { document.getElementById('export-modal').style.display='none'; }
        function download() { const oc = document.createElement('canvas'); oc.width = document.getElementById('exp-width').value; oc.height = document.getElementById('exp-height').value; const octx = oc.getContext('2d'); octx.imageSmoothingEnabled = true; octx.imageSmoothingQuality = document.getElementById('exp-quality').value; octx.drawImage(canvas,0,0,oc.width,oc.height); const a = document.createElement('a'); a.download = 'jj_premium.png'; a.href = oc.toDataURL(); a.click(); closeExport(); }
        function quickBG(c) { targetRGB = c === 'white' ? [255,255,255] : [0,0,0]; removeBG(); }
        function reset() { if(originalImg) ctx.drawImage(originalImg,0,0); selectionBox.style.display='none'; }
        
        // CORRECCIÓN DE PROPORCIÓN Y ETIQUETAS
        function syncDim(type) { 
            if(!document.getElementById('exp-ratio').checked || !originalImg) return; 
            const w = document.getElementById('exp-width'); 
            const h = document.getElementById('exp-height'); 
            if(type === 'w') { h.value = Math.round(w.value / ratio); } 
            else { w.value = Math.round(h.value * ratio); } 
        }
        function setBg(c) { viewport.style.backgroundColor = c; }
        function convertUnits() {} 
    </script>
</body>
</html>
