<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>J&J PREMIUM - Studio Master</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Lato:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Lato', sans-serif; background: #050505; color: white; margin: 0; overflow: hidden; }
        .bg-premium { background: radial-gradient(circle at center, #250000 0%, #050505 100%); }
        
        /* Layout Híbrido */
        .tool-view { display: none; grid-template-columns: 1fr 380px; height: calc(100vh - 65px); }
        @media (max-width: 1024px) {
            .tool-view { grid-template-columns: 1fr; grid-template-rows: 1fr 300px; }
            .sidebar { width: 100% !important; border-left: none; border-top: 2px solid #dc2626; overflow-y: auto; }
        }

        .active-view { display: grid !important; }
        .viewport { position: relative; overflow: hidden; display: flex; align-items: center; justify-content: center; background: #0a0a0a; touch-action: none; }
        #zoom-container { transform-origin: center center; position: absolute; will-change: transform; }
        canvas { box-shadow: 0 0 50px #000; }
        
        .sidebar { background: #0a0a0a; border-left: 1px solid #222; padding: 20px; display: flex; flex-direction: column; gap: 15px; z-index: 50; }
        .card { background: #111; border: 1px solid #222; border-radius: 12px; padding: 15px; }
        
        .btn-jj { background: #dc2626; font-weight: 900; text-transform: uppercase; border-radius: 10px; padding: 14px; width: 100%; transition: 0.2s; }
        .btn-restore { background: #facc15; color: #000; font-weight: 900; border-radius: 10px; padding: 12px; width: 100%; }
        .input-jj { background: #000; border: 1px solid #333; border-radius: 6px; padding: 10px; color: #dc2626; font-weight: 900; font-size: 13px; width: 100%; outline: none; }

        #export-modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.95); z-index: 3000; align-items: center; justify-content: center; padding: 20px; backdrop-filter: blur(10px); }
        .modal-content { background: #0a0a0a; border: 1px solid #dc2626; border-radius: 20px; width: 100%; max-width: 450px; padding: 25px; }
        
        .color-tag { width: 28px; height: 28px; border-radius: 6px; border: 1px solid #333; cursor: pointer; }
    </style>
</head>
<body>

    <header class="h-[65px] px-4 md:px-8 flex justify-between items-center bg-black border-b border-red-900/40">
        <div class="flex items-center gap-2 cursor-pointer" onclick="window.location.reload()">
            <div class="w-10 h-10 bg-red-600 rounded flex items-center justify-center font-black text-xl">J&J</div>
            <h1 class="font-black text-sm md:text-lg uppercase italic tracking-tighter">J&J <span class="text-red-600">PREMIUM</span></h1>
        </div>
        <a href="https://wa.me/51916689969" target="_blank" class="bg-red-600 px-4 py-2 rounded-lg text-[10px] font-black uppercase">VIP</a>
    </header>

    <section id="view-home" class="h-[calc(100vh-65px)] bg-premium flex flex-col items-center justify-center p-6 text-center overflow-y-auto">
        <h2 class="text-5xl md:text-7xl font-black italic mb-2 uppercase tracking-tighter">J&J PREMIUM</h2>
        <p class="text-zinc-500 font-bold uppercase text-[10px] tracking-[0.5em] mb-12">STUDIO DE PRODUCCIÓN TEXTIL</p>

        <div class="grid grid-cols-1 md:grid-cols-3 gap-6 w-full max-w-6xl">
            <div onclick="initTool('color')" class="bg-black/40 p-10 rounded-[2.5rem] border border-white/5 hover:border-red-600 transition-all cursor-pointer">
                <span class="text-5xl block mb-4">🎨</span>
                <h3 class="font-black uppercase text-xl italic mb-2">Colorizador</h3>
                <p class="text-[10px] text-zinc-500 uppercase font-bold italic">Paleta automática y comparativa Antes/Después</p>
            </div>
            <div onclick="initTool('bg')" class="bg-black/40 p-10 rounded-[2.5rem] border border-white/5 hover:border-red-600 transition-all cursor-pointer">
                <span class="text-5xl block mb-4 text-red-600">✂️</span>
                <h3 class="font-black uppercase text-xl italic mb-2 text-red-600">Quitar Fondo</h3>
                <p class="text-[10px] text-zinc-500 uppercase font-bold italic">Limpieza Pro para DTF y Serigrafía</p>
            </div>
            <div onclick="initTool('ia')" class="bg-black/40 p-10 rounded-[2.5rem] border border-white/5 hover:border-red-600 transition-all cursor-pointer">
                <span class="text-5xl block mb-4">✨</span>
                <h3 class="font-black uppercase text-xl italic mb-2">Mejorador IA</h3>
                <p class="text-[10px] text-zinc-500 uppercase font-bold italic">Reescalado HD x2 y nitidez extrema</p>
            </div>
        </div>
    </section>

    <section id="view-tool" class="tool-view">
        <main class="viewport" id="viewport">
            <div id="zoom-container"><canvas id="canvas"></canvas></div>
        </main>

        <aside class="sidebar custom-scroll">
            <button onclick="window.location.reload()" class="bg-zinc-900 text-red-500 font-black py-4 rounded-xl text-[11px] uppercase tracking-widest border border-red-900/20">← VOLVER AL MENÚ</button>
            
            <div class="card">
                <label class="text-[9px] font-black text-zinc-500 uppercase block mb-1">Cargar Archivo</label>
                <input type="file" id="upload" class="text-[10px] w-full text-zinc-500 file:bg-red-600 file:text-white file:border-none file:px-2 file:rounded" accept="image/*"/>
            </div>

            <div id="panel-color" class="hidden space-y-4">
                <div class="card border-red-600/30">
                    <h3 class="text-red-500 font-black text-[10px] uppercase mb-4 italic text-center underline">Colores Detectados</h3>
                    <div id="design-palette" class="flex flex-wrap gap-2 mb-4 justify-center"></div>
                    <div class="grid grid-cols-2 gap-4 mb-4">
                        <div class="text-center">
                            <p class="text-[8px] text-zinc-600 font-black uppercase mb-1">Original</p>
                            <div id="color-old" class="w-full h-12 rounded-lg border border-white/10 bg-zinc-900"></div>
                        </div>
                        <div class="text-center">
                            <p class="text-[8px] text-red-500 font-black uppercase mb-1 italic">Nuevo</p>
                            <input type="color" id="custom-picker" class="w-full h-12 bg-transparent border-none p-0 cursor-pointer">
                        </div>
                    </div>
                    <button onclick="applyColorAction()" class="btn-jj text-[11px]">Actualizar Tinta</button>
                </div>
            </div>

            <div id="panel-bg" class="hidden space-y-4">
                <div class="card border-red-600/30">
                    <div class="grid grid-cols-2 gap-2 mb-4">
                        <button onclick="quickRemove('white')" class="py-3 bg-white text-black text-[9px] font-black rounded uppercase">Quitar Blanco</button>
                        <button onclick="quickRemove('black')" class="py-3 bg-zinc-800 text-white text-[9px] font-black rounded uppercase">Quitar Negro</button>
                    </div>
                    <label class="text-[9px] font-black text-zinc-500 uppercase flex justify-between">Sensibilidad <span id="bg-sens-text" class="text-red-600">35</span></label>
                    <input type="range" id="bg-sensitivity" min="1" max="150" value="35" class="w-full accent-red-600" oninput="document.getElementById('bg-sens-text').innerText=this.value">
                    <button onclick="applyBgRemovePro()" class="btn-jj text-[11px] mt-4">Borrar Seleccionado</button>
                </div>
            </div>

            <div id="panel-ia" class="hidden space-y-4">
                <div class="card border-red-600/30">
                    <button onclick="upscaleIA(2)" class="w-full py-4 bg-zinc-900 text-red-500 font-black text-[10px] rounded-xl mb-2 border border-red-900/30 uppercase">Reescalar HD (x2)</button>
                    <button onclick="applyBetterIA()" class="btn-jj text-[11px]">Realzar Nitidez</button>
                </div>
            </div>

            <div class="mt-auto space-y-3">
                <button onclick="resetToOriginal()" class="btn-restore text-[10px] italic">RESTAURAR ORIGINAL</button>
                <button onclick="openExportModal()" class="w-full py-5 bg-white text-black font-black rounded-xl text-[12px] uppercase shadow-2xl active:scale-95 transition-all">Panel de Descarga</button>
            </div>
        </aside>
    </section>

    <div id="export-modal">
        <div class="modal-content">
            <h3 class="text-red-600 font-black text-lg uppercase italic mb-6 text-center underline decoration-2">Opciones de Salida J&J</h3>
            <div class="grid grid-cols-2 gap-4 mb-4">
                <div>
                    <label class="text-[9px] font-black text-zinc-500 uppercase">Unidad</label>
                    <select id="exp-unit" class="input-jj" onchange="convertUnits()"><option value="px">Píxeles</option><option value="cm">Centímetros (cm)</option><option value="mm">Milímetros (mm)</option></select>
                </div>
                <div>
                    <label class="text-[9px] font-black text-zinc-500 uppercase">Resolución (DPI)</label>
                    <input type="number" id="exp-dpi" value="300" class="input-jj" oninput="convertUnits()">
                </div>
            </div>
            <div class="grid grid-cols-2 gap-4 mb-4">
                <div>
                    <label class="text-[9px] font-black text-zinc-500 uppercase">Ancho</label>
                    <input type="number" id="exp-width" class="input-jj" oninput="syncDim('w')">
                </div>
                <div>
                    <label class="text-[9px] font-black text-zinc-500 uppercase">Alto</label>
                    <input type="number" id="exp-height" class="input-jj" oninput="syncDim('h')">
                </div>
            </div>
            <div class="flex items-center gap-3 justify-center mb-6">
                <input type="checkbox" id="exp-ratio" checked class="accent-red-600 w-5 h-5">
                <label class="text-[10px] font-black text-red-500 uppercase">Mantener Proporción</label>
            </div>
            <div class="flex gap-3">
                <button onclick="closeExportModal()" class="flex-1 py-4 bg-zinc-900 text-zinc-500 font-black text-[10px] rounded-xl">CANCELAR</button>
                <button onclick="downloadPro()" class="flex-1 btn-jj text-[11px] text-white">DESCARGAR</button>
            </div>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('canvas'), ctx = canvas.getContext('2d', { willReadFrequently: true });
        const viewport = document.getElementById('viewport'), zoomContainer = document.getElementById('zoom-container');
        const upload = document.getElementById('upload');
        let originalImg = null, scale = 1, posX = 0, posY = 0, ratio = 1, targetRGB = [0,0,0], lastTouchDist = 0;

        function initTool(tool) {
            document.getElementById('view-home').style.display = 'none';
            document.getElementById('view-tool').classList.add('active-view');
            document.getElementById('panel-color').classList.toggle('hidden', tool !== 'color');
            document.getElementById('panel-bg').classList.toggle('hidden', tool !== 'bg');
            document.getElementById('panel-ia').classList.toggle('hidden', tool !== 'ia');
        }

        upload.onchange = (e) => {
            const reader = new FileReader();
            reader.onload = (ev) => {
                const img = new Image();
                img.onload = () => {
                    canvas.width = img.width; canvas.height = img.height;
                    ctx.drawImage(img, 0, 0);
                    originalImg = img; ratio = img.width / img.height;
                    extractPalette();
                    document.getElementById('exp-width').value = img.width;
                    document.getElementById('exp-height').value = img.height;
                    scale = 0.5; updateTransform();
                };
                img.src = ev.target.result;
            };
            reader.readAsDataURL(e.target.files[0]);
        };

        function extractPalette() {
            const data = ctx.getImageData(0,0,canvas.width,canvas.height).data;
            const colors = {};
            for(let i=0; i<data.length; i+=Math.floor(data.length/1000)*4) {
                if(data[i+3] < 200) continue;
                const h = "#" + ((1 << 24) + (data[i] << 16) + (data[i+1] << 8) + data[i+2]).toString(16).slice(1).toUpperCase();
                colors[h] = (colors[h] || 0) + 1;
            }
            const sorted = Object.keys(colors).sort((a,b) => colors[b]-colors[a]).slice(0, 10);
            const container = document.getElementById('design-palette');
            container.innerHTML = "";
            sorted.forEach(hex => {
                const div = document.createElement('div');
                div.className = "color-tag"; div.style.backgroundColor = hex;
                div.onclick = () => {
                    const r = parseInt(hex.slice(1,3), 16), g = parseInt(hex.slice(3,5), 16), b = parseInt(hex.slice(5,7), 16);
                    targetRGB = [r,g,b];
                    document.getElementById('color-old').style.backgroundColor = hex;
                };
                container.appendChild(div);
            });
        }

        // CONTROL TÁCTIL Y RATÓN
        viewport.addEventListener('touchstart', (e) => {
            if(!originalImg) return;
            if(e.touches.length === 2) { lastTouchDist = Math.hypot(e.touches[0].pageX - e.touches[1].pageX, e.touches[0].pageY - e.touches[1].pageY); }
            else {
                isPanning = true; startX = e.touches[0].pageX - posX; startY = e.touches[0].pageY - posY;
                const rect = canvas.getBoundingClientRect();
                const tx = (e.touches[0].pageX - rect.left) / scale;
                const ty = (e.touches[0].pageY - rect.top) / scale;
                if(tx >= 0 && tx < canvas.width && ty >= 0 && ty < canvas.height) {
                    const p = ctx.getImageData(tx, ty, 1, 1).data;
                    targetRGB = [p[0], p[1], p[2]];
                    document.getElementById('color-old').style.backgroundColor = `rgb(${p[0]},${p[1]},${p[2]})`;
                }
            }
        }, {passive: true});

        viewport.addEventListener('touchmove', (e) => {
            if(!originalImg) return;
            if(e.touches.length === 2) {
                e.preventDefault();
                const dist = Math.hypot(e.touches[0].pageX - e.touches[1].pageX, e.touches[0].pageY - e.touches[1].pageY);
                scale *= (dist / lastTouchDist); lastTouchDist = dist;
            } else if(isPanning) {
                posX = e.touches[0].pageX - startX; posY = e.touches[0].pageY - startY;
            }
            updateTransform();
        }, {passive: false});

        viewport.onwheel = (e) => { if(!originalImg) return; e.preventDefault(); scale *= (e.deltaY > 0 ? 0.9 : 1.1); updateTransform(); };

        function updateTransform() { zoomContainer.style.transform = `translate(${posX}px, ${posY}px) scale(${scale})`; }

        // CORE LOGIC
        function applyColorAction() {
            const id = ctx.getImageData(0,0,canvas.width,canvas.height); const d = id.data;
            const hex = document.getElementById('custom-picker').value;
            const rN = parseInt(hex.slice(1,3),16), gN = parseInt(hex.slice(3,5),16), bN = parseInt(hex.slice(5,7),16);
            for(let i=0; i<d.length; i+=4) {
                if(d[i+3]<10) continue;
                const diff = Math.sqrt(Math.pow(d[i]-targetRGB[0],2)+Math.pow(d[i+1]-targetRGB[1],2)+Math.pow(d[i+2]-targetRGB[2],2));
                if(diff < 30) { d[i]=rN; d[i+1]=gN; d[i+2]=bN; }
            }
            ctx.putImageData(id,0,0);
        }

        function applyBgRemovePro() {
            const id = ctx.getImageData(0,0,canvas.width,canvas.height); const d = id.data;
            const s = parseInt(document.getElementById('bg-sensitivity').value);
            for(let i=0; i<d.length; i+=4) {
                const diff = Math.sqrt(Math.pow(d[i]-targetRGB[0],2)+Math.pow(d[i+1]-targetRGB[1],2)+Math.pow(d[i+2]-targetRGB[2],2));
                if(diff < s) d[i+3]=0;
            }
            ctx.putImageData(id,0,0);
        }

        function upscaleIA(f) {
            const tc = document.createElement('canvas'); tc.width = canvas.width*f; tc.height = canvas.height*f;
            tc.getContext('2d').drawImage(canvas,0,0,tc.width,tc.height);
            canvas.width = tc.width; canvas.height = tc.height; ctx.drawImage(tc,0,0); updateTransform();
        }

        function applyBetterIA() { ctx.filter = 'contrast(120%) brightness(102%)'; ctx.drawImage(canvas,0,0); ctx.filter = 'none'; }
        function resetToOriginal() { if(originalImg) ctx.drawImage(originalImg,0,0); }
        function quickRemove(color) { targetRGB = color === 'white' ? [255,255,255] : [0,0,0]; applyBgRemovePro(); }

        // EXPORT LOGIC
        function syncDim(type) { if(!document.getElementById('exp-ratio').checked) return; const w = document.getElementById('exp-width'), h = document.getElementById('exp-height'); if(type === 'w') h.value = Math.round(w.value / ratio); else w.value = Math.round(h.value * ratio); }
        function convertUnits() { const u = document.getElementById('exp-unit').value, dpi = document.getElementById('exp-dpi').value; let w = canvas.width, h = canvas.height; if(u === 'cm') { w = (canvas.width/dpi*2.54).toFixed(2); h = (canvas.height/dpi*2.54).toFixed(2); } else if(u === 'mm') { w = (canvas.width/dpi*25.4).toFixed(2); h = (canvas.height/dpi*25.4).toFixed(2); } document.getElementById('exp-width').value = w; document.getElementById('exp-height').value = h; }
        function openExportModal() { document.getElementById('export-modal').style.display='flex'; }
        function closeExportModal() { document.getElementById('export-modal').style.display='none'; }
        function downloadPro() {
            const oc = document.createElement('canvas'); oc.width = document.getElementById('exp-width').value; oc.height = document.getElementById('exp-height').value;
            oc.getContext('2d').drawImage(canvas,0,0,oc.width,oc.height);
            const a = document.createElement('a'); a.download = 'jj_premium_final.png'; a.href = oc.toDataURL(); a.click(); closeExportModal();
        }
    </script>
</body>
</html>
