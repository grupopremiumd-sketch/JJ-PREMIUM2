    <style>
        body { font-family: 'Lato', sans-serif; background: #050505; color: white; margin: 0; overflow: hidden; position: fixed; width: 100%; height: 100%; }
        .bg-premium { background: radial-gradient(circle at center, #250000 0%, #050505 100%); }
        .tool-view { display: none; height: calc(100vh - 65px); width: 100%; }
        @media (min-width: 1025px) {

            .viewport { flex-grow: 1; height: 100%; cursor: crosshair; }
            .sidebar { width: 350px; min-width: 350px; border-left: 2px solid #222; }
        }
        @media (max-width: 1024px) {
            .tool-view { display: flex; flex-direction: column; }
            .viewport { flex-grow: 1; width: 100%; }
            .sidebar { width: 100%; height: 320px; border-top: 2px solid #dc2626; overflow-y: auto; }
        }
        .active-view { display: flex !important; }
        .viewport { position: relative; overflow: hidden; display: flex; align-items: center; justify-content: center; background: #0a0a0a; touch-action: none; }
        #zoom-container { transform-origin: center center; position: absolute; transition: transform 0.08s ease-out; pointer-events: none; }
        canvas { box-shadow: 0 0 60px #000; pointer-events: auto; }
        #selection-box { position: absolute; border: 2px dashed #dc2626; display: none; pointer-events: none; z-index: 100; background: rgba(220,38,38,0.15); }
        .sidebar { background: #0a0a0a; padding: 15px; display: flex; flex-direction: column; gap: 12px; z-index: 50; }

        .btn-jj { background: #dc2626; font-weight: 900; text-transform: uppercase; border-radius: 10px; padding: 14px; width: 100%; }
        .btn-download-top { background: linear-gradient(to bottom, #facc15, #eab308); color: black; font-weight: 900; text-transform: uppercase; border-radius: 8px; padding: 8px 15px; font-size: 11px; display: none; box-shadow: 0 0 15px rgba(250,204,21,0.4); border: none; cursor: pointer; }
    </style>
</head>
<body>

    </header>

    <!-- MENU INICIAL -->
    <section id="view-home" class="h-[calc(100vh-65px)] bg-premium flex flex-col items-center py-10 px-6 overflow-y-auto">
        <h2 class="text-5xl md:text-7xl font-black italic mb-2 uppercase text-center text-white tracking-tighter">J&J PREMIUM</h2>
        <p class="text-zinc-500 font-bold uppercase text-[9px] tracking-[0.4em] mb-12 italic text-center">Software Master de Producción Textil</p>
        
        <div class="grid grid-cols-1 md:grid-cols-3 gap-6 w-full max-w-6xl mb-12">

                <h3 class="font-black uppercase text-xl italic mb-1 text-white">Extractor de Tintas</h3>
            </div>
            <div onclick="initTool('bg')" class="bg-black/40 p-8 rounded-[2rem] border border-white/5 cursor-pointer hover:border-red-600 text-center">
                <div class="w-24 h-12 mx-auto mb-4 bg-zinc-800 rounded border border-dashed border-zinc-600 flex items-center justify-center"><span class="text-[10px] font-black text-zinc-400">PNG PRO</span></div>
                <h3 class="font-black uppercase text-xl italic mb-1 text-red-600">Quitar Fondo</h3>
            </div>
            <div onclick="initTool('ia')" class="bg-black/40 p-8 rounded-[2rem] border border-white/5 cursor-pointer hover:border-red-600 text-center">
                <div class="flex justify-center items-center mb-4 gap-2"><span class="text-zinc-700 text-lg">A</span><span class="text-3xl text-white font-black">A</span></div>
                <h3 class="font-black uppercase text-xl italic mb-1 text-white">Mejorador IA</h3>
            </div>
        </div>

        <div class="grid grid-cols-1 md:grid-cols-2 gap-4 w-full max-w-2xl pb-10">
            <a href="https://wa.me/51916689969" target="_blank" class="bg-white/5 p-6 rounded-2xl border border-white/10 flex items-center justify-between text-white hover:bg-green-600/20 transition-all">
                <div class="flex items-center gap-3">👑 <h4 class="font-black text-xs uppercase italic">Suscribirme</h4></div>
                <span>➔</span>
            </a>
            <a href="https://wa.me/51904503246" target="_blank" class="bg-white/5 p-6 rounded-2xl border border-white/10 flex items-center justify-between text-white hover:bg-red-600/20 transition-all">
                <div class="flex items-center gap-3">🔄 <h4 class="font-black text-xs uppercase italic">Renovar</h4></div>
                <span>➔</span>
            </a>

    <!-- WORKSPACE -->
    <section id="view-tool" class="tool-view">
        <main class="viewport" id="viewport">
            <div id="zoom-container"><canvas id="canvas"></canvas><div id="selection-box"></div></div>
        </main>
        <aside class="sidebar">
            <button onclick="window.location.reload()" class="bg-zinc-900 text-red-500 font-black py-4 rounded-xl text-[10px] uppercase border border-red-900/20 w-full mb-2">← VOLVER</button>
            <div class="card"><input type="file" id="upload" class="text-[10px] w-full text-zinc-500" accept="image/*"/></div>

            <!-- PANEL EXTRACTOR -->
            <div id="panel-color" class="hidden card border-red-600/30 space-y-4">
                <button onclick="manualScan()" class="w-full py-2 bg-zinc-800 text-[8px] font-black rounded mb-3 uppercase">Escanear Colores</button>
                <div id="design-palette" class="flex flex-wrap gap-2 justify-center mb-4 min-h-[40px]"></div>
                <div class="grid grid-cols-2 gap-4">
                    <div class="text-center"><p class="text-[8px] font-black uppercase mb-1">Actual</p><div id="color-old" class="w-full h-10 rounded-lg border border-white/10 bg-zinc-900"></div></div>
                    <div class="text-center"><p class="text-[8px] text-red-500 font-black uppercase mb-1">Nuevo</p><input type="color" id="custom-picker" class="w-full h-10 bg-transparent border-none p-0 cursor-pointer"></div>
                </div>
                <button onclick="applyColor()" class="btn-jj text-[10px] mt-4">Actualizar Tinta</button>
            </div>

            <!-- PANEL QUITAR FONDO -->
            <div id="panel-bg" class="hidden card border-red-600/30 space-y-4">
                <div id="bg-color-preview" class="w-full h-8 rounded border border-white/10 bg-zinc-900"></div>
                <div>
                    <label class="text-[9px] font-black text-zinc-600 uppercase mb-1 block">Tolerancia</label>
                    <input type="range" id="bg-tolerance" min="1" max="150" value="40" class="w-full accent-red-600">
                </div>
                <div>
                    <label class="text-[9px] font-black text-zinc-600 uppercase mb-1 block">Suavizado</label>
                    <input type="range" id="bg-smooth" min="0" max="10" value="1" class="w-full accent-red-600">
                </div>
                <button onclick="removeBG()" class="btn-jj text-[10px]">Quitar Fondo</button>
            </div>

            <div id="panel-ia" class="hidden card border-red-600/30 space-y-4">
                <button onclick="upscaleIA(2)" class="w-full py-4 bg-zinc-900 text-red-500 font-black text-[10px] rounded-xl border border-red-900/30 uppercase italic">Upscale HD x2</button>
                <button onclick="applyIA()" class="btn-jj text-[11px]">Nitidez Master</button>
            </div>
            
            <div class="flex gap-4 justify-center py-2"><button onclick="setBg('#ffffff')" class="w-7 h-7 bg-white rounded-full border border-zinc-200"></button><button onclick="setBg('#0a0a0a')" class="w-7 h-7 bg-black rounded-full border border-white/10"></button><button onclick="setBg('#cbd5e1')" class="w-7 h-7 bg-slate-400 rounded-full border border-zinc-400"></button></div>
            <button onclick="reset()" class="w-full py-3 bg-zinc-900 text-yellow-500 font-black rounded-xl text-[10px] uppercase italic">Restaurar Original</button>
        </aside>
    </section>

    <script>
        const canvas = document.getElementById('canvas'), ctx = canvas.getContext('2d', { willReadFrequently: true });
        const viewport = document.getElementById('viewport'), zoomContainer = document.getElementById('zoom-container');
        const upload = document.getElementById('upload'), selectionBox = document.getElementById('selection-box');
        let originalImg = null, scale = 1, posX = 0, posY = 0, ratio = 1, targetRGB = [0,0,0], lastDist = 0;
        let isSelecting = false, isPanning = false, startX, startY, selectArea = null, currentTool = '';

        function initTool(tool) {
            currentTool = tool;
            document.getElementById('view-home').style.display = 'none';
            document.getElementById('view-tool').classList.add('active-view');
            document.getElementById('panel-color').classList.toggle('hidden', tool !== 'color');
            document.getElementById('panel-bg').classList.toggle('hidden', tool !== 'bg');
            document.getElementById('panel-ia').classList.toggle('hidden', tool !== 'ia');
            document.getElementById('btn-top-dl').style.display = 'block';
        }

        upload.onchange = (e) => {
            const reader = new FileReader();
            reader.onload = (ev) => {
                const img = new Image();
                img.onload = () => {
                    canvas.width = img.width; canvas.height = img.height;
                    ctx.drawImage(img, 0, 0); originalImg = img; ratio = img.width/img.height;
                    scale = 0.5; posX = 0; posY = 0; updateTransform();
                };
                img.src = ev.target.result;
            };
            reader.readAsDataURL(e.target.files[0]);
        };

        // ZOOM & PANNING
        viewport.onwheel = (e) => { if (!originalImg) return; e.preventDefault(); scale = Math.max(0.05, Math.min(20, scale * (e.deltaY > 0 ? 0.9 : 1.1))); updateTransform(); };
        
        viewport.addEventListener('mousedown', (e) => {
            if (!originalImg) return;
            const rect = canvas.getBoundingClientRect();
            const tx = (e.clientX - rect.left) / scale;
            const ty = (e.clientY - rect.top) / scale;
            if (e.button === 2 || e.button === 1 || (e.button === 0 && currentTool !== 'color')) { isPanning = true; startX = e.clientX - posX; startY = e.clientY - posY; captureColor(tx, ty); } 
            else if (e.button === 0 && currentTool === 'color') { isSelecting = true; startX = tx; startY = ty; selectionBox.style.display = 'block'; selectionBox.style.left = startX + 'px'; selectionBox.style.top = startY + 'px'; captureColor(startX, startY); }
        });
        window.addEventListener('mousemove', (e) => { if (isPanning) { posX = e.clientX - startX; posY = e.clientY - startY; updateTransform(); } else if (isSelecting) { const rect = canvas.getBoundingClientRect(); const cx = (e.clientX - rect.left) / scale; const cy = (e.clientY - rect.top) / scale; let x = Math.min(startX, cx), y = Math.min(startY, cy), w = Math.abs(cx - startX), h = Math.abs(cy - startY); selectionBox.style.left = x + 'px'; selectionBox.style.top = y + 'px'; selectionBox.style.width = w + 'px'; selectionBox.style.height = h + 'px'; selectArea = {x, y, w, h}; } });
        window.addEventListener('mouseup', () => { isSelecting = isPanning = false; });
        viewport.addEventListener('contextmenu', e => e.preventDefault());

        viewport.addEventListener('touchstart', (e) => {
            if(!originalImg) return;
            const rect = canvas.getBoundingClientRect();
            const tx = (e.touches[0].clientX - rect.left) / scale;
            const ty = (e.touches[0].clientY - rect.top) / scale;
            if(e.touches.length === 2) { lastDist = Math.hypot(e.touches[0].pageX - e.touches[1].pageX, e.touches[0].pageY - e.touches[1].pageY); isPanning = true; } 
            else { if(currentTool === 'color') { isSelecting = true; startX = tx; startY = ty; selectionBox.style.display = 'block'; selectionBox.style.left = startX + 'px'; selectionBox.style.top = startY + 'px'; captureColor(startX, startY); } else { isPanning = true; startX = e.touches[0].clientX - posX; startY = e.touches[0].clientY - posY; captureColor(tx, ty); } }
        }, {passive: false});
        viewport.addEventListener('touchmove', (e) => { if(!originalImg) return; e.preventDefault(); if(e.touches.length === 2) { const dist = Math.hypot(e.touches[0].pageX - e.touches[1].pageX, e.touches[0].pageY - e.touches[1].pageY); scale *= (dist/lastDist); lastDist = dist; } else if(isSelecting) { const rect = canvas.getBoundingClientRect(); const cx = (e.touches[0].clientX - rect.left) / scale; const cy = (e.touches[0].clientY - rect.top) / scale; let x = Math.min(startX, cx), y = Math.min(startY, cy), w = Math.abs(cx - startX), h = Math.abs(cy - startY); selectionBox.style.left = x + 'px'; selectionBox.style.top = y + 'px'; selectionBox.style.width = w + 'px'; selectionBox.style.height = h + 'px'; selectArea = {x, y, w, h}; } else if(isPanning) { posX = e.touches[0].clientX - startX; posY = e.touches[0].clientY - startY; } updateTransform(); }, {passive: false});

        function captureColor(x, y) { const p = ctx.getImageData(Math.max(0,Math.min(x,canvas.width-1)), Math.max(0,Math.min(y,canvas.height-1)), 1, 1).data; targetRGB = [p[0], p[1], p[2]]; const hex = `rgb(${p[0]},${p[1]},${p[2]})`; document.getElementById('color-old').style.backgroundColor = hex; document.getElementById('bg-color-preview').style.backgroundColor = hex; }
        function updateTransform() { zoomContainer.style.transform = `translate(${posX}px, ${posY}px) scale(${scale})`; }

        // --- FUNCIÓN MAESTRA DE DESCARGA: INYECTA 300 DPI ---
        async function downloadPNGWith300DPI() {
            if(!originalImg) return;
            
            const dataUrl = canvas.toDataURL('image/png');
            const response = await fetch(dataUrl);
            const blob = await response.blob();
            const arrayBuffer = await blob.arrayBuffer();
            
            const uint8Array = new Uint8Array(arrayBuffer);
            
            // Definir 300 DPI en píxeles por metro (pHYs chunk)
            // 300 dpi / 0.0254 metros = 11811 píxeles/metro
            const dpi = 300;
            const pixelsPerMeter = Math.round(dpi / 0.0254);
            
            // Crear el chunk pHYs
            const pHYsChunk = new Uint8Array(21);
            pHYsChunk.set([0, 0, 0, 9, 112, 72, 89, 115]); // Length (9), 'pHYs'
            
            const view = new DataView(pHYsChunk.buffer);
            view.setUint32(8, pixelsPerMeter); // X pixels per meter
            view.setUint32(12, pixelsPerMeter); // Y pixels per meter
            view.setUint8(16, 1); // Unit is meter
            
            // Calcular CRC para pHYs
            const crc = calculateCRC(pHYsChunk.slice(4, 17));
            view.setUint32(17, crc);
            
            // Insertar el chunk después del header de PNG e IHDR
            const finalPNG = new Uint8Array(uint8Array.length + 21);
            finalPNG.set(uint8Array.slice(0, 33)); // Header + IHDR
            finalPNG.set(pHYsChunk, 33);
            finalPNG.set(uint8Array.slice(33), 33 + 21);
            
            const finalBlob = new Blob([finalPNG], { type: 'image/png' });
            const url = URL.createObjectURL(finalBlob);
            const a = document.createElement('a');
            a.download = `JJ_PREMIUM_300DPI_${Date.now()}.png`;
            a.href = url;
            a.click();
            URL.revokeObjectURL(url);
        }

        // Utilidad para calcular el CRC del chunk PNG
        function calculateCRC(data) {
            let crc = 0xFFFFFFFF;
            const table = window.crcTable || (function() {
                const t = new Int32Array(256);
                for (let i = 0; i < 256; i++) {
                    let c = i;
                    for (let j = 0; j < 8; j++) c = (c & 1) ? (0xEDB88320 ^ (c >>> 1)) : (c >>> 1);
                    t[i] = c;
                }
                return window.crcTable = t;
            })();
            for (let i = 0; i < data.length; i++) crc = table[(crc ^ data[i]) & 0xFF] ^ (crc >>> 1);
            return (crc ^ 0xFFFFFFFF) >>> 0;
        }

        function removeBG() { const id = ctx.getImageData(0,0,canvas.width,canvas.height); const d = id.data; const tol = parseInt(document.getElementById('bg-tolerance').value); const smooth = parseInt(document.getElementById('bg-smooth').value); for(let i=0; i<d.length; i+=4) { const diff = Math.sqrt(Math.pow(d[i]-targetRGB[0],2)+Math.pow(d[i+1]-targetRGB[1],2)+Math.pow(d[i+2]-targetRGB[2],2)); if(diff < tol) { if (smooth > 0 && diff > (tol - smooth * 5)) { d[i+3] = ((diff - (tol - smooth * 5)) / (smooth * 5)) * 255; } else { d[i+3] = 0; } } } ctx.putImageData(id,0,0); }
        function applyColor() { const area = selectArea || {x:0, y:0, w:canvas.width, h:canvas.height}; const id = ctx.getImageData(area.x, area.y, area.w, area.h); const d = id.data, hex = document.getElementById('custom-picker').value, rN = parseInt(hex.slice(1,3),16), gN = parseInt(hex.slice(3,5),16), bN = parseInt(hex.slice(5,7),16); for(let i=0; i<d.length; i+=4) { if(d[i+3]<10) continue; const diff = Math.sqrt(Math.pow(d[i]-targetRGB[0],2)+Math.pow(d[i+1]-targetRGB[1],2)+Math.pow(d[i+2]-targetRGB[2],2)); if(diff < 35) { d[i]=rN; d[i+1]=gN; d[i+2]=bN; } } ctx.putImageData(id, area.x, area.y); selectionBox.style.display='none'; selectArea=null; }
        function manualScan() { if(!originalImg) return; const data = ctx.getImageData(0,0,canvas.width,canvas.height).data; const colors = {}; for(let i=0; i<data.length; i+=Math.max(4, Math.floor(data.length/2000)*4)) { if(data[i+3] < 128) continue; const h = "#" + ((1 << 24) + (data[i] << 16) + (data[i+1] << 8) + data[i+2]).toString(16).slice(1).toUpperCase(); colors[h] = (colors[h] || 0) + 1; } const sorted = Object.keys(colors).sort((a,b) => colors[b]-colors[a]).slice(0, 10); const container = document.getElementById('design-palette'); container.innerHTML = ""; sorted.forEach(hex => { const div = document.createElement('div'); div.className = "w-8 h-8 rounded border border-zinc-800 cursor-pointer"; div.style.backgroundColor = hex; div.onclick = () => { const r = parseInt(hex.slice(1,3), 16), g = parseInt(hex.slice(3,5), 16), b = parseInt(hex.slice(5,7), 16); targetRGB = [r,g,b]; document.getElementById('color-old').style.backgroundColor = hex; document.getElementById('bg-color-preview').style.backgroundColor = hex; }; container.appendChild(div); }); }
        function upscaleIA(f) { const tc = document.createElement('canvas'); tc.width = canvas.width*f; tc.height = canvas.height*f; tc.getContext('2d').drawImage(canvas,0,0,tc.width,tc.height); canvas.width = tc.width; canvas.height = tc.height; ctx.drawImage(tc,0,0); updateTransform(); }
        function applyIA() { ctx.filter = 'contrast(120%) brightness(102%)'; ctx.drawImage(canvas,0,0); ctx.filter = 'none'; }
        function quickBG(c) { targetRGB = c === 'white' ? [255,255,255] : [0,0,0]; removeBG(); }
        function reset() { if(originalImg) ctx.drawImage(originalImg,0,0); selectionBox.style.display='none'; }
        function setBg(c) { viewport.style.backgroundColor = c; }
    </script>
