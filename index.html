<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>J&J PREMIUM</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Lato:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Lato', sans-serif; background: #050505; color: white; margin: 0; overflow: hidden; position: fixed; width: 100%; height: 100%; }
        .bg-premium { background: radial-gradient(circle at center, #250000 0%, #050505 100%); }
        
        /* Layout Adaptable */
        .tool-view { display: none; grid-template-columns: 1fr 350px; height: calc(100vh - 65px); }
        @media (max-width: 1024px) {
            .tool-view { grid-template-columns: 1fr; grid-template-rows: 1fr 280px; }
            .sidebar { width: 100% !important; border-left: none; border-top: 2px solid #dc2626; height: 100%; overflow-y: scroll; -webkit-overflow-scrolling: touch; }
        }

        .active-view { display: grid !important; }
        .viewport { position: relative; overflow: hidden; display: flex; align-items: center; justify-content: center; background: #0a0a0a; touch-action: none; }
        #zoom-container { transform-origin: center center; position: absolute; will-change: transform; }
        canvas { box-shadow: 0 0 40px #000; background-color: transparent; }
        
        .sidebar { background: #0a0a0a; border-left: 1px solid #222; padding: 15px; display: flex; flex-direction: column; gap: 10px; z-index: 50; }
        .card { background: #111; border: 1px solid #222; border-radius: 12px; padding: 12px; }
        
        .btn-jj { background: #dc2626; font-weight: 900; text-transform: uppercase; border-radius: 8px; padding: 12px; width: 100%; }
        .btn-restore { background: #facc15; color: #000; font-weight: 900; border-radius: 8px; padding: 10px; width: 100%; }

        #export-modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.9); z-index: 3000; align-items: center; justify-content: center; padding: 20px; }
        #selection-box { position: absolute; border: 1px dashed #dc2626; pointer-events: none; display: none; }
    </style>
</head>
<body>

    <header class="h-[65px] px-4 flex justify-between items-center bg-black border-b border-red-900/40">
        <div class="flex items-center gap-2 cursor-pointer" onclick="window.location.reload()">
            <div class="w-9 h-9 bg-red-600 rounded flex items-center justify-center font-black">J&J</div>
            <h1 class="font-black text-sm uppercase italic">J&J <span class="text-red-600">PREMIUM</span></h1>
        </div>
        <div class="flex gap-2">
            <a href="https://wa.me/51916689969" class="bg-red-600 px-3 py-1.5 rounded text-[10px] font-black uppercase">VIP</a>
        </div>
    </header>

    <section id="view-home" class="h-[calc(100vh-65px)] bg-premium flex flex-col items-center justify-center p-6 text-center overflow-y-auto">
        <h2 class="text-4xl font-black italic mb-2">J&J PREMIUM</h2>
        <p class="text-zinc-500 text-[9px] tracking-widest mb-10">STUDIO DE PRODUCCIÓN</p>

        <div class="grid grid-cols-1 md:grid-cols-3 gap-4 w-full max-w-4xl">
            <div onclick="initTool('color')" class="bg-black/60 p-6 rounded-3xl border border-white/5 active:bg-red-900/20">
                <span class="text-3xl">🎨</span>
                <h3 class="font-black uppercase text-sm mt-2">Colorizador</h3>
            </div>
            <div onclick="initTool('bg')" class="bg-black/60 p-6 rounded-3xl border border-white/5 active:bg-red-900/20">
                <span class="text-3xl text-red-600">✂️</span>
                <h3 class="font-black uppercase text-sm mt-2 text-red-600">Quitar Fondo</h3>
            </div>
            <div onclick="initTool('ia')" class="bg-black/60 p-6 rounded-3xl border border-white/5 active:bg-red-900/20">
                <span class="text-3xl">✨</span>
                <h3 class="font-black uppercase text-sm mt-2">Mejorador IA</h3>
            </div>
        </div>

        <div class="mt-10 space-y-3 w-full max-w-xs">
            <a href="https://wa.me/51916689969" class="block bg-zinc-900 p-4 rounded-xl text-[10px] font-black border border-white/5 uppercase italic tracking-widest">👑 Quiero ser Premium</a>
            <a href="https://wa.me/51904503246" class="block bg-zinc-900 p-4 rounded-xl text-[10px] font-black border border-white/5 uppercase italic tracking-widest">🔄 Renovar Membresía</a>
        </div>
    </section>

    <section id="view-tool" class="tool-view">
        <main class="viewport" id="viewport">
            <div id="zoom-container">
                <canvas id="canvas"></canvas>
                <div id="selection-box"></div>
            </div>
        </main>

        <aside class="sidebar">
            <button onclick="window.location.reload()" class="bg-zinc-900 text-red-500 font-black py-3 rounded-xl text-[10px] uppercase">← VOLVER AL MENÚ</button>
            
            <div class="card">
                <input type="file" id="upload" class="text-[10px] w-full text-zinc-500" accept="image/*"/>
            </div>

            <div id="panel-color" class="hidden card border-red-600/30 space-y-3">
                <div class="flex justify-around items-center">
                    <div id="color-old" class="w-10 h-10 rounded border border-white/10"></div>
                    <span class="text-red-600 font-black">➔</span>
                    <input type="color" id="custom-picker" class="w-10 h-10 bg-transparent border-none">
                </div>
                <button onclick="applyColorAction()" class="btn-jj text-[10px]">Actualizar Tinta</button>
            </div>

            <div id="panel-bg" class="hidden card border-red-600/30 space-y-3">
                <div class="flex gap-2">
                    <button onclick="quickRemove('white')" class="flex-1 py-2 bg-white text-black text-[8px] font-black rounded">BLANCO</button>
                    <button onclick="quickRemove('black')" class="flex-1 py-2 bg-zinc-800 text-white text-[8px] font-black rounded">NEGRO</button>
                </div>
                <button onclick="applyBgRemovePro()" class="btn-jj text-[10px]">Borrar Fondo</button>
            </div>

            <div id="panel-ia" class="hidden card border-red-600/30 space-y-3">
                <button onclick="upscaleIA(2)" class="w-full py-2 bg-zinc-900 text-red-500 font-black text-[9px] rounded">HD REESCALADO X2</button>
                <button onclick="applyBetterIA()" class="btn-jj text-[10px]">NITIDEZ IA</button>
            </div>

            <div class="mt-auto space-y-2">
                <button onclick="resetToOriginal()" class="btn-restore text-[10px]">RESTAURAR ORIGINAL</button>
                <button onclick="document.getElementById('export-modal').style.display='flex'" class="w-full py-4 bg-white text-black font-black rounded-xl text-[11px] uppercase">Descargar PNG</button>
            </div>
        </aside>
    </section>

    <div id="export-modal">
        <div class="modal-content text-center">
            <h3 class="text-red-600 font-black mb-4 italic">OPCIONES DE DESCARGA</h3>
            <div class="grid grid-cols-2 gap-2 mb-4">
                <input type="number" id="exp-width" class="input-jj" placeholder="Ancho">
                <input type="number" id="exp-height" class="input-jj" placeholder="Alto">
            </div>
            <div class="flex gap-2">
                <button onclick="document.getElementById('export-modal').style.display='none'" class="flex-1 py-3 bg-zinc-900 text-zinc-500 font-black text-[10px] rounded-lg">CERRAR</button>
                <button onclick="downloadPro()" class="flex-1 btn-jj text-[10px]">BAJAR</button>
            </div>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('canvas'), ctx = canvas.getContext('2d', { willReadFrequently: true });
        const viewport = document.getElementById('viewport'), zoomContainer = document.getElementById('zoom-container');
        const upload = document.getElementById('upload');
        let originalImg = null, scale = 1, posX = 0, posY = 0, ratio = 1, targetRGB = [0,0,0];
        let startX, startY, isPanning = false, lastTouchDist = 0;

        function showView(view) {
            document.getElementById('view-home').style.display = view === 'home' ? 'flex' : 'none';
            document.getElementById('view-tool').classList.toggle('active-view', view !== 'home');
        }

        function initTool(tool) {
            showView('tool');
            document.getElementById('panel-color').classList.toggle('hidden', tool !== 'color');
            document.getElementById('panel-bg').classList.toggle('hidden', tool !== 'bg');
            document.getElementById('panel-ia').classList.toggle('hidden', tool !== 'ia');
        }

        upload.onchange = (e) => {
            const reader = new FileReader();
            reader.onload = (ev) => {
                const img = new Image();
                img.onload = () => {
                    canvas.width = img.width; canvas.height = img.height;
                    ctx.drawImage(img, 0, 0);
                    originalImg = img; ratio = img.width / img.height;
                    document.getElementById('exp-width').value = img.width;
                    document.getElementById('exp-height').value = img.height;
                    scale = 0.5; posX = 0; posY = 0; updateTransform();
                };
                img.src = ev.target.result;
            };
            reader.readAsDataURL(e.target.files[0]);
        };

        // GESTOS TÁCTILES MEJORADOS
        viewport.addEventListener('touchstart', (e) => {
            if(!originalImg) return;
            if(e.touches.length === 2) {
                lastTouchDist = Math.hypot(e.touches[0].pageX - e.touches[1].pageX, e.touches[0].pageY - e.touches[1].pageY);
            } else {
                isPanning = true;
                startX = e.touches[0].pageX - posX;
                startY = e.touches[0].pageY - posY;
                
                // Selección de color por toque
                const rect = canvas.getBoundingClientRect();
                const tx = (e.touches[0].pageX - rect.left) / scale;
                const ty = (e.touches[0].pageY - rect.top) / scale;
                if(tx >= 0 && tx < canvas.width && ty >= 0 && ty < canvas.height) {
                    const p = ctx.getImageData(tx, ty, 1, 1).data;
                    targetRGB = [p[0], p[1], p[2]];
                    document.getElementById('color-old').style.backgroundColor = `rgb(${p[0]},${p[1]},${p[2]})`;
                }
            }
        }, {passive: true});

        viewport.addEventListener('touchmove', (e) => {
            if(!originalImg) return;
            if(e.touches.length === 2) {
                e.preventDefault();
                const dist = Math.hypot(e.touches[0].pageX - e.touches[1].pageX, e.touches[0].pageY - e.touches[1].pageY);
                scale *= (dist / lastTouchDist);
                lastTouchDist = dist;
            } else if(isPanning) {
                posX = e.touches[0].pageX - startX;
                posY = e.touches[0].pageY - startY;
            }
            updateTransform();
        }, {passive: false});

        viewport.addEventListener('touchend', () => { isPanning = false; });

        function updateTransform() {
            zoomContainer.style.transform = `translate(${posX}px, ${posY}px) scale(${scale})`;
        }

        // FUNCIONES CORE
        function quickRemove(color) {
            targetRGB = color === 'white' ? [255,255,255] : [0,0,0];
            applyBgRemovePro();
        }

        function applyBgRemovePro() {
            const id = ctx.getImageData(0,0,canvas.width,canvas.height);
            const d = id.data;
            for(let i=0; i<d.length; i+=4) {
                const diff = Math.sqrt(Math.pow(d[i]-targetRGB[0],2)+Math.pow(d[i+1]-targetRGB[1],2)+Math.pow(d[i+2]-targetRGB[2],2));
                if(diff < 40) d[i+3]=0;
            }
            ctx.putImageData(id,0,0);
        }

        function applyColorAction() {
            const id = ctx.getImageData(0,0,canvas.width,canvas.height);
            const d = id.data, hex = document.getElementById('custom-picker').value;
            const rN = parseInt(hex.slice(1,3),16), gN = parseInt(hex.slice(3,5),16), bN = parseInt(hex.slice(5,7),16);
            for(let i=0; i<d.length; i+=4) {
                if(d[i+3]<10) continue;
                const diff = Math.sqrt(Math.pow(d[i]-targetRGB[0],2)+Math.pow(d[i+1]-targetRGB[1],2)+Math.pow(d[i+2]-targetRGB[2],2));
                if(diff < 30) { d[i]=rN; d[i+1]=gN; d[i+2]=bN; }
            }
            ctx.putImageData(id,0,0);
        }

        function upscaleIA(f) {
            const tc = document.createElement('canvas'); tc.width = canvas.width*f; tc.height = canvas.height*f;
            tc.getContext('2d').drawImage(canvas,0,0,tc.width,tc.height);
            canvas.width = tc.width; canvas.height = tc.height; ctx.drawImage(tc,0,0); updateTransform();
        }

        function applyBetterIA() { ctx.filter = 'contrast(120%) brightness(102%)'; ctx.drawImage(canvas,0,0); ctx.filter = 'none'; }
        function downloadPro() {
            const oc = document.createElement('canvas'); oc.width = document.getElementById('exp-width').value; oc.height = document.getElementById('exp-height').value;
            oc.getContext('2d').drawImage(canvas,0,0,oc.width,oc.height);
            const a = document.createElement('a'); a.download = 'jj_final.png'; a.href = oc.toDataURL(); a.click();
        }
        function resetToOriginal() { if(originalImg) ctx.drawImage(originalImg,0,0); }
    </script>
</body>
</html>
