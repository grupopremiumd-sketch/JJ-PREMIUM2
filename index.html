    <script>
        const canvas = document.getElementById('canvas'), ctx = canvas.getContext('2d', {willReadFrequently:true});
        const viewport = document.getElementById('viewport'), zoomContainer = document.getElementById('zoom-container');
        const upload = document.getElementById('upload'), selectionBox = document.getElementById('selection-box');
        const loader = document.getElementById('loading-overlay');
        
        let originalImg = null, liveSnapshot = null, initialSnapshot = null; 
        let scale = 1, posX = 0, posY = 0, targetRGB = [255,255,255], isPanning = false, isSelecting = false, startX_PX, startY_PX, startX_View, startY_View, selectArea = null, currentTool = '';
        
        const SESSION_LIMIT = 4 * 60 * 60 * 1000;
        let isVIP = localStorage.getItem('jj_session_perm') === 'active';
        let freeCount = parseInt(localStorage.getItem('jj_free_count') || "2");

        window.onload = () => {

            const userNum = localStorage.getItem('jj_user_num');

            if(isVIP && loginTime && userNum) {
                if(new Date().getTime() - parseInt(loginTime) < SESSION_LIMIT) { silentCheck(userNum); } else { logout(); }
            }
        };

        async function validateAccess() {
            const u = document.getElementById('user-phone').value.toString().replace(/\D/g,'');
            if(!u) return;
            const btn = document.getElementById('btn-login'); btn.innerText = "VERIFICANDO...";
            try {
                const res = await fetch(`https://script.google.com/macros/s/AKfycbzwIHNPwRi4x_oQHIYIvMYRD7HbZD-dkwo7bEdH3Zc9yN4-TwfURjSd1TcgNKPqYJxo/exec?user=${u}`);
                const data = await res.json();
                if(data.access === true) { 
                    localStorage.setItem('jj_session_perm', 'active');
                    localStorage.setItem('jj_user_num', u);
                    localStorage.setItem('jj_login_time', new Date().getTime().toString());
                    localStorage.setItem('jj_user_name', data.nombre.toUpperCase());
                    document.getElementById('user-display').innerText = `SOCIO: ${data.nombre.toUpperCase()}`;
                    enterApp(); 
                } else alert(`Estado: ${data.status.toUpperCase()}`);
            } catch(e) { alert("Error de red."); } finally { btn.innerText = "Ingresar al Studio"; }
        }

        async function silentCheck(u) {
            try {
                const res = await fetch(`https://script.google.com/macros/s/AKfycbzwIHNPwRi4x_oQHIYIvMYRD7HbZD-dkwo7bEdH3Zc9yN4-TwfURjSd1TcgNKPqYJxo/exec?user=${u}`);
                const data = await res.json();
                if(data.access === true) { document.getElementById('user-display').innerText = `SOCIO: ${data.nombre.toUpperCase()}`; enterApp(); } else logout();
            } catch(e) { enterApp(); } 
        }

        function startTrial() { if(freeCount > 0) enterApp(); else alert("Pruebas agotadas."); }
        function enterApp() { document.getElementById('auth-screen').style.display = 'none'; document.getElementById('main-content').style.display = 'block'; }
        function logout() { localStorage.clear(); location.reload(); }

        // ZOOM RUEDA
        viewport.onwheel = (e) => {
            if (!originalImg) return;
            e.preventDefault();
            const delta = e.deltaY > 0 ? 0.9 : 1.1;
            scale = Math.min(Math.max(0.1, scale * delta), 10);
            updateTransform();
        };

        function updateTransform() { zoomContainer.style.transform = `translate(${posX}px, ${posY}px) scale(${scale})`; }

        upload.onchange = (e) => {
            const reader = new FileReader();
            reader.onload = (ev) => {
                const img = new Image();
                img.onload = () => {
                    canvas.width = img.width; canvas.height = img.height;
                    ctx.drawImage(img, 0, 0); originalImg = img;
                    liveSnapshot = ctx.getImageData(0,0,canvas.width,canvas.height);
                    initialSnapshot = ctx.getImageData(0,0,canvas.width,canvas.height);
                    fitToScreen();
                };
                img.src = ev.target.result;
            };
            reader.readAsDataURL(e.target.files[0]);
        };

        function fitToScreen() {
            if(!originalImg) return;
            scale = Math.min((viewport.offsetWidth - 40) / originalImg.width, (viewport.offsetHeight - 40) / originalImg.height, 1);
            posX = 0; posY = 0; updateTransform();
        }

        // --- MOTOR DE CAMBIO DE COLOR (REPARADO v42.11) ---
        function applyColor() {
            if(!originalImg) return;
            loader.style.display = 'flex';
            
            setTimeout(() => {
                const area = selectArea || {x:0, y:0, w:canvas.width, h:canvas.height};
                const id = ctx.getImageData(area.x, area.y, area.w, area.h);
                const d = id.data, hex = document.getElementById('custom-picker').value;
                const rN = parseInt(hex.slice(1,3),16), gN = parseInt(hex.slice(3,5),16), bN = parseInt(hex.slice(5,7),16);
                
                for(let i=0; i<d.length; i+=4) {
                    if(d[i+3] < 10) continue; // Ignorar transparente
                    const diff = Math.sqrt(Math.pow(d[i]-targetRGB[0],2)+Math.pow(d[i+1]-targetRGB[1],2)+Math.pow(d[i+2]-targetRGB[2],2));
                    if(diff < 80) { d[i]=rN; d[i+1]=gN; d[i+2]=bN; }
                }
                
                ctx.putImageData(id, area.x, area.y);
                
                // CRÍTICO: Actualizar la imagen base para que el cambio persista
                const newImg = new Image();
                newImg.onload = () => {
                    originalImg = newImg;
                    liveSnapshot = ctx.getImageData(0,0,canvas.width,canvas.height);
                    loader.style.display = 'none';
                };
                newImg.src = canvas.toDataURL();
                
                selectionBox.style.display='none'; 
                selectArea = null;
            }, 100);
        }

        function updateBG() {
            if(!liveSnapshot) return;
            const tol = parseInt(document.getElementById('bg-tolerance').value);
            const tempId = new ImageData(new Uint8ClampedArray(liveSnapshot.data), canvas.width, canvas.height);
            const d = tempId.data;
            for(let i=0; i<d.length; i+=4) {
                if(Math.sqrt(Math.pow(d[i]-targetRGB[0],2)+Math.pow(d[i+1]-targetRGB[1],2)+Math.pow(d[i+2]-targetRGB[2],2)) < tol) d[i+3] = 0;
            }
            ctx.putImageData(tempId, 0, 0);
        }
        function confirmBG() { liveSnapshot = ctx.getImageData(0,0,canvas.width,canvas.height); const ni = new Image(); ni.onload = () => originalImg = ni; ni.src = canvas.toDataURL(); }

        function applyFilters() {
            if(!originalImg) return;
            const exp = parseInt(document.getElementById('ia-exp').value), shad = parseInt(document.getElementById('ia-shadows').value), high = parseInt(document.getElementById('ia-highlights').value), sat = document.getElementById('ia-sat').value, sharp = document.getElementById('ia-sharp').value, bright = document.getElementById('ia-bright').value;
            ctx.clearRect(0,0,canvas.width,canvas.height);
            ctx.filter = `brightness(${parseInt(bright) + exp}%) saturate(${sat}%) contrast(${100 + (shad * -0.25)}%) brightness(${100 + (high * 0.25)}%)`;
            ctx.drawImage(originalImg, 0, 0);
            if(sharp > 1.0) { ctx.globalAlpha = 0.4; ctx.drawImage(canvas, -1, -1); ctx.globalAlpha = 1.0; }
            ctx.filter = 'none';
        }

        async function superUpscaleIA() { if(!originalImg) return; loader.style.display = 'flex'; await new Promise(r => setTimeout(r, 1200)); const off = document.createElement('canvas'); const octx = off.getContext('2d'); off.width = canvas.width * 2; off.height = canvas.height * 2; octx.imageSmoothingEnabled = true; octx.imageSmoothingQuality = 'high'; octx.drawImage(canvas, 0, 0, off.width, off.height); const id = octx.getImageData(0,0,off.width, off.height); const d = id.data; for (let i = 0; i < d.length; i += 4) { for(let j=0; j<3; j++) d[i+j] = d[i+j] + (d[i+j] - 127) * 0.6; } octx.putImageData(id, 0, 0); canvas.width = off.width; canvas.height = off.height; ctx.drawImage(off, 0, 0); const newBase = new Image(); newBase.onload = () => { originalImg = newBase; liveSnapshot = ctx.getImageData(0,0,canvas.width,canvas.height); loader.style.display = 'none'; }; newBase.src = canvas.toDataURL(); }

        // SELECTOR MATRIX
        let pSX, pSY;
        viewport.addEventListener('mousedown', (e) => {
            if (!originalImg) return;
            const rect = canvas.getBoundingClientRect(), vRect = viewport.getBoundingClientRect();
            const tx = (e.clientX - rect.left) / (rect.width / canvas.width), ty = (e.clientY - rect.top) / (rect.height / canvas.height);
            if (e.button === 0) { 
                const p = ctx.getImageData(Math.floor(tx), Math.floor(ty), 1, 1).data;
                targetRGB = [p[0], p[1], p[2]];
                document.getElementById('color-old').style.backgroundColor = `rgb(${p[0]},${p[1]},${p[2]})`;
                document.getElementById('bg-color-preview').style.backgroundColor = `rgb(${p[0]},${p[1]},${p[2]})`;
                if(currentTool === 'color') { isSelecting = true; startX_PX = tx; startY_PX = ty; startX_View = e.clientX - vRect.left; startY_View = e.clientY - vRect.top; }
                if(currentTool === 'bg') updateBG();
            }
            isPanning = true; pSX = e.clientX - posX; pSY = e.clientY - posY;
        });
        window.addEventListener('mousemove', (e) => {
            if (isPanning && !isSelecting) { posX = e.clientX - pSX; posY = e.clientY - pSY; updateTransform(); }
            if (isSelecting) {
                const vRect = viewport.getBoundingClientRect();
                const curVX = e.clientX - vRect.left, curVY = e.clientY - vRect.top;
                selectionBox.style.display = 'block';
                selectionBox.style.left = Math.min(startX_View, curVX) + 'px'; selectionBox.style.top = Math.min(startY_View, curVY) + 'px';
                selectionBox.style.width = Math.abs(curVX - startX_View) + 'px'; selectionBox.style.height = Math.abs(curVY - startY_View) + 'px';
                const rect = canvas.getBoundingClientRect();
                const endX_PX = (e.clientX - rect.left) / (rect.width / canvas.width), endY_PX = (e.clientY - rect.top) / (rect.height / canvas.height);
                selectArea = { x: Math.min(startX_PX, endX_PX), y: Math.min(startY_PX, endY_PX), w: Math.abs(endX_PX - startX_PX), h: Math.abs(endY_PX - startY_PX) };
            }
        });
        window.addEventListener('mouseup', () => { isSelecting = isPanning = false; });

        async function downloadPNGWith300DPI() {
            if (!originalImg) return;
            const dataUrl = canvas.toDataURL('image/png'); const response = await fetch(dataUrl); const buffer = await (await response.blob()).arrayBuffer(); const uint8 = new Uint8Array(buffer);
            const pHYs = new Uint8Array(21); pHYs.set([0, 0, 0, 9, 112, 72, 89, 115]); const view = new DataView(pHYs.buffer); view.setUint32(8, 11811); view.setUint32(12, 11811); view.setUint8(16, 1);
            const table = (function() { const t = new Int32Array(256); for (let i = 0; i < 256; i++) { let c = i; for (let j = 0; j < 8; j++) c = (c & 1) ? (0xEDB88320 ^ (c >>> 1)) : (c >>> 1); t[i] = c; } return t; })();
            let crc = 0xFFFFFFFF; for (let i = 4; i < 17; i++) crc = table[(crc ^ pHYs[i]) & 0xFF] ^ (crc >>> 1); view.setUint32(17, crc ^ 0xFFFFFFFF);
            const final = new Uint8Array(uint8.length + 21); final.set(uint8.slice(0, 33)); final.set(pHYs, 33); final.set(uint8.slice(33), 54);
            const a = document.createElement('a'); a.download = `JJ_MASTER_300.png`; a.href = URL.createObjectURL(new Blob([final])); a.click();
            if(!isVIP) { freeCount--; localStorage.setItem('jj_free_count', freeCount); if(freeCount === 0) location.reload(); }
        }

        function setBg(c) { document.getElementById('viewport').style.backgroundColor = c; }
        function toggleAccordion(id) { const el = document.getElementById(id); el.style.display = (el.style.display === 'block') ? 'none' : 'block'; }
        function hardReset() { if(initialSnapshot) { canvas.width = initialSnapshot.width; canvas.height = initialSnapshot.height; ctx.putImageData(initialSnapshot, 0, 0); const img = new Image(); img.onload = () => { originalImg = img; liveSnapshot = ctx.getImageData(0,0,canvas.width,canvas.height); fitToScreen(); }; img.src = canvas.toDataURL(); } }
        function goBack() { originalImg = null; canvas.width = 0; canvas.height = 0; document.getElementById('view-tool').classList.remove('active-view'); document.getElementById('view-home').style.display = 'flex'; }
        function initTool(t) { currentTool = t; document.getElementById('view-home').style.display = 'none'; document.getElementById('view-tool').classList.add('active-view'); document.getElementById('panel-color').classList.toggle('hidden', t !== 'color'); document.getElementById('panel-bg').classList.toggle('hidden', t !== 'bg'); document.getElementById('panel-ia').classList.toggle('hidden', t !== 'ia'); }
    </script>
</body>
