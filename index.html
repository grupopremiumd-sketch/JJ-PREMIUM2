<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>J&J PREMIUM v37 - ULTRA POWER</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Lato:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Lato', sans-serif; background: #050505; color: white; margin: 0; overflow: hidden; position: fixed; width: 100%; height: 100%; }
        .bg-premium { background: radial-gradient(circle at center, #250000 0%, #050505 100%); }
        .tool-view { display: none; height: calc(100vh - 65px); width: 100%; }
        #auth-screen { position: fixed; inset: 0; z-index: 9999; background: #000; display: flex; align-items: center; justify-content: center; padding: 20px; overflow-y: auto; }
        @media (min-width: 1025px) { .tool-view { display: flex; flex-direction: row; } .viewport { flex-grow: 1; height: 100%; cursor: crosshair; } .sidebar { width: 350px; min-width: 350px; border-left: 2px solid #222; } }
        @media (max-width: 1024px) { .tool-view { display: flex; flex-direction: column; } .viewport { flex-grow: 1; width: 100%; } .sidebar { width: 100%; height: 350px; border-top: 2px solid #dc2626; overflow-y: auto; padding-bottom: 80px; } }
        .active-view { display: flex !important; }
        .viewport { position: relative; overflow: hidden; display: flex; align-items: center; justify-content: center; background: #0a0a0a; touch-action: none; transition: background 0.3s ease; }
        #zoom-container { transform-origin: center center; position: absolute; pointer-events: none; }
        canvas { box-shadow: 0 0 60px #000; pointer-events: auto; }
        #selection-box { position: absolute; border: 1px solid #fff; display: none; pointer-events: none; z-index: 100; background: rgba(255,255,255,0.1); box-shadow: 0 0 0 4000px rgba(0,0,0,0.5); }
        .sidebar { background: #0a0a0a; padding: 15px; display: flex; flex-direction: column; gap: 12px; z-index: 50; }
        .card { background: #111; border: 1px solid #222; border-radius: 12px; padding: 12px; }
        .btn-jj { background: #dc2626; font-weight: 900; text-transform: uppercase; border-radius: 10px; padding: 14px; width: 100%; color: white; border: none; cursor: pointer; }
        .label-tool { font-size: 9px; font-weight: 900; color: #666; text-transform: uppercase; margin-bottom: 4px; display: block; }
        input[type=range] { accent-color: #dc2626; height: 4px; width: 100%; }
    </style>
</head>
<body>

    <!-- ACCESO Y SUSCRIPCIONES -->
    <div id="auth-screen">
        <div class="max-w-md w-full bg-zinc-900 p-8 rounded-[2rem] border border-red-600/30 text-center shadow-2xl">
            <div class="w-16 h-16 bg-red-600 rounded-2xl flex items-center justify-center font-black text-3xl mx-auto mb-6">J&J</div>
            <h2 class="text-2xl font-black italic uppercase text-white mb-2">Acceso PREMIUM</h2>
            <input type="tel" id="user-phone" placeholder="Número VIP" class="w-full bg-black border border-zinc-800 rounded-xl p-4 text-center text-xl font-black text-red-500 mb-4 outline-none">
            <button onclick="checkAccess()" class="w-full btn-jj py-4 mb-4">Ingresar</button>
            <button onclick="startTrial()" class="w-full bg-zinc-800 py-3 rounded-xl text-[10px] font-black uppercase text-zinc-400 mb-6">Prueba Gratis</button>
            <div class="border-t border-zinc-800 pt-6 space-y-3">
                <a href="https://wa.me/51916689969" target="_blank" class="flex items-center justify-between bg-green-600/10 border border-green-600/30 p-4 rounded-xl text-[10px] font-black text-green-500">👑 Suscribirme <span>➔</span></a>
                <a href="https://wa.me/51904503246" target="_blank" class="flex items-center justify-between bg-blue-600/10 border border-blue-600/30 p-4 rounded-xl text-[10px] font-black text-blue-500">🔄 Renovar <span>➔</span></a>
            </div>
        </div>
    </div>

    <div id="main-content" style="display:none;">
        <header class="h-[65px] px-4 flex justify-between items-center bg-black border-b border-red-900/40 z-[100]">
            <div class="flex items-center gap-2 cursor-pointer" onclick="window.location.reload()">
                <div class="w-10 h-10 bg-red-600 rounded flex items-center justify-center font-black text-xl shadow-lg text-white">J&J</div>
                <h1 class="font-black text-sm uppercase italic tracking-tighter text-white">J&J <span class="text-red-600">PREMIUM</span></h1>
            </div>
            <button onclick="downloadPNGWith300DPI()" class="bg-yellow-500 text-black font-black text-[10px] px-4 py-2 rounded uppercase shadow-lg">📥 DESCARGAR MASTER (300 DPI)</button>
        </header>

        <section id="view-home" class="h-[calc(100vh-65px)] bg-premium flex flex-col items-center py-10 px-6 overflow-y-auto">
            <h2 class="text-5xl md:text-7xl font-black italic mb-10 uppercase text-center text-white tracking-tighter italic">STUDIO TOOLS</h2>
            <div class="grid grid-cols-1 md:grid-cols-3 gap-6 w-full max-w-6xl">
                <div onclick="initTool('color')" class="bg-black/40 p-8 rounded-[2rem] border border-white/5 cursor-pointer hover:border-red-600 text-center transition-all group">
                    <h3 class="font-black uppercase text-xl italic text-white italic">MASTER COLOR CHANGER</h3>
                </div>
                <div onclick="initTool('bg')" class="bg-black/40 p-8 rounded-[2rem] border border-white/5 cursor-pointer hover:border-red-600 text-center transition-all group">
                    <h3 class="font-black uppercase text-xl italic text-red-600 italic">Quitar Fondo PRO</h3>
                </div>
                <div onclick="initTool('ia')" class="bg-black/40 p-8 rounded-[2rem] border border-white/5 cursor-pointer hover:border-red-600 text-center transition-all group">
                    <h3 class="font-black uppercase text-xl italic text-white italic">Mejorador IA Ultra</h3>
                </div>
            </div>
        </section>

        <section id="view-tool" class="tool-view">
            <main class="viewport" id="viewport">
                <div id="zoom-container"><canvas id="canvas"></canvas><div id="selection-box"></div></div>
            </main>
            <aside class="sidebar">
                <button onclick="window.location.reload()" class="bg-zinc-900 text-red-500 font-black py-4 rounded-xl text-[10px] uppercase border border-red-900/20 w-full">← VOLVER</button>
                <div class="card"><input type="file" id="upload" class="text-[10px] w-full text-zinc-500" accept="image/*"/></div>

                <!-- CAMBIADOR DE COLOR ULTRA -->
                <div id="panel-color" class="hidden card border-red-600/30 space-y-4">
                    <p class="label-tool text-red-500 text-center italic">Motor de Cambio Profundo</p>
                    <button onclick="manualScan()" class="w-full py-2 bg-zinc-800 text-[8px] font-black rounded uppercase">Escanear Diseño</button>
                    <div id="design-palette" class="flex flex-wrap gap-2 justify-center mb-4 min-h-[40px]"></div>
                    <div class="grid grid-cols-2 gap-4">
                        <div class="text-center"><p class="text-[8px] font-black uppercase mb-1">Actual</p><div id="color-old" class="w-full h-8 rounded border border-white/10 bg-zinc-900"></div></div>
                        <div class="text-center"><p class="text-[8px] text-red-500 font-black uppercase mb-1">Nuevo</p><input type="color" id="custom-picker" class="w-full h-8 bg-transparent border-none p-0 cursor-pointer"></div>
                    </div>
                    <div>
                        <label class="label-tool">Fuerza de Limpieza (Bordes): <span id="v-clean" class="text-red-500">45</span></label>
                        <input type="range" id="clean-power" min="10" max="100" value="45">
                    </div>
                    <button onclick="applyColor()" class="btn-jj text-[10px]">Cambiar en Zona</button>
                </div>

                <!-- QUITAR FONDO PRO -->
                <div id="panel-bg" class="hidden card border-red-600/30 space-y-4">
                    <p class="label-tool text-white text-center italic">Limpieza de Fondos Inteligente</p>
                    <div id="bg-color-preview" class="w-full h-8 rounded border border-white/10 bg-zinc-900"></div>
                    <div><label class="label-tool">Tolerancia: <span id="val-tol">40</span></label><input type="range" id="bg-tolerance" min="1" max="150" value="40" oninput="updateBGParams()"></div>
                    <button onclick="confirmBG()" class="btn-jj text-[10px]">Quitar Fondo</button>
                </div>

                <!-- MEJORADOR IA ULTRA -->
                <div id="panel-ia" class="hidden card border-yellow-600/30 space-y-4">
                    <button onclick="superDetailIA()" class="w-full py-4 bg-gradient-to-r from-yellow-600 to-red-600 text-white font-black text-[11px] rounded-xl shadow-lg uppercase">⚡ RECONSTRUIR DETALLES IA</button>
                    <div class="space-y-4 pt-2">
                        <p class="text-[8px] font-black text-blue-500 uppercase">Revelado RAW & Color</p>
                        <div><label class="label-tool flex justify-between">Exposición: <span id="v-exp">0</span></label><input type="range" id="ia-exp" min="-100" max="100" value="0" oninput="applyMasterFilters()"></div>
                        <div><label class="label-tool flex justify-between">Saturación: <span id="v-sat">100%</span></label><input type="range" id="ia-sat" min="0" max="200" value="100" oninput="applyMasterFilters()"></div>
                        <div><label class="label-tool flex justify-between">Nitidez: <span id="v-sharp">1.0</span></label><input type="range" id="ia-sharp" min="1.0" max="2.5" step="0.1" value="1.0" oninput="applyMasterFilters()"></div>
                        <div><label class="label-tool flex justify-between">Brillo: <span id="v-bright">100%</span></label><input type="range" id="ia-bright" min="50" max="150" value="100" oninput="applyMasterFilters()"></div>
                    </div>
                </div>
                
                <button onclick="reset()" class="w-full py-3 bg-zinc-900 text-yellow-500 font-black rounded-xl text-[10px] uppercase mt-auto">Restaurar Todo</button>
            </aside>
        </section>
    </div>

    <script>
        const canvas = document.getElementById('canvas'), ctx = canvas.getContext('2d', { willReadFrequently: true });
        const viewport = document.getElementById('viewport'), zoomContainer = document.getElementById('zoom-container');
        const upload = document.getElementById('upload'), selectionBox = document.getElementById('selection-box');
        let originalImg = null, liveSnapshot = null, scale = 1, posX = 0, posY = 0, targetRGB = [0,0,0];
        let isSelecting = false, isPanning = false, startX, startY, selectArea = null, currentTool = '';

        function checkAccess() { 
            const p = document.getElementById('user-phone').value;
            if(p === "51916689969" || p === "VIP") enterApp(); 
        }
        function startTrial() { enterApp(); }
        function enterApp() { document.getElementById('auth-screen').style.display = 'none'; document.getElementById('main-content').style.display = 'block'; }

        upload.onchange = (e) => {
            const reader = new FileReader();
            reader.onload = (ev) => {
                const img = new Image();
                img.onload = () => {
                    canvas.width = img.width; canvas.height = img.height;
                    ctx.drawImage(img, 0, 0); originalImg = img;
                    liveSnapshot = ctx.getImageData(0,0,canvas.width,canvas.height);
                    scale = 0.5; updateTransform();
                };
                img.src = ev.target.result;
            };
            reader.readAsDataURL(e.target.files[0]);
        };

        // --- MOTOR DE CAMBIO DE COLOR (LIMPIEZA DE BORDES) ---
        function applyColor() {
            const area = selectArea || {x:0, y:0, w:canvas.width, h:canvas.height};
            const clean = parseInt(document.getElementById('clean-power').value);
            const id = ctx.getImageData(area.x, area.y, area.w, area.h);
            const d = id.data;
            const hex = document.getElementById('custom-picker').value;
            const rN = parseInt(hex.slice(1,3),16), gN = parseInt(hex.slice(3,5),16), bN = parseInt(hex.slice(5,7),16);
            
            for(let i=0; i<d.length; i+=4) {
                if(d[i+3] < 10) continue; // Ignorar transparente
                const diff = Math.sqrt(Math.pow(d[i]-targetRGB[0],2)+Math.pow(d[i+1]-targetRGB[1],2)+Math.pow(d[i+2]-targetRGB[2],2));
                
                // Si el pixel está dentro de la tolerancia, cambiarlo
                if(diff < clean) {
                    d[i]=rN; d[i+1]=gN; d[i+2]=bN;
                } else if (diff < clean + 15) {
                    // Algoritmo de suavizado para los bordes (residuos)
                    const blend = (clean + 15 - diff) / 15;
                    d[i] = d[i] * (1 - blend) + rN * blend;
                    d[i+1] = d[i+1] * (1 - blend) + gN * blend;
                    d[i+2] = d[i+2] * (1 - blend) + bN * blend;
                }
            }
            ctx.putImageData(id, area.x, area.y);
            liveSnapshot = ctx.getImageData(0,0,canvas.width,canvas.height);
            selectionBox.style.display='none'; selectArea = null;
        }

        // --- MEJORADOR IA ULTRA POTENTE ---
        function superDetailIA() {
            if(!originalImg) return;
            const id = ctx.getImageData(0,0,canvas.width,canvas.height);
            const d = id.data;
            // Algoritmo de Convolución (Unsharp Masking simplificado)
            for (let i = 0; i < d.length; i += 4) {
                for (let j = 0; j < 3; j++) {
                    let val = d[i+j];
                    d[i+j] = val > 128 ? Math.min(255, val + 35) : Math.max(0, val - 25);
                }
            }
            ctx.putImageData(id, 0, 0);
            liveSnapshot = ctx.getImageData(0,0,canvas.width,canvas.height);
            alert("Nitidez y detalles reconstruidos.");
        }

        function applyMasterFilters() {
            if(!originalImg) return;
            const exp = document.getElementById('ia-exp').value, sat = document.getElementById('ia-sat').value, sharp = document.getElementById('ia-sharp').value, bright = document.getElementById('ia-bright').value;
            document.getElementById('v-exp').innerText = exp; document.getElementById('v-sat').innerText = sat + "%"; document.getElementById('v-sharp').innerText = sharp; document.getElementById('v-bright').innerText = bright + "%";
            ctx.clearRect(0,0,canvas.width,canvas.height);
            ctx.filter = `brightness(${parseInt(bright) + parseInt(exp)}%) saturate(${sat}%) contrast(110%)`;
            ctx.drawImage(originalImg, 0, 0);
            if(sharp > 1.0) { ctx.globalAlpha = 0.4; ctx.drawImage(canvas, -1, -1); ctx.globalAlpha = 1.0; }
            ctx.filter = 'none';
        }

        // --- CORE TOOLS ---
        function captureColor(x, y) { 
            const p = ctx.getImageData(Math.floor(x), Math.floor(y), 1, 1).data; 
            targetRGB = [p[0], p[1], p[2]]; 
            const hex = `rgb(${p[0]},${p[1]},${p[2]})`;
            document.getElementById('color-old').style.backgroundColor = hex; 
            document.getElementById('bg-color-preview').style.backgroundColor = hex; 
        }

        viewport.addEventListener('mousedown', (e) => {
            if (!originalImg) return;
            const rect = canvas.getBoundingClientRect();
            const tx = (e.clientX - rect.left) / (rect.width / canvas.width);
            const ty = (e.clientY - rect.top) / (rect.height / canvas.height);
            if (e.button === 0 && currentTool === 'color') { isSelecting = true; startX = tx; startY = ty; captureColor(tx, ty); }
            else { isPanning = true; startX = e.clientX - posX; startY = e.clientY - posY; }
        });

        window.addEventListener('mousemove', (e) => {
            if (isPanning) { posX = e.clientX - startX; posY = e.clientY - startY; updateTransform(); }
            if (isSelecting) {
                const rect = canvas.getBoundingClientRect();
                const cx = (e.clientX - rect.left) / (rect.width / canvas.width);
                const cy = (e.clientY - rect.top) / (rect.height / canvas.height);
                if (Math.abs(cx - startX) > 5) {
                    selectionBox.style.display = 'block';
                    let x = Math.min(startX, cx), y = Math.min(startY, cy), w = Math.abs(cx - startX), h = Math.abs(cy - startY);
                    selectionBox.style.left = x + 'px'; selectionBox.style.top = y + 'px'; selectionBox.style.width = w + 'px'; selectionBox.style.height = h + 'px';
                    selectArea = {x, y, w, h};
                }
            }
        });

        window.addEventListener('mouseup', () => { isSelecting = isPanning = false; });
        function initTool(t) { currentTool = t; document.getElementById('view-home').style.display = 'none'; document.getElementById('view-tool').classList.add('active-view'); document.getElementById('panel-color').classList.toggle('hidden', t !== 'color'); document.getElementById('panel-bg').classList.toggle('hidden', t !== 'bg'); document.getElementById('panel-ia').classList.toggle('hidden', t !== 'ia'); }
        function updateTransform() { zoomContainer.style.transform = `translate(${posX}px, ${posY}px) scale(${scale})`; }
        viewport.onwheel = (e) => { e.preventDefault(); scale = Math.max(0.01, scale * (e.deltaY > 0 ? 0.9 : 1.1)); updateTransform(); };
        function setBg(c) { document.getElementById('viewport').style.backgroundColor = c; }
        function reset() { if(originalImg) { canvas.width = originalImg.width; canvas.height = originalImg.height; ctx.drawImage(originalImg,0,0); liveSnapshot = ctx.getImageData(0,0,canvas.width,canvas.height); selectionBox.style.display='none'; } }
        function manualScan() {
            const data = ctx.getImageData(0,0,canvas.width,canvas.height).data; const colors = {};
            for(let i=0; i<data.length; i+=Math.max(4, Math.floor(data.length/2000)*4)) { if(data[i+3] < 128) continue; const h = "#" + ((1 << 24) + (data[i] << 16) + (data[i+1] << 8) + data[i+2]).toString(16).slice(1).toUpperCase(); colors[h] = (colors[h] || 0) + 1; }
            const sorted = Object.keys(colors).sort((a,b) => colors[b]-colors[a]).slice(0, 10);
            const container = document.getElementById('design-palette'); container.innerHTML = "";
            sorted.forEach(hex => { const div = document.createElement('div'); div.className = "w-8 h-8 rounded border border-zinc-800 cursor-pointer"; div.style.backgroundColor = hex; div.onclick = () => { targetRGB = [parseInt(hex.slice(1,3), 16), parseInt(hex.slice(3,5), 16), parseInt(hex.slice(5,7), 16)]; document.getElementById('color-old').style.backgroundColor = hex; }; container.appendChild(div); });
        }
        function updateBGParams() { const tol = parseInt(document.getElementById('bg-tolerance').value); document.getElementById('val-tol').innerText = tol; const tempId = new ImageData(new Uint8ClampedArray(liveSnapshot.data), canvas.width, canvas.height); const d = tempId.data; for(let i=0; i<d.length; i+=4) { const diff = Math.sqrt(Math.pow(d[i]-targetRGB[0],2)+Math.pow(d[i+1]-targetRGB[1],2)+Math.pow(d[i+2]-targetRGB[2],2)); if(diff < tol) d[i+3] = 0; } ctx.putImageData(tempId, 0, 0); }
        function confirmBG() { liveSnapshot = ctx.getImageData(0,0,canvas.width,canvas.height); alert("Fondo eliminado."); }
        async function downloadPNGWith300DPI() { const a = document.createElement('a'); a.download = `JJ_MASTER_ULTRA.png`; a.href = canvas.toDataURL('image/png'); a.click(); }
    </script>
</body>
</html>
