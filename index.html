<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>J&J PREMIUM v38</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Lato:wght@400;700;900&display=swap" rel="stylesheet">
    <!-- Librería para trazado vectorial -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/imagetracerjs/1.2.6/imagetracer_v1.2.6.js"></script>
    <style>
        body { font-family: 'Lato', sans-serif; background: #050505; color: white; margin: 0; overflow: hidden; position: fixed; width: 100%; height: 100%; }
        .bg-premium { background: radial-gradient(circle at center, #250000 0%, #050505 100%); }
        .tool-view { display: none; height: calc(100vh - 65px); width: 100%; }
        @media (min-width: 1025px) { .tool-view { display: flex; flex-direction: row; } .viewport { flex-grow: 1; height: 100%; cursor: crosshair; } .sidebar { width: 350px; min-width: 350px; border-left: 2px solid #222; } }
        @media (max-width: 1024px) { .tool-view { display: flex; flex-direction: column; } .viewport { flex-grow: 1; width: 100%; } .sidebar { width: 100%; height: 350px; border-top: 2px solid #dc2626; overflow-y: auto; padding-bottom: 80px; } }
        .active-view { display: flex !important; }
        .viewport { position: relative; overflow: hidden; display: flex; align-items: center; justify-content: center; background: #0a0a0a; touch-action: none; }
        #zoom-container { transform-origin: center center; position: absolute; pointer-events: none; }
        canvas { box-shadow: 0 0 60px #000; pointer-events: auto; }
        .sidebar { background: #0a0a0a; padding: 15px; display: flex; flex-direction: column; gap: 12px; z-index: 50; }
        .card { background: #111; border: 1px solid #222; border-radius: 12px; padding: 12px; }
        .btn-jj { background: #dc2626; font-weight: 900; text-transform: uppercase; border-radius: 10px; padding: 14px; width: 100%; color: white; border: none; cursor: pointer; transition: 0.3s; }
        .btn-jj:hover { background: #b91c1c; transform: scale(1.02); }
        .btn-download-top { background: linear-gradient(to bottom, #facc15, #eab308); color: black; font-weight: 900; text-transform: uppercase; border-radius: 8px; padding: 8px 15px; font-size: 11px; display: none; box-shadow: 0 0 15px rgba(250, 204, 21, 0.4); border: none; cursor: pointer; }
        .label-tool { font-size: 9px; font-weight: 900; color: #666; text-transform: uppercase; margin-bottom: 4px; display: block; }
        #export-modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.95); z-index: 3000; align-items: center; justify-content: center; padding: 20px; }
        .modal-content { background: #0a0a0a; border: 1px solid #dc2626; border-radius: 20px; width: 100%; max-width: 400px; padding: 20px; }
        .input-export { background: #000; border: 1px solid #333; border-radius: 6px; padding: 10px; color: white; font-weight: 700; width: 100%; font-size: 13px; outline: none; }
        #vector-overlay { position: absolute; inset: 0; pointer-events: none; display: none; }
    </style>
</head>
<body>

    <header class="h-[65px] px-4 md:px-8 flex justify-between items-center bg-black border-b border-red-900/40 z-[100]">
        <div class="flex items-center gap-2 cursor-pointer" onclick="window.location.reload()">
            <div class="w-10 h-10 bg-red-600 rounded flex items-center justify-center font-black text-xl shadow-lg text-white">J&J</div>
            <h1 class="font-black text-sm md:text-lg uppercase italic tracking-tighter text-white">J&J <span class="text-red-600 font-black">PREMIUM</span></h1>
        </div>
        <div class="flex items-center gap-3">
            <button id="btn-top-dl" onclick="openExport()" class="btn-download-top">📥 EXPORTAR ARCHIVOS</button>
            <a href="https://wa.me/51916689969" target="_blank" class="bg-red-600 px-4 py-2 rounded-lg text-[10px] font-black uppercase text-white shadow-lg">VIP</a>
        </div>
    </header>

    <!-- MENU PRINCIPAL -->
    <section id="view-home" class="h-[calc(100vh-65px)] bg-premium flex flex-col items-center py-10 px-6 overflow-y-auto">
        <h2 class="text-5xl md:text-7xl font-black italic mb-2 uppercase text-center text-white tracking-tighter">J&J PREMIUM</h2>
        <p class="text-zinc-500 font-bold uppercase text-[9px] tracking-[0.4em] mb-12 italic text-center">Suite de Ingeniería Textil</p>
        
        <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-4 w-full max-w-7xl mb-12">
            <div onclick="initTool('vector')" class="bg-black/40 p-6 rounded-3xl border border-yellow-600/20 cursor-pointer hover:border-yellow-500 text-center transition-all group shadow-xl">
                <div class="flex justify-center items-center mb-4 text-3xl font-black text-yellow-500 group-hover:scale-110 transition-transform">SVG</div>
                <h3 class="font-black uppercase text-lg italic mb-1 text-white">Vectorizador Pro</h3>
                <p class="text-[8px] text-zinc-500 font-bold uppercase">De Píxel a Curvas</p>
            </div>
            <div onclick="initTool('color')" class="bg-black/40 p-6 rounded-3xl border border-white/5 cursor-pointer hover:border-red-600 text-center transition-all">
                <div class="flex justify-center gap-2 mb-4"><div class="w-8 h-8 bg-blue-600 rounded"></div><span class="text-xl">➔</span><div class="w-8 h-8 bg-red-600 rounded"></div></div>
                <h3 class="font-black uppercase text-lg italic mb-1 text-white">Extractor Tintas</h3>
            </div>
            <div onclick="initTool('bg')" class="bg-black/40 p-6 rounded-3xl border border-white/5 cursor-pointer hover:border-red-600 text-center transition-all">
                <div class="w-20 h-10 mx-auto mb-4 bg-zinc-800 rounded border border-dashed border-zinc-600 flex items-center justify-center font-black text-[9px] text-zinc-400">PNG</div>
                <h3 class="font-black uppercase text-lg italic mb-1 text-red-600">Quitar Fondo</h3>
            </div>
            <div onclick="initTool('ia')" class="bg-black/40 p-6 rounded-3xl border border-white/5 cursor-pointer hover:border-red-600 text-center transition-all">
                <div class="text-3xl font-black text-white mb-4">IA+</div>
                <h3 class="font-black uppercase text-lg italic mb-1 text-white">Mejorador IA</h3>
            </div>
        </div>

        <div class="grid grid-cols-1 md:grid-cols-2 gap-4 w-full max-w-2xl pb-10">
            <a href="https://wa.me/51916689969" target="_blank" class="bg-white/5 p-6 rounded-2xl border border-white/10 flex items-center justify-between text-white hover:bg-green-600/20">👑 Suscribirme <span>➔</span></a>
            <a href="https://wa.me/51904503246" target="_blank" class="bg-white/5 p-6 rounded-2xl border border-white/10 flex items-center justify-between text-white hover:bg-red-600/20">🔄 Renovar <span>➔</span></a>
        </div>
    </section>

    <!-- ESPACIO DE TRABAJO -->
    <section id="view-tool" class="tool-view">
        <main class="viewport" id="viewport">
            <div id="zoom-container">
                <canvas id="canvas"></canvas>
                <div id="vector-overlay"></div>
                <div id="selection-box"></div>
            </div>
        </main>
        <aside class="sidebar">
            <button onclick="window.location.reload()" class="bg-zinc-900 text-red-500 font-black py-4 rounded-xl text-[10px] uppercase border border-red-900/20 w-full mb-2">← VOLVER</button>
            <div class="card"><input type="file" id="upload" class="text-[10px] w-full text-zinc-500" accept="image/*"/></div>

            <!-- PANEL VECTORIZADOR -->
            <div id="panel-vector" class="hidden card border-yellow-600/30 space-y-4">
                <div class="bg-yellow-600/10 p-3 rounded-lg text-center border border-yellow-600/20">
                    <p class="text-[9px] text-yellow-500 font-black uppercase">Motor de Curvas Bézier</p>
                </div>
                <button onclick="runVectorization()" class="btn-jj bg-yellow-600 hover:bg-yellow-500 text-[10px]">Trazar Diseño (Vectorizar)</button>
                <div>
                    <label class="label-tool">Nivel de Detalle: <span id="val-det" class="text-yellow-500">Normal</span></label>
                    <input type="range" id="vector-detail" min="1" max="3" step="1" value="2" class="w-full accent-yellow-600">
                </div>
                <div class="p-2 bg-black rounded border border-zinc-800">
                    <p class="text-[8px] text-zinc-500 uppercase font-black mb-2">Previsualización de Trazos</p>
                    <div id="vector-status" class="text-[10px] text-zinc-400 italic italic">Esperando comando...</div>
                </div>
            </div>

            <!-- OTROS PANELES -->
            <div id="panel-color" class="hidden card border-red-600/30 space-y-4">
                <button onclick="manualScan()" class="w-full py-2 bg-zinc-800 text-[8px] font-black rounded mb-3 uppercase">Escanear Colores</button>
                <div id="design-palette" class="flex flex-wrap gap-2 justify-center"></div>
                <button onclick="applyColor()" class="btn-jj text-[10px] mt-4">Actualizar Tinta</button>
            </div>

            <div id="panel-bg" class="hidden card border-red-600/30 space-y-4">
                <div id="bg-color-preview" class="w-full h-8 rounded border border-white/10 bg-zinc-900"></div>
                <input type="range" id="bg-tolerance" min="1" max="150" value="40" class="w-full accent-red-600" oninput="updateBGParams()">
                <button onclick="confirmBG()" class="btn-jj text-[10px]">Confirmar Recorte</button>
            </div>

            <div id="panel-ia" class="hidden card border-red-600/30 space-y-4">
                <button onclick="upscaleIA_Ultra()" class="w-full py-5 bg-gradient-to-r from-red-600 to-zinc-800 text-white font-black text-[11px] rounded-xl uppercase shadow-lg">⚡ Mejorar Resolución x2</button>
            </div>
            
            <button onclick="reset()" class="w-full py-3 bg-zinc-900 text-yellow-500 font-black rounded-xl text-[10px] uppercase mt-auto">Limpiar Todo</button>
        </aside>
    </section>

    <!-- MODAL MULTI-FORMATO -->
    <div id="export-modal">
        <div class="modal-content">
            <h3 class="text-red-600 font-black text-center mb-6 underline uppercase italic">Selector de Formato Master</h3>
            
            <div class="space-y-4 mb-6">
                <!-- OPCIÓN VECTOR -->
                <button onclick="downloadFormat('svg')" id="dl-svg-btn" class="w-full p-4 bg-zinc-900 border border-yellow-600/30 rounded-xl flex items-center justify-between group hover:bg-yellow-600/10 opacity-50 cursor-not-allowed">
                    <div class="text-left">
                        <h4 class="font-black text-xs text-yellow-500 uppercase">Formato SVG (Curvas)</h4>
                        <p class="text-[8px] text-zinc-500 uppercase">Ideal para plotter e Illustrator</p>
                    </div>
                    <span class="text-yellow-600">📥</span>
                </button>

                <!-- OPCIÓN PDF -->
                <button onclick="downloadFormat('pdf')" class="w-full p-4 bg-zinc-900 border border-red-600/30 rounded-xl flex items-center justify-between hover:bg-red-600/10">
                    <div class="text-left">
                        <h4 class="font-black text-xs text-red-500 uppercase">Formato PDF Industrial</h4>
                        <p class="text-[8px] text-zinc-500 uppercase">Documento de Impresión Directa</p>
                    </div>
                    <span class="text-red-600">📥</span>
                </button>

                <!-- OPCIÓN PNG -->
                <button onclick="downloadPNGWith300DPI()" class="w-full p-4 bg-zinc-900 border border-white/20 rounded-xl flex items-center justify-between hover:bg-white/5">
                    <div class="text-left">
                        <h4 class="font-black text-xs text-white uppercase">Formato PNG High-Res</h4>
                        <p class="text-[8px] text-zinc-500 uppercase">Fondo transparente 300 DPI</p>
                    </div>
                    <span class="text-white">📥</span>
                </button>
            </div>

            <button onclick="closeExport()" class="w-full py-3 bg-zinc-800 text-[10px] font-black rounded-lg text-zinc-500 uppercase">Cancelar</button>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('canvas'), ctx = canvas.getContext('2d', { willReadFrequently: true });
        const viewport = document.getElementById('viewport'), zoomContainer = document.getElementById('zoom-container');
        const upload = document.getElementById('upload');
        let originalImg = null, liveSnapshot = null, currentSVG = null;
        let scale = 1, posX = 0, posY = 0, ratio = 1, targetRGB = [0,0,0], currentTool = '';

        function initTool(tool) {
            currentTool = tool;
            document.getElementById('view-home').style.display = 'none';
            document.getElementById('view-tool').classList.add('active-view');
            document.getElementById('panel-vector').classList.toggle('hidden', tool !== 'vector');
            document.getElementById('panel-color').classList.toggle('hidden', tool !== 'color');
            document.getElementById('panel-bg').classList.toggle('hidden', tool !== 'bg');
            document.getElementById('panel-ia').classList.toggle('hidden', tool !== 'ia');
            document.getElementById('btn-top-dl').style.display = 'block';
        }

        upload.onchange = (e) => {
            const reader = new FileReader();
            reader.onload = (ev) => {
                const img = new Image();
                img.onload = () => {
                    canvas.width = img.width; canvas.height = img.height;
                    ctx.drawImage(img, 0, 0); originalImg = img;
                    liveSnapshot = ctx.getImageData(0,0,canvas.width,canvas.height);
                    ratio = img.width/img.height; scale = 0.5; posX = 0; posY = 0; updateTransform();
                };
                img.src = ev.target.result;
            };
            reader.readAsDataURL(e.target.files[0]);
        };

        // --- MOTOR DE VECTORIZACIÓN (IMAGE TRACER) ---
        function runVectorization() {
            if(!originalImg) return;
            const status = document.getElementById('vector-status');
            status.innerText = "Calculando curvas...";
            
            const detailLevel = document.getElementById('vector-detail').value;
            const options = {
                ltres: detailLevel == 1 ? 5 : (detailLevel == 2 ? 1 : 0.1),
                qtres: detailLevel == 1 ? 5 : (detailLevel == 2 ? 1 : 0.1),
                pathomit: 8,
                colorsampling: 1,
                numberofcolors: 16,
                mincolorratio: 0.02
            };

            // Ejecutar trazado
            ImageTracer.imageToSVG(canvas.toDataURL(), (svgstr) => {
                currentSVG = svgstr;
                status.innerText = "Vectorización completa. SVG listo.";
                // Activar botón de descarga SVG en el modal
                const svgBtn = document.getElementById('dl-svg-btn');
                svgBtn.classList.remove('opacity-50', 'cursor-not-allowed');
                svgBtn.onclick = () => downloadFormat('svg');
                alert("Diseño trazado correctamente. Puedes exportarlo en el panel de descarga.");
            }, options);
        }

        // --- DESCARGAS MULTI-FORMATO ---
        function downloadFormat(format) {
            if(format === 'svg' && currentSVG) {
                const blob = new Blob([currentSVG], {type: 'image/svg+xml'});
                const url = URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.download = `JJ_VECTOR_${Date.now()}.svg`;
                a.href = url;
                a.click();
            } else if (format === 'pdf') {
                // Simulación de exportación a PDF usando print
                const win = window.open('', '_blank');
                win.document.write(`<img src="${canvas.toDataURL()}" style="width:100%">`);
                win.print();
                win.close();
            }
            closeExport();
        }

        // --- LAS FUNCIONES DE ANTES (300DPI, IA, BG) ---
        async function downloadPNGWith300DPI() { const dataUrl = canvas.toDataURL('image/png'); const response = await fetch(dataUrl); const arrayBuffer = await (await response.blob()).arrayBuffer(); const uint8Array = new Uint8Array(arrayBuffer); const pixelsPerMeter = Math.round(300 / 0.0254); const pHYsChunk = new Uint8Array(21); pHYsChunk.set([0, 0, 0, 9, 112, 72, 89, 115]); const view = new DataView(pHYsChunk.buffer); view.setUint32(8, pixelsPerMeter); view.setUint32(12, pixelsPerMeter); view.setUint8(16, 1); let crc = 0xFFFFFFFF; const table = window.crcTable || (function() { const t = new Int32Array(256); for (let i = 0; i < 256; i++) { let c = i; for (let j = 0; j < 8; j++) c = (c & 1) ? (0xEDB88320 ^ (c >>> 1)) : (c >>> 1); t[i] = c; } return window.crcTable = t; })(); for (let i = 4; i < 17; i++) crc = table[(crc ^ pHYsChunk[i]) & 0xFF] ^ (crc >>> 1); view.setUint32(17, crc ^ 0xFFFFFFFF); const finalPNG = new Uint8Array(uint8Array.length + 21); finalPNG.set(uint8Array.slice(0, 33)); finalPNG.set(pHYsChunk, 33); finalPNG.set(uint8Array.slice(33), 54); const url = URL.createObjectURL(new Blob([finalPNG], { type: 'image/png' })); const a = document.createElement('a'); a.download = `JJ_PNG_300DPI.png`; a.href = url; a.click(); closeExport(); }
        
        viewport.onwheel = (e) => { if (!originalImg) return; e.preventDefault(); scale = Math.max(0.05, Math.min(20, scale * (e.deltaY > 0 ? 0.9 : 1.1))); updateTransform(); };
        viewport.addEventListener('mousedown', (e) => { if (!originalImg) return; const rect = canvas.getBoundingClientRect(); if (e.button !== 0 || currentTool !== 'color') { isPanning = true; startX = e.clientX - posX; startY = e.clientY - posY; } else { isSelecting = true; startX = (e.clientX - rect.left)/scale; startY = (e.clientY - rect.top)/scale; } });
        window.addEventListener('mousemove', (e) => { if (isPanning) { posX = e.clientX - startX; posY = e.clientY - startY; updateTransform(); } });
        window.addEventListener('mouseup', () => { isSelecting = isPanning = false; });
        function updateTransform() { zoomContainer.style.transform = `translate(${posX}px, ${posY}px) scale(${scale})`; }
        function openExport() { if(!originalImg) return; document.getElementById('export-modal').style.display = 'flex'; }
        function closeExport() { document.getElementById('export-modal').style.display='none'; }
        function captureColor(x, y) { const p = ctx.getImageData(x, y, 1, 1).data; targetRGB = [p[0], p[1], p[2]]; }
        function reset() { if(originalImg) ctx.drawImage(originalImg,0,0); }
        function setBg(c) { viewport.style.backgroundColor = c; }
    </script>
</body>
</html>
