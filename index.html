            <div class="flex gap-3"><button onclick="closeExport()" class="flex-1 py-4 bg-zinc-900 text-[10px] font-black rounded-xl">Cerrar</button><button onclick="downloadPNGWith300DPI()" class="flex-1 btn-jj text-[11px]">Bajar PNG</button></div>

    <script>
        const canvas = document.getElementById('canvas'), ctx = canvas.getContext('2d', { willReadFrequently: true });
        const viewport = document.getElementById('viewport'), zoomContainer = document.getElementById('zoom-container');
        const upload = document.getElementById('upload'), selectionBox = document.getElementById('selection-box');
        let originalImg = null, scale = 1, posX = 0, posY = 0, ratio = 1, targetRGB = [0,0,0], lastDist = 0;
        let isSelecting = false, isPanning = false, startX, startY, selectArea = null, currentTool = '';

        function initTool(tool) {
            currentTool = tool;
            document.getElementById('view-home').style.display = 'none';
            document.getElementById('view-tool').classList.add('active-view');
            document.getElementById('panel-color').classList.toggle('hidden', tool !== 'color');
            document.getElementById('panel-bg').classList.toggle('hidden', tool !== 'bg');
            document.getElementById('panel-ia').classList.toggle('hidden', tool !== 'ia');
            document.getElementById('btn-top-dl').style.display = 'block';
        }

        upload.onchange = (e) => {
            const reader = new FileReader();
            reader.onload = (ev) => {
                const img = new Image();
                img.onload = () => {
                    canvas.width = img.width; canvas.height = img.height;
                    ctx.drawImage(img, 0, 0); originalImg = img; ratio = img.width/img.height;
                    scale = 0.5; posX = 0; posY = 0; updateTransform();
                };
                img.src = ev.target.result;
            };
            reader.readAsDataURL(e.target.files[0]);
        };

        // ZOOM & PANNING
        viewport.onwheel = (e) => { if (!originalImg) return; e.preventDefault(); scale = Math.max(0.05, Math.min(20, scale * (e.deltaY > 0 ? 0.9 : 1.1))); updateTransform(); };
        viewport.addEventListener('mousedown', (e) => {
            if (!originalImg) return;
            const rect = canvas.getBoundingClientRect();
            const tx = (e.clientX - rect.left) / scale; const ty = (e.clientY - rect.top) / scale;
            if (e.button === 2 || e.button === 1 || (e.button === 0 && currentTool !== 'color')) { isPanning = true; startX = e.clientX - posX; startY = e.clientY - posY; captureColor(tx, ty); } 
            else if (e.button === 0 && currentTool === 'color') { isSelecting = true; startX = tx; startY = ty; selectionBox.style.display = 'block'; selectionBox.style.left = startX + 'px'; selectionBox.style.top = startY + 'px'; captureColor(startX, startY); }
        });
        window.addEventListener('mousemove', (e) => { if (isPanning) { posX = e.clientX - startX; posY = e.clientY - startY; updateTransform(); } else if (isSelecting) { const rect = canvas.getBoundingClientRect(); const cx = (e.clientX - rect.left) / scale; const cy = (e.clientY - rect.top) / scale; let x = Math.min(startX, cx), y = Math.min(startY, cy), w = Math.abs(cx - startX), h = Math.abs(cy - startY); selectionBox.style.left = x + 'px'; selectionBox.style.top = y + 'px'; selectionBox.style.width = w + 'px'; selectionBox.style.height = h + 'px'; selectArea = {x, y, w, h}; } });
        window.addEventListener('mouseup', () => { isSelecting = isPanning = false; });
        viewport.addEventListener('contextmenu', e => e.preventDefault());

        viewport.addEventListener('touchstart', (e) => {
            if(!originalImg) return;
            const rect = canvas.getBoundingClientRect();
            const tx = (e.touches[0].clientX - rect.left) / scale; const ty = (e.touches[0].clientY - rect.top) / scale;
            if(e.touches.length === 2) { lastDist = Math.hypot(e.touches[0].pageX - e.touches[1].pageX, e.touches[0].pageY - e.touches[1].pageY); isPanning = true; } 
            else { if(currentTool === 'color') { isSelecting = true; startX = tx; startY = ty; selectionBox.style.display = 'block'; selectionBox.style.left = startX + 'px'; selectionBox.style.top = startY + 'px'; captureColor(startX, startY); } else { isPanning = true; startX = e.touches[0].clientX - posX; startY = e.touches[0].clientY - posY; captureColor(tx, ty); } }
        }, {passive: false});
        viewport.addEventListener('touchmove', (e) => { if(!originalImg) return; e.preventDefault(); if(e.touches.length === 2) { const dist = Math.hypot(e.touches[0].pageX - e.touches[1].pageX, e.touches[0].pageY - e.touches[1].pageY); scale *= (dist/lastDist); lastDist = dist; } else if(isSelecting) { const rect = canvas.getBoundingClientRect(); const cx = (e.touches[0].clientX - rect.left) / scale; const cy = (e.touches[0].clientY - rect.top) / scale; let x = Math.min(startX, cx), y = Math.min(startY, cy), w = Math.abs(cx - startX), h = Math.abs(cy - startY); selectionBox.style.left = x + 'px'; selectionBox.style.top = y + 'px'; selectionBox.style.width = w + 'px'; selectionBox.style.height = h + 'px'; selectArea = {x, y, w, h}; } else if(isPanning) { posX = e.touches[0].clientX - startX; posY = e.touches[0].clientY - startY; } updateTransform(); }, {passive: false});

        function captureColor(x, y) { const p = ctx.getImageData(Math.max(0,Math.min(x,canvas.width-1)), Math.max(0,Math.min(y,canvas.height-1)), 1, 1).data; targetRGB = [p[0], p[1], p[2]]; const hex = `rgb(${p[0]},${p[1]},${p[2]})`; document.getElementById('color-old').style.backgroundColor = hex; document.getElementById('bg-color-preview').style.backgroundColor = hex; }
        function updateTransform() { zoomContainer.style.transform = `translate(${posX}px, ${posY}px) scale(${scale})`; }

        // --- ALGORITMO DETECCIÓN SUJETO ---
        function smartSubjectRemove() {
            if(!originalImg) return;
            const id = ctx.getImageData(0,0,canvas.width,canvas.height); const d = id.data;
            const corners = [
                ctx.getImageData(0,0,1,1).data, 
                ctx.getImageData(canvas.width-1,0,1,1).data,
                ctx.getImageData(0,canvas.height-1,1,1).data,
                ctx.getImageData(canvas.width-1,canvas.height-1,1,1).data
            ];
            const avgBG = [
                (corners[0][0]+corners[1][0]+corners[2][0]+corners[3][0])/4,
                (corners[0][1]+corners[1][1]+corners[2][1]+corners[3][1])/4,
                (corners[0][2]+corners[1][2]+corners[2][2]+corners[3][2])/4
            ];
            for(let i=0; i<d.length; i+=4) {
                const diff = Math.sqrt(Math.pow(d[i]-avgBG[0],2)+Math.pow(d[i+1]-avgBG[1],2)+Math.pow(d[i+2]-avgBG[2],2));
                if(diff < 65) d[i+3] = 0; // Umbral agresivo para sujetos
            }
            ctx.putImageData(id,0,0);
        }

        function removeBG() {
            const id = ctx.getImageData(0,0,canvas.width,canvas.height); const d = id.data;
            const tol = parseInt(document.getElementById('bg-tolerance').value);
            for(let i=0; i<d.length; i+=4) {
                const diff = Math.sqrt(Math.pow(d[i]-targetRGB[0],2)+Math.pow(d[i+1]-targetRGB[1],2)+Math.pow(d[i+2]-targetRGB[2],2));
                if(diff < tol) d[i+3] = 0;
            }
            ctx.putImageData(id,0,0);
        }

        async function downloadPNGWith300DPI() {
            const unit = document.getElementById('exp-unit').value;
            let fW = parseFloat(document.getElementById('exp-width').value);
            let fH = parseFloat(document.getElementById('exp-height').value);
            if(unit === 'cm') { fW = Math.round(fW / 2.54 * 300); fH = Math.round(fH / 2.54 * 300); }
            const oc = document.createElement('canvas'); oc.width = fW; oc.height = fH; const octx = oc.getContext('2d');
            octx.drawImage(canvas, 0, 0, fW, fH);
            const dataUrl = oc.toDataURL('image/png');
            const response = await fetch(dataUrl);
            const arrayBuffer = await (await response.blob()).arrayBuffer();
            const uint8Array = new Uint8Array(arrayBuffer);
            const pixelsPerMeter = Math.round(300 / 0.0254);
            const pHYsChunk = new Uint8Array(21);
            pHYsChunk.set([0, 0, 0, 9, 112, 72, 89, 115]); 
            const view = new DataView(pHYsChunk.buffer);
            view.setUint32(8, pixelsPerMeter); view.setUint32(12, pixelsPerMeter); view.setUint8(16, 1);
            let crc = 0xFFFFFFFF;
            const table = window.crcTable || (function() { const t = new Int32Array(256); for (let i = 0; i < 256; i++) { let c = i; for (let j = 0; j < 8; j++) c = (c & 1) ? (0xEDB88320 ^ (c >>> 1)) : (c >>> 1); t[i] = c; } return window.crcTable = t; })();
            for (let i = 4; i < 17; i++) crc = table[(crc ^ pHYsChunk[i]) & 0xFF] ^ (crc >>> 1);
            view.setUint32(17, crc ^ 0xFFFFFFFF);
            const finalPNG = new Uint8Array(uint8Array.length + 21);
            finalPNG.set(uint8Array.slice(0, 33)); finalPNG.set(pHYsChunk, 33); finalPNG.set(uint8Array.slice(33), 54);
            const url = URL.createObjectURL(new Blob([finalPNG], { type: 'image/png' }));
            const a = document.createElement('a'); a.download = `JJ_MASTER_${fW}x${fH}.png`; a.href = url; a.click();
            closeExport();
        }

        function openExport() { if(!originalImg) return; const unit = document.getElementById('exp-unit').value; const w = document.getElementById('exp-width'); const h = document.getElementById('exp-height'); if(unit === 'px') { w.value = canvas.width; h.value = canvas.height; } else { w.value = (canvas.width/300*2.54).toFixed(2); h.value = (canvas.height/300*2.54).toFixed(2); } document.getElementById('export-modal').style.display = 'flex'; }
        function syncDim(type) { if(!document.getElementById('exp-ratio').checked || !originalImg) return; const w = document.getElementById('exp-width'); const h = document.getElementById('exp-height'); if(type === 'w') { h.value = (parseFloat(w.value) / ratio).toFixed(2); } else { w.value = (parseFloat(h.value) * ratio).toFixed(2); } }
        function closeExport() { document.getElementById('export-modal').style.display='none'; }
        function manualScan() { if(!originalImg) return; const data = ctx.getImageData(0,0,canvas.width,canvas.height).data; const colors = {}; for(let i=0; i<data.length; i+=Math.max(4, Math.floor(data.length/2000)*4)) { if(data[i+3] < 128) continue; const h = "#" + ((1 << 24) + (data[i] << 16) + (data[i+1] << 8) + data[i+2]).toString(16).slice(1).toUpperCase(); colors[h] = (colors[h] || 0) + 1; } const sorted = Object.keys(colors).sort((a,b) => colors[b]-colors[a]).slice(0, 10); const container = document.getElementById('design-palette'); container.innerHTML = ""; sorted.forEach(hex => { const div = document.createElement('div'); div.className = "w-8 h-8 rounded border border-zinc-800 cursor-pointer"; div.style.backgroundColor = hex; div.onclick = () => { const r = parseInt(hex.slice(1,3), 16), g = parseInt(hex.slice(3,5), 16), b = parseInt(hex.slice(5,7), 16); targetRGB = [r,g,b]; document.getElementById('color-old').style.backgroundColor = hex; document.getElementById('bg-color-preview').style.backgroundColor = hex; }; container.appendChild(div); }); }
        function applyColor() { const area = selectArea || {x:0, y:0, w:canvas.width, h:canvas.height}; const id = ctx.getImageData(area.x, area.y, area.w, area.h); const d = id.data, hex = document.getElementById('custom-picker').value, rN = parseInt(hex.slice(1,3),16), gN = parseInt(hex.slice(3,5),16), bN = parseInt(hex.slice(5,7),16); for(let i=0; i<d.length; i+=4) { if(d[i+3]<10) continue; const diff = Math.sqrt(Math.pow(d[i]-targetRGB[0],2)+Math.pow(d[i+1]-targetRGB[1],2)+Math.pow(d[i+2]-targetRGB[2],2)); if(diff < 35) { d[i]=rN; d[i+1]=gN; d[i+2]=bN; } } ctx.putImageData(id, area.x, area.y); selectionBox.style.display='none'; selectArea=null; }
        function upscaleIA(f) { const tc = document.createElement('canvas'); tc.width = canvas.width*f; tc.height = canvas.height*f; tc.getContext('2d').drawImage(canvas,0,0,tc.width,tc.height); canvas.width = tc.width; canvas.height = tc.height; ctx.drawImage(tc,0,0); updateTransform(); }
        function applyIA() { ctx.filter = 'contrast(120%) brightness(102%)'; ctx.drawImage(canvas,0,0); ctx.filter = 'none'; }
        function reset() { if(originalImg) ctx.drawImage(originalImg,0,0); selectionBox.style.display='none'; }
        function setBg(c) { viewport.style.backgroundColor = c; }
    </script>
