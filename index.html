<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>J&J PREMIUM v44</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Lato:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Lato', sans-serif; background: #050505; color: white; margin: 0; overflow: hidden; position: fixed; width: 100%; height: 100%; }
        .bg-premium { background: radial-gradient(circle at center, #250000 0%, #050505 100%); }
        .tool-view { display: none; height: calc(100vh - 65px); width: 100%; }
        #auth-screen { position: fixed; inset: 0; z-index: 9999; background: #000; display: flex; align-items: center; justify-content: center; padding: 20px; }
        .active-view { display: flex !important; }
        .viewport { position: relative; overflow: hidden; display: flex; align-items: center; justify-content: center; background: #0a0a0a; touch-action: none; transition: background 0.3s ease; }
        #zoom-container { transform-origin: center center; position: absolute; pointer-events: none; }
        canvas { box-shadow: 0 0 60px #000; pointer-events: auto; }
        .sidebar { background: #0a0a0a; padding: 15px; display: flex; flex-direction: column; gap: 12px; z-index: 50; }
        .card { background: #111; border: 1px solid #222; border-radius: 12px; padding: 12px; }
        .btn-jj { background: #dc2626; font-weight: 900; text-transform: uppercase; border-radius: 10px; padding: 14px; width: 100%; color: white; border: none; cursor: pointer; }
    </style>
</head>
<body>

    <!-- ACCESO -->
    <div id="auth-screen">
        <div class="max-w-md w-full bg-zinc-900 p-8 rounded-[2rem] border border-red-600/30 text-center shadow-2xl">
            <div class="w-16 h-16 bg-red-600 rounded-2xl flex items-center justify-center font-black text-3xl mx-auto mb-6">J&J</div>
            <h2 class="text-2xl font-black italic uppercase text-white mb-2">Acceso J&J PREMIUM</h2>
            <p class="text-zinc-500 text-[10px] font-bold uppercase mb-8 tracking-widest">Ingresa tu número VIP o usa tus pruebas gratis</p>
            <input type="tel" id="user-phone" placeholder="Número registrado" class="w-full bg-black border border-zinc-800 rounded-xl p-4 text-center text-xl font-black text-red-500 mb-4 focus:border-red-600 outline-none">
            <button onclick="checkAccess()" class="w-full btn-jj py-4 mb-4">Entrar al Sistema</button>
            <button onclick="startTrial()" class="w-full bg-zinc-800 py-3 rounded-xl text-[10px] font-black uppercase text-zinc-400">Pruebas Gratis: <span id="trial-count-ui">2</span></button>
        </div>
    </div>

    <!-- APP -->
    <div id="main-content" style="display:none;">
        <header class="h-[65px] px-4 md:px-8 flex justify-between items-center bg-black border-b border-red-900/40 z-[100]">
            <div class="flex items-center gap-2 cursor-pointer" onclick="location.reload()">
                <div class="w-10 h-10 bg-red-600 rounded flex items-center justify-center font-black text-xl text-white">J&J</div>
                <h1 class="font-black text-sm md:text-lg uppercase italic text-white">J&J <span class="text-red-600 font-black text-white">PREMIUM</span></h1>
            </div>
            <div class="flex items-center gap-3">
                <button id="btn-top-dl" onclick="download300DPI()" class="hidden bg-yellow-500 text-black font-black text-[10px] px-6 py-2 rounded uppercase shadow-lg">📥 DESCARGAR MASTER (300 DPI)</button>
                <div id="status-badge" class="bg-zinc-800 px-3 py-1 rounded text-[8px] font-black border border-zinc-700">USUARIO</div>
            </div>
        </header>

        <section id="view-home" class="h-[calc(100vh-65px)] bg-premium flex flex-col items-center py-10 px-6 overflow-y-auto w-full">
            <h2 class="text-5xl md:text-7xl font-black italic mb-10 uppercase text-center text-white tracking-tighter">J&J PREMIUM</h2>
            <div class="grid grid-cols-1 md:grid-cols-3 gap-6 w-full max-w-6xl mb-12">
                <div onclick="initTool('color')" class="bg-black/40 p-8 rounded-[2rem] border border-white/5 cursor-pointer hover:border-red-600 text-center transition-all shadow-xl"><h3 class="font-black uppercase text-xl italic text-white">Extractor Tintas</h3></div>
                <div onclick="initTool('bg')" class="bg-black/40 p-8 rounded-[2rem] border border-white/5 cursor-pointer hover:border-red-600 text-center transition-all shadow-xl"><h3 class="font-black uppercase text-xl italic text-red-600">Quitar Fondo</h3></div>
                <div onclick="initTool('ia')" class="bg-black/40 p-8 rounded-[2rem] border border-white/5 cursor-pointer hover:border-red-600 text-center transition-all shadow-xl"><h3 class="font-black uppercase text-xl italic text-white">Mejorador IA</h3></div>
            </div>
            <div class="grid grid-cols-1 md:grid-cols-2 gap-4 w-full max-w-2xl pb-10 text-center">
                <a href="https://wa.me/51916689969" target="_blank" class="bg-white/5 p-6 rounded-2xl border border-white/10 text-white hover:bg-green-600/20">👑 Suscribirme ➔</a>
                <a href="https://wa.me/51904503246" target="_blank" class="bg-white/5 p-6 rounded-2xl border border-white/10 text-white hover:bg-red-600/20">🔄 Renovar ➔</a>
            </div>
        </section>

        <section id="view-tool" class="tool-view">
            <main class="viewport" id="viewport">
                <div id="zoom-container"><canvas id="canvas"></canvas></div>
            </main>
            <aside class="sidebar">
                <button onclick="location.reload()" class="bg-zinc-900 text-red-500 font-black py-4 rounded-xl text-[10px] uppercase border border-red-900/20 w-full mb-2">← VOLVER</button>
                <div class="card"><input type="file" id="upload" class="text-[10px] w-full text-zinc-500" accept="image/*"/></div>

                <div class="card">
                    <div class="flex flex-wrap gap-2 justify-center">
                        <div onclick="setBg('#0a0a0a')" class="w-6 h-6 rounded-full bg-black border border-white/10 cursor-pointer"></div>
                        <div onclick="setBg('#ffffff')" class="w-6 h-6 rounded-full bg-white border border-black/10 cursor-pointer"></div>
                        <input type="color" oninput="setBg(this.value)" class="w-6 h-6 bg-transparent border-none p-0 cursor-pointer">
                    </div>
                </div>

                <!-- TINTAS -->
                <div id="panel-color" class="hidden card border-red-600/30 space-y-4">
                    <button onclick="manualScan()" class="w-full py-2 bg-zinc-800 text-[8px] font-black rounded uppercase">1. Escanear Colores</button>
                    <div id="design-palette" class="flex flex-wrap gap-2 justify-center mb-4"></div>
                    <div class="grid grid-cols-2 gap-4 border-t border-zinc-800 pt-4">
                        <div class="text-center"><p class="text-[8px] uppercase text-zinc-500">Actual</p><div id="color-old" class="w-full h-8 rounded border border-white/10 bg-zinc-900"></div></div>
                        <div class="text-center"><p class="text-[8px] uppercase text-red-500 font-black">Nuevo</p><input type="color" id="custom-picker" class="w-full h-8 bg-transparent border-none p-0 cursor-pointer"></div>
                    </div>
                    <button onclick="applyColor()" class="btn-jj text-[10px] mt-4">2. Reemplazar Tinta</button>
                </div>

                <div id="panel-bg" class="hidden card border-red-600/30 space-y-4">
                    <div id="bg-color-preview" class="w-full h-8 rounded border border-white/10 bg-zinc-900"></div>
                    <input type="range" id="bg-tolerance" min="1" max="150" value="40" class="w-full accent-red-600" oninput="updateBGParams()">
                    <button onclick="confirmBG()" class="btn-jj text-[10px]">Confirmar Recorte</button>
                </div>

                <div id="panel-ia" class="hidden card border-yellow-600/30 space-y-4 text-center">
                    <button onclick="upscaleIA_Ultra()" class="w-full py-5 bg-gradient-to-r from-yellow-600 to-red-600 text-white font-black text-[11px] rounded-xl uppercase shadow-lg">⚡ Super Resolución x2</button>
                </div>
                
                <button onclick="reset()" class="w-full py-3 bg-zinc-900 text-yellow-500 font-black rounded-xl text-[10px] uppercase italic mt-auto">Restaurar Original</button>
            </aside>
        </section>
    </div>

    <script>
        const canvas = document.getElementById('canvas'), ctx = canvas.getContext('2d', { willReadFrequently: true });
        const viewport = document.getElementById('viewport'), zoomContainer = document.getElementById('zoom-container');
        const uploadInput = document.getElementById('upload');
        let originalImg = null, liveSnapshot = null, isVIP = false, trials = parseInt(localStorage.getItem('jj_t_44')) || 2;
        let scale = 1, posX = 0, posY = 0, targetRGB = [0,0,0], isPanning = false, startX, startY;

        document.getElementById('trial-count-ui').innerText = trials;

        function checkAccess() {
            const phone = document.getElementById('user-phone').value;
            if(phone === "51916689969" || phone === "VIP") { isVIP = true; enterApp(true); } else { alert("No registrado."); }
        }

        function startTrial() { if(trials <= 0) return alert("Pruebas agotadas."); enterApp(false); }

        function enterApp(vip) {
            document.getElementById('auth-screen').style.display = 'none';
            document.getElementById('main-content').style.display = 'block';
            document.getElementById('status-badge').innerText = vip ? "VIP" : `PRUEBAS: ${trials}`;
        }

        // CARGA DE ARCHIVO FIX
        uploadInput.addEventListener('change', function(e) {
            if(!e.target.files[0]) return;
            const reader = new FileReader();
            reader.onload = function(event) {
                const img = new Image();
                img.onload = function() {
                    canvas.width = img.width; canvas.height = img.height;
                    ctx.drawImage(img, 0, 0); originalImg = img;
                    liveSnapshot = ctx.getImageData(0,0,canvas.width,canvas.height);
                    scale = 0.5; posX = 0; posY = 0; updateTransform();
                };
                img.src = event.target.result;
            };
            reader.readAsDataURL(e.target.files[0]);
        });

        async function download300DPI() {
            if(!isVIP) { if(trials <= 0) { location.reload(); return; } trials--; localStorage.setItem('jj_t_44', trials); }
            alert("Exportando a 300 DPI Industrial...");
            const dataUrl = canvas.toDataURL('image/png');
            const response = await fetch(dataUrl);
            const arrayBuffer = await (await response.blob()).arrayBuffer();
            const uint8Array = new Uint8Array(arrayBuffer);
            const pixelsPerMeter = Math.round(300 / 0.0254);
            const pHYsChunk = new Uint8Array(21);
            pHYsChunk.set([0, 0, 0, 9, 112, 72, 89, 115]); 
            const view = new DataView(pHYsChunk.buffer);
            view.setUint32(8, pixelsPerMeter); view.setUint32(12, pixelsPerMeter); view.setUint8(16, 1);
            let crc = 0xFFFFFFFF;
            const table = window.crcTable || (function() { const t = new Int32Array(256); for (let i = 0; i < 256; i++) { let c = i; for (let j = 0; j < 8; j++) c = (c & 1) ? (0xEDB88320 ^ (c >>> 1)) : (c >>> 1); t[i] = c; } return window.crcTable = t; })();
            for (let i = 4; i < 17; i++) crc = table[(crc ^ pHYsChunk[i]) & 0xFF] ^ (crc >>> 1);
            view.setUint32(17, crc ^ 0xFFFFFFFF);
            const finalPNG = new Uint8Array(uint8Array.length + 21);
            finalPNG.set(uint8Array.slice(0, 33)); finalPNG.set(pHYsChunk, 33); finalPNG.set(uint8Array.slice(33), 54);
            const a = document.createElement('a'); a.download = `JJ_MASTER_300.png`; a.href = URL.createObjectURL(new Blob([finalPNG], { type: 'image/png' })); a.click();
            if(!isVIP && trials === 0) location.reload();
        }

        // TINTAS FIX
        function manualScan() {
            if(!originalImg) return;
            const data = ctx.getImageData(0,0,canvas.width,canvas.height).data;
            const colors = {};
            for(let i=0; i<data.length; i+=Math.max(4, Math.floor(data.length/2000)*4)) {
                if(data[i+3] < 128) continue;
                const h = "#" + ((1 << 24) + (data[i] << 16) + (data[i+1] << 8) + data[i+2]).toString(16).slice(1).toUpperCase();
                colors[h] = (colors[h] || 0) + 1;
            }
            const sorted = Object.keys(colors).sort((a,b) => colors[b]-colors[a]).slice(0, 10);
            const container = document.getElementById('design-palette'); container.innerHTML = "";
            sorted.forEach(hex => {
                const div = document.createElement('div'); div.className = "w-8 h-8 rounded border border-zinc-800 cursor-pointer hover:scale-110"; div.style.backgroundColor = hex;
                div.onclick = () => { targetRGB = [parseInt(hex.slice(1,3), 16), parseInt(hex.slice(3,5), 16), parseInt(hex.slice(5,7), 16)]; document.getElementById('color-old').style.backgroundColor = hex; };
                container.appendChild(div);
            });
        }

        function applyColor() {
            const id = ctx.getImageData(0, 0, canvas.width, canvas.height); const d = id.data;
            const hex = document.getElementById('custom-picker').value;
            const rN = parseInt(hex.slice(1,3),16), gN = parseInt(hex.slice(3,5),16), bN = parseInt(hex.slice(5,7),16);
            for(let i=0; i<d.length; i+=4) {
                const diff = Math.sqrt(Math.pow(d[i]-targetRGB[0],2)+Math.pow(d[i+1]-targetRGB[1],2)+Math.pow(d[i+2]-targetRGB[2],2));
                if(diff < 35) { d[i]=rN; d[i+1]=gN; d[i+2]=bN; }
            }
            ctx.putImageData(id, 0, 0); liveSnapshot = ctx.getImageData(0,0,canvas.width,canvas.height);
        }

        function initTool(t) { currentTool=t; document.getElementById('view-home').style.display='none'; document.getElementById('view-tool').classList.add('active-view'); document.getElementById('btn-top-dl').classList.remove('hidden'); document.getElementById('panel-color').classList.toggle('hidden', t!=='color'); document.getElementById('panel-bg').classList.toggle('hidden', t!=='bg'); document.getElementById('panel-ia').classList.toggle('hidden', t!=='ia'); }
        function updateTransform() { zoomContainer.style.transform = `translate(${posX}px, ${posY}px) scale(${scale})`; }
        viewport.onwheel = (e) => { e.preventDefault(); scale = Math.max(0.1, scale * (e.deltaY > 0 ? 0.9 : 1.1)); updateTransform(); };
        viewport.onmousedown = (e) => { if(!originalImg) return; isPanning = true; startX = e.clientX - posX; startY = e.clientY - posY; };
        window.onmousemove = (e) => { if(isPanning) { posX = e.clientX - startX; posY = e.clientY - startY; updateTransform(); } };
        window.onmouseup = () => isPanning = false;
        function setBg(c) { document.getElementById('viewport').style.backgroundColor = c; }
        function reset() { if(originalImg) { canvas.width = originalImg.width; canvas.height = originalImg.height; ctx.drawImage(originalImg,0,0); liveSnapshot = ctx.getImageData(0,0,canvas.width,canvas.height); } }
        function upscaleIA_Ultra() { const tc = document.createElement('canvas'); tc.width = canvas.width*2; tc.height = canvas.height*2; tc.getContext('2d').drawImage(canvas, 0, 0, tc.width, tc.height); canvas.width = tc.width; canvas.height = tc.height; ctx.drawImage(tc, 0, 0); updateTransform(); }
        function updateBGParams() { if(!originalImg) return; const tol = parseInt(document.getElementById('bg-tolerance').value); const tempId = new ImageData(new Uint8ClampedArray(liveSnapshot.data), canvas.width, canvas.height); const d = tempId.data; for(let i=0; i<d.length; i+=4) { if(d[i]>255-tol && d[i+1]>255-tol && d[i+2]>255-tol) d[i+3]=0; } ctx.putImageData(tempId, 0, 0); }
        function confirmBG() { liveSnapshot = ctx.getImageData(0,0,canvas.width,canvas.height); alert("Confirmado"); }
    </script>
</body>
</html>
