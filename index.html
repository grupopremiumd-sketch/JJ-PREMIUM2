<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>J&J STUDIO v40.0 - ULTIMATE</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Lato:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Lato', sans-serif; background: #050505; color: white; margin: 0; overflow: hidden; position: fixed; width: 100%; height: 100%; }
        .bg-premium { background: radial-gradient(circle at center, #250000 0%, #050505 100%); }
        .tool-view { display: none; height: calc(100vh - 65px); width: 100%; }
        #auth-screen { position: fixed; inset: 0; z-index: 9999; background: #000; display: flex; align-items: center; justify-content: center; padding: 20px; }
        @media (min-width: 1025px) { .tool-view { display: flex; flex-direction: row; height: calc(100vh - 65px); } .viewport { flex-grow: 1; height: 100%; cursor: crosshair; } .sidebar { width: 350px; min-width: 350px; border-left: 2px solid #222; } }
        @media (max-width: 1024px) { .tool-view { display: flex; flex-direction: column; height: calc(100vh - 65px); } .viewport { flex-grow: 1; width: 100%; } .sidebar { width: 100%; height: 450px; border-top: 2px solid #dc2626; overflow-y: auto; padding-bottom: 80px; } }
        .active-view { display: flex !important; }
        .viewport { position: relative; overflow: hidden; display: flex; align-items: center; justify-content: center; background: #0a0a0a; touch-action: none; }
        #zoom-container { transform-origin: center center; position: absolute; pointer-events: none; }
        canvas { box-shadow: 0 0 60px #000; pointer-events: auto; }
        #selection-box { position: absolute; border: 1.5px solid #aaa; display: none; pointer-events: none; z-index: 100; background: rgba(150, 150, 150, 0.3); }
        .sidebar { background: #0a0a0a; padding: 15px; display: flex; flex-direction: column; gap: 12px; z-index: 50; }
        .card { background: #111; border: 1px solid #222; border-radius: 12px; padding: 12px; }
        .btn-jj { background: #dc2626; font-weight: 900; text-transform: uppercase; border-radius: 10px; padding: 14px; width: 100%; color: white; border: none; cursor: pointer; }
        .label-tool { font-size: 9px; font-weight: 900; color: #666; text-transform: uppercase; margin-bottom: 4px; display: block; }
        .accordion-header { cursor: pointer; display: flex; justify-content: space-between; align-items: center; padding: 10px; background: #1a1a1a; border-radius: 8px; margin-bottom: 5px; }
        .accordion-content { display: none; padding: 10px; background: #0d0d0d; border-radius: 0 0 8px 8px; margin-bottom: 10px; border: 1px solid #222; }
        input[type=range] { accent-color: #dc2626; height: 4px; width: 100%; }
        .color-label { font-size: 8px; font-weight: 800; color: #777; text-transform: uppercase; text-align: center; margin-top: 4px; }
        #loading-overlay { position: fixed; inset:0; background: rgba(0,0,0,0.95); z-index: 10000; display: none; flex-direction: column; align-items: center; justify-content: center; }
        .spinner { border: 4px solid rgba(255,255,255,0.1); border-left-color: #dc2626; border-radius: 50%; width: 50px; height: 50px; animation: spin 0.8s linear infinite; margin-bottom: 15px; }
        @keyframes spin { to { transform: rotate(360deg); } }
    </style>
</head>
<body>

    <div id="loading-overlay"><div class="spinner"></div><p id="loading-text" class="font-black italic text-red-500 uppercase text-sm">IA TRABAJANDO...</p></div>

    <div id="auth-screen">
        <div class="max-w-md w-full bg-zinc-900 p-8 rounded-[2rem] border border-red-600/30 text-center shadow-2xl text-white">
            <div class="w-16 h-16 bg-red-600 rounded-2xl flex items-center justify-center font-black text-3xl mx-auto mb-6">J&J</div>
            <h2 class="text-2xl font-black italic uppercase mb-2">Acceso PREMIUM</h2>
            <input type="tel" id="user-phone" placeholder="Número registrado" class="w-full bg-black border border-zinc-800 rounded-xl p-4 text-center text-xl font-black text-red-500 mb-4 focus:border-red-600 outline-none">
            <button onclick="checkAccess()" class="w-full btn-jj py-4 mb-4">Ingresar al Studio</button>
            <div class="mb-6"><button onclick="startTrial()" class="w-full bg-zinc-800 py-3 rounded-xl text-[10px] font-black uppercase text-zinc-400">Prueba Gratis (<span id="t-count">3</span>)</button></div>
            <div class="border-t border-zinc-800 pt-6 space-y-3">
                <a href="https://wa.me/51916689969" target="_blank" class="block text-[10px] font-black uppercase text-green-500 italic">👑 Suscribirme</a>
                <a href="https://wa.me/51904503246" target="_blank" class="block text-[10px] font-black uppercase text-blue-500 italic">🔄 Renovar</a>
            </div>
        </div>
    </div>

    <div id="main-content" style="display:none;">
        <header class="h-[65px] px-4 flex justify-between items-center bg-black border-b border-red-900/40 z-[100]">
            <div class="flex items-center gap-2 cursor-pointer" onclick="window.location.reload()">
                <div class="w-10 h-10 bg-red-600 rounded flex items-center justify-center font-black text-xl shadow-lg text-white">J&J</div>
                <h1 class="font-black text-sm uppercase italic text-white tracking-widest">J&J STUDIO</h1>
            </div>
            <button onclick="downloadPNGWith300DPI()" class="bg-yellow-500 text-black font-black text-[10px] px-4 py-2 rounded shadow-lg uppercase italic">📥 Descargar Master</button>
        </header>

        <section id="view-home" class="h-[calc(100vh-65px)] bg-premium flex flex-col items-center py-10 px-6">
            <h2 class="text-5xl md:text-7xl font-black italic mb-10 uppercase text-center text-white tracking-tighter italic">STUDIO TOOLS</h2>
            <div class="grid grid-cols-1 md:grid-cols-3 gap-6 w-full max-w-6xl">
                <div onclick="initTool('color')" class="bg-black/40 p-8 rounded-[2rem] border border-white/5 cursor-pointer hover:border-red-600 text-center transition-all group"><h3 class="font-black uppercase text-xl italic text-white">MASTER COLOR CHANGER</h3></div>
                <div onclick="initTool('bg')" class="bg-black/40 p-8 rounded-[2rem] border border-white/5 cursor-pointer hover:border-red-600 text-center transition-all group"><h3 class="font-black uppercase text-xl italic text-red-600">Quitar Fondo</h3></div>
                <div onclick="initTool('ia')" class="bg-black/40 p-8 rounded-[2rem] border border-white/5 cursor-pointer hover:border-red-600 text-center transition-all group"><h3 class="font-black uppercase text-xl italic text-white">Mejorador IA Pro</h3></div>
            </div>
        </section>

        <section id="view-tool" class="tool-view">
            <main class="viewport" id="viewport">
                <div id="zoom-container">
                    <canvas id="canvas"></canvas>
                    <div id="selection-box"></div>
                </div>
            </main>
            <aside class="sidebar">
                <button onclick="goBack()" class="bg-zinc-900 text-red-500 font-black py-4 rounded-xl text-[10px] uppercase border border-red-900/20 w-full mb-2">← VOLVER</button>
                <div class="card"><input type="file" id="upload" class="text-[10px] w-full text-zinc-500" accept="image/*"/></div>

                <div class="card border-zinc-800">
                    <p class="label-tool text-center mb-3">Mesa de Trabajo</p>
                    <div class="flex flex-wrap gap-x-4 justify-center">
                        <div onclick="setBg('#0a0a0a')" class="w-6 h-6 rounded-full bg-black border border-white/10 cursor-pointer"></div>
                        <div onclick="setBg('#ffffff')" class="w-6 h-6 rounded-full bg-white border border-black/10 cursor-pointer"></div>
                        <div onclick="setBg('#dc2626')" class="w-6 h-6 rounded-full bg-red-600 cursor-pointer"></div>
                        <input type="color" oninput="setBg(this.value)" class="w-6 h-6 bg-transparent border-none p-0 cursor-pointer shadow-lg">
                    </div>
                </div>

                <div id="panel-color" class="hidden card border-red-600/30 space-y-4">
                    <p class="label-tool text-red-500 text-center italic font-black">Selección de zona activada</p>
                    <div class="grid grid-cols-2 gap-4">
                        <div class="text-center"><p class="text-[8px] font-black uppercase mb-1">Base</p><div id="color-old" class="w-full h-10 rounded border border-white/10 bg-zinc-900 shadow-inner"></div></div>
                        <div class="text-center"><p class="text-[8px] text-red-500 font-black uppercase mb-1">Nueva Tinta</p><input type="color" id="custom-picker" class="w-full h-10 bg-transparent border-none p-0 cursor-pointer"></div>
                    </div>
                    <button onclick="applyColor()" class="btn-jj text-[10px] shadow-2xl">Reemplazar en zona gris</button>
                    <button onclick="manualScan()" class="w-full py-2 bg-zinc-800 text-[8px] font-black rounded uppercase">Escanear Diseño</button>
                </div>

                <div id="panel-ia" class="hidden space-y-2">
                    <button onclick="superUpscaleIA()" class="w-full py-4 bg-gradient-to-r from-blue-600 via-indigo-600 to-red-600 text-white font-black text-[11px] rounded-xl shadow-lg uppercase mb-3">💎 RECONSTRUCCIÓN IA 4K</button>
                    
                    <div onclick="toggleAccordion('acc-raw')" class="accordion-header"><span class="text-[9px] font-black text-blue-400">REVELADO RAW</span><span>▼</span></div>
                    <div id="acc-raw" class="accordion-content space-y-4">
                        <div><label class="label-tool flex justify-between">Exposición: <span id="v-exp">0</span></label><input type="range" id="ia-exp" min="-100" max="100" value="0" oninput="applyMasterFilters()"></div>
                        <div><label class="label-tool flex justify-between">Sombras: <span id="v-shadows">0</span></label><input type="range" id="ia-shadows" min="-100" max="100" value="0" oninput="applyMasterFilters()"></div>
                        <div><label class="label-tool flex justify-between">Altas Luces: <span id="v-highlights">0</span></label><input type="range" id="ia-highlights" min="-100" max="100" value="0" oninput="applyMasterFilters()"></div>
                    </div>

                    <div onclick="toggleAccordion('acc-cal')" class="accordion-header"><span class="text-[9px] font-black text-yellow-500">AJUSTES DE CALIDAD</span><span>▼</span></div>
                    <div id="acc-cal" class="accordion-content space-y-4">
                        <div><label class="label-tool flex justify-between">Brillo: <span id="v-bright">100%</span></label><input type="range" id="ia-bright" min="50" max="150" value="100" oninput="applyMasterFilters()"></div>
                        <div><label class="label-tool flex justify-between">Saturación: <span id="v-sat">100%</span></label><input type="range" id="ia-sat" min="0" max="200" value="100" oninput="applyMasterFilters()"></div>
                        <div><label class="label-tool flex justify-between">Nitidez (Focus): <span id="v-sharp">1.0</span></label><input type="range" id="ia-sharp" min="1.0" max="2.5" step="0.1" value="1.0" oninput="applyMasterFilters()"></div>
                    </div>
                </div>

                <div id="panel-bg" class="hidden card border-red-600/30 space-y-4">
                    <div id="bg-color-preview" class="w-full h-8 rounded border border-white/10 bg-zinc-900 shadow-inner"></div>
                    <div><label class="label-tool flex justify-between">Tolerancia (Poder): <span id="val-tol">40</span></label><input type="range" id="bg-tolerance" min="0" max="150" value="40" oninput="updateBGParams()"></div>
                    <button onclick="confirmBG()" class="btn-jj text-[10px]">Confirmar Recorte</button>
                </div>
                
                <button onclick="hardReset()" class="w-full py-3 bg-zinc-900 text-yellow-500 font-black rounded-xl text-[10px] uppercase mt-auto shadow-lg">REESTABLECER</button>
            </aside>
        </section>
    </div>

    <script>
        const canvas = document.getElementById('canvas'), ctx = canvas.getContext('2d', { willReadFrequently: true });
        const viewport = document.getElementById('viewport'), zoomContainer = document.getElementById('zoom-container');
        const upload = document.getElementById('upload'), selectionBox = document.getElementById('selection-box');
        const loader = document.getElementById('loading-overlay');
        
        let originalImg = null, liveSnapshot = null, initialSnapshot = null; 
        let scale = 1, posX = 0, posY = 0, targetRGB = [255,255,255], isPanning = false, isSelecting = false, startX, startY, selectArea = null, currentTool = '';

        let trials = localStorage.getItem('jj_trials_v40') || 3;
        document.getElementById('t-count').innerText = trials;
        function checkAccess() { const p = document.getElementById('user-phone').value; if(p === "51916689969" || p === "VIP") enterApp(); else alert("No VIP."); }
        function startTrial() { if(trials > 0) enterApp(); else alert("Sin pruebas."); }
        function enterApp() { document.getElementById('auth-screen').style.display = 'none'; document.getElementById('main-content').style.display = 'block'; }
        
        function goBack() { 
            document.getElementById('view-tool').classList.remove('active-view'); 
            document.getElementById('view-home').style.display = 'flex'; 
            originalImg = null; liveSnapshot = null; initialSnapshot = null;
            canvas.width = 1; canvas.height = 1; upload.value = "";
            selectionBox.style.display = 'none'; selectArea = null;
        }

        upload.onchange = (e) => {
            const reader = new FileReader();
            reader.onload = (ev) => {
                const img = new Image();
                img.onload = () => {
                    canvas.width = img.width; canvas.height = img.height;
                    ctx.drawImage(img, 0, 0); originalImg = img;
                    liveSnapshot = ctx.getImageData(0,0,canvas.width,canvas.height);
                    initialSnapshot = ctx.getImageData(0,0,canvas.width,canvas.height);
                    const padding = 40;
                    scale = Math.min((viewport.offsetWidth - padding) / img.width, (viewport.offsetHeight - padding) / img.height, 1);
                    posX = 0; posY = 0; updateTransform();
                };
                img.src = ev.target.result;
            };
            reader.readAsDataURL(e.target.files[0]);
        };

        // --- SELECTOR DE ZONAS Y GOTERO ---
        viewport.addEventListener('mousedown', (e) => {
            if (!originalImg) return;
            const rect = canvas.getBoundingClientRect();
            const tx = (e.clientX - rect.left) / (rect.width / canvas.width);
            const ty = (e.clientY - rect.top) / (rect.height / canvas.height);
            
            if (e.button === 0) { 
                const p = ctx.getImageData(Math.floor(tx), Math.floor(ty), 1, 1).data;
                targetRGB = [p[0], p[1], p[2]];
                document.getElementById('color-old').style.backgroundColor = `rgb(${p[0]},${p[1]},${p[2]})`;
                document.getElementById('bg-color-preview').style.backgroundColor = `rgb(${p[0]},${p[1]},${p[2]})`;
                
                if(currentTool === 'color') { isSelecting = true; startX = tx; startY = ty; }
                if(currentTool === 'bg') updateBGParams(); // Quitar fondo instantáneo al hacer clic
            }
            isPanning = true; startX = e.clientX - posX; startY = e.clientY - posY;
        });

        window.addEventListener('mousemove', (e) => {
            if (isPanning && !isSelecting) { posX = e.clientX - startX; posY = e.clientY - startY; updateTransform(); }
            if (isSelecting) {
                const rect = canvas.getBoundingClientRect();
                const cx = (e.clientX - rect.left) / (rect.width / canvas.width);
                const cy = (e.clientY - rect.top) / (rect.height / canvas.height);
                selectionBox.style.display = 'block';
                let x = Math.min(startX, cx), y = Math.min(startY, cy), w = Math.abs(cx - startX), h = Math.abs(cy - startY);
                selectionBox.style.left = x + 'px'; selectionBox.style.top = y + 'px';
                selectionBox.style.width = w + 'px'; selectionBox.style.height = h + 'px';
                selectArea = {x, y, w, h};
            }
        });
        window.addEventListener('mouseup', () => { isSelecting = isPanning = false; });

        // --- CAMBIADOR DE COLOR CON ZONA ---
        function applyColor() {
            if(!originalImg) return;
            const area = selectArea ? { x: Math.floor(selectArea.x), y: Math.floor(selectArea.y), w: Math.floor(selectArea.w), h: Math.floor(selectArea.h) } : {x:0, y:0, w:canvas.width, h:canvas.height};
            const id = ctx.getImageData(area.x, area.y, area.w, area.h);
            const d = id.data;
            const hex = document.getElementById('custom-picker').value;
            const rN = parseInt(hex.slice(1,3),16), gN = parseInt(hex.slice(3,5),16), bN = parseInt(hex.slice(5,7),16);
            for(let i=0; i<d.length; i+=4) {
                if(d[i+3] < 10) continue;
                const eDiff = Math.sqrt(Math.pow(d[i]-targetRGB[0],2)+Math.pow(d[i+1]-targetRGB[1],2)+Math.pow(d[i+2]-targetRGB[2],2));
                if(eDiff < 75) { d[i]=rN; d[i+1]=gN; d[i+2]=bN; }
            }
            ctx.putImageData(id, area.x, area.y);
            liveSnapshot = ctx.getImageData(0,0,canvas.width,canvas.height);
            selectionBox.style.display='none'; selectArea = null;
        }

        // --- MEJORADOR IA PRO ---
        function applyMasterFilters() {
            if(!originalImg) return;
            const exp = parseInt(document.getElementById('ia-exp').value);
            const shadows = parseInt(document.getElementById('ia-shadows').value);
            const highlights = parseInt(document.getElementById('ia-highlights').value);
            const sat = document.getElementById('ia-sat').value;
            const sharp = document.getElementById('ia-sharp').value;
            const bright = document.getElementById('ia-bright').value;

            document.getElementById('v-exp').innerText = exp;
            document.getElementById('v-shadows').innerText = shadows;
            document.getElementById('v-highlights').innerText = highlights;
            document.getElementById('v-bright').innerText = bright + "%";
            document.getElementById('v-sat').innerText = sat + "%";
            document.getElementById('v-sharp').innerText = sharp;

            ctx.clearRect(0,0,canvas.width,canvas.height);
            // Motor de Sombras/Luces vía Contraste y Brillo selectivo
            const shadowAdj = 100 + (shadows * -0.2); 
            const highAdj = 100 + (highlights * 0.2);

            ctx.filter = `brightness(${parseInt(bright) + exp}%) saturate(${sat}%) contrast(${shadowAdj}%)`;
            ctx.drawImage(originalImg, 0, 0);
            
            if(sharp > 1.0) {
                ctx.globalAlpha = 0.4;
                ctx.drawImage(canvas, -1, -1);
                ctx.globalAlpha = 1.0;
            }
            ctx.filter = 'none';
        }

        async function superUpscaleIA() {
            if(!originalImg) return;
            loader.style.display = 'flex';
            await new Promise(r => setTimeout(r, 1200));
            const off = document.createElement('canvas'); const octx = off.getContext('2d');
            off.width = canvas.width * 2; off.height = canvas.height * 2;
            octx.imageSmoothingEnabled = true; octx.imageSmoothingQuality = 'high';
            octx.drawImage(canvas, 0, 0, off.width, off.height);
            const id = octx.getImageData(0,0,off.width, off.height); const d = id.data;
            for (let i = 0; i < d.length; i += 4) { for(let j=0; j<3; j++) d[i+j] = d[i+j] + (d[i+j] - 127) * 0.5; }
            octx.putImageData(id, 0, 0);
            canvas.width = off.width; canvas.height = off.height; ctx.drawImage(off, 0, 0);
            const newBase = new Image(); newBase.onload = () => { originalImg = newBase; liveSnapshot = ctx.getImageData(0,0,canvas.width,canvas.height); loader.style.display = 'none'; }; newBase.src = canvas.toDataURL();
        }

        // QUITAR FONDO REPARADO
        function updateBGParams() {
            if(!liveSnapshot) return;
            const tol = parseInt(document.getElementById('bg-tolerance').value);
            document.getElementById('val-tol').innerText = tol;
            const tempId = new ImageData(new Uint8ClampedArray(liveSnapshot.data), canvas.width, canvas.height);
            const d = tempId.data;
            for(let i=0; i<d.length; i+=4) {
                const diff = Math.sqrt(Math.pow(d[i]-targetRGB[0],2)+Math.pow(d[i+1]-targetRGB[1],2)+Math.pow(d[i+2]-targetRGB[2],2));
                if(diff < tol) d[i+3] = 0;
            }
            ctx.putImageData(tempId, 0, 0);
        }
        function confirmBG() { liveSnapshot = ctx.getImageData(0,0,canvas.width,canvas.height); }

        // SISTEMA BASE
        function updateTransform() { zoomContainer.style.transform = `translate(${posX}px, ${posY}px) scale(${scale})`; }
        viewport.onwheel = (e) => { e.preventDefault(); scale = Math.max(0.01, scale * (e.deltaY > 0 ? 0.9 : 1.1)); updateTransform(); };
        function setBg(c) { document.getElementById('viewport').style.backgroundColor = c; }
        function hardReset() { if(initialSnapshot) { canvas.width = initialSnapshot.width; canvas.height = initialSnapshot.height; ctx.putImageData(initialSnapshot, 0, 0); originalImg.src = canvas.toDataURL(); liveSnapshot = ctx.getImageData(0,0,canvas.width,canvas.height); posX = 0; posY = 0; scale = 0.5; updateTransform(); } }
        async function downloadPNGWith300DPI() { if(!originalImg) return; trials--; localStorage.setItem('jj_trials_v40', trials); const a = document.createElement('a'); a.download = `JJ_MASTER_PRO.png`; a.href = canvas.toDataURL('image/png'); a.click(); }
        function toggleAccordion(id) { const el = document.getElementById(id); el.style.display = (el.style.display === 'block') ? 'none' : 'block'; }
        function manualScan() { const data = ctx.getImageData(0,0,canvas.width,canvas.height).data; const colors = {}; for(let i=0; i<data.length; i+=Math.max(4, Math.floor(data.length/2000)*4)) { if(data[i+3] < 128) continue; const h = "#" + ((1 << 24) + (data[i] << 16) + (data[i+1] << 8) + data[i+2]).toString(16).slice(1).toUpperCase(); colors[h] = (colors[h] || 0) + 1; } const sorted = Object.keys(colors).sort((a,b) => colors[b]-colors[a]).slice(0, 10); const container = document.getElementById('design-palette'); container.innerHTML = ""; sorted.forEach(hex => { const div = document.createElement('div'); div.className = "w-8 h-8 rounded border border-zinc-800 cursor-pointer shadow-lg"; div.style.backgroundColor = hex; div.onclick = () => { targetRGB = [parseInt(hex.slice(1,3), 16), parseInt(hex.slice(3,5), 16), parseInt(hex.slice(5,7), 16)]; document.getElementById('color-old').style.backgroundColor = hex; }; container.appendChild(div); }); }
    </script>
</body>
</html>
