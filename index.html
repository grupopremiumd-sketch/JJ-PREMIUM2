<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>J&J PREMIUM - Studio</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Lato:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Lato', sans-serif; background: #050505; color: white; overflow: hidden; margin: 0; }
        .bg-premium { background: radial-gradient(circle at center, #250000 0%, #050505 100%); }
        
        /* Layout Adaptable */
        .tool-view { 
            display: none; 
            grid-template-columns: 1fr 350px; 
            height: calc(100vh - 65px); 
        }
        @media (max-width: 768px) {
            .tool-view { grid-template-columns: 1fr; grid-template-rows: 1fr auto; }
            .sidebar { border-left: none; border-top: 1px solid #222; height: 300px; width: 100% !important; }
        }

        .active-view { display: grid !important; }
        .viewport { overflow: hidden; position: relative; display: flex; align-items: center; justify-content: center; background-color: #0a0a0a; background-image: radial-gradient(#1a1a1a 1px, transparent 1px); background-size: 20px 20px; touch-action: none; }
        
        #zoom-container { transform-origin: center center; position: absolute; }
        canvas { box-shadow: 0 0 30px rgba(0,0,0,1); max-width: none; }
        
        .sidebar { background: #0a0a0a; border-left: 1px solid #222; padding: 15px; overflow-y: auto; display: flex; flex-direction: column; gap: 10px; z-index: 50; }
        .card { background: #111; border: 1px solid #222; border-radius: 12px; padding: 12px; }
        
        /* Botones Optimizados para Pulgar */
        .btn-jj { background: #dc2626; font-weight: 900; text-transform: uppercase; border-radius: 10px; cursor: pointer; padding: 14px; }
        .btn-restore { background: #facc15; color: #000; font-weight: 900; text-transform: uppercase; border-radius: 10px; padding: 10px; }
        .btn-back { background: rgba(255,255,255,0.05); color: #ef4444; font-weight: 900; padding: 12px; border-radius: 10px; width: 100%; font-size: 11px; }

        #export-modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.95); z-index: 2000; align-items: center; justify-content: center; padding: 10px; }
        .modal-content { background: #0a0a0a; border: 1px solid #dc2626; border-radius: 15px; width: 100%; max-width: 400px; padding: 20px; }
        
        #selection-box { position: absolute; border: 2px dashed #dc2626; display: none; pointer-events: none; z-index: 100; }
    </style>
</head>
<body class="flex flex-col h-screen">

    <header class="h-[65px] px-4 md:px-8 flex justify-between items-center bg-black border-b border-red-900/40 z-[100]">
        <div class="flex items-center gap-2 cursor-pointer" onclick="showView('home')">
            <div class="w-8 h-8 bg-red-600 rounded flex items-center justify-center"><span class="text-white font-black italic">J&J</span></div>
            <h1 class="font-black text-sm md:text-lg uppercase italic tracking-tighter">J&J <span class="text-red-600">PREMIUM</span></h1>
        </div>
        <div id="top-info" class="hidden items-center text-[8px] font-bold text-red-500 uppercase">
             Z: <span id="zoom-label">100</span>%
        </div>
        <a href="https://wa.me/51916689969" target="_blank" class="bg-red-600 px-3 py-1.5 rounded text-[10px] font-black uppercase">VIP</a>
    </header>

    <section id="view-home" class="h-[calc(100vh-65px)] overflow-y-auto bg-premium flex flex-col items-center py-8 px-4 custom-scroll text-center">
        <h2 class="text-4xl md:text-6xl font-black italic mb-2 uppercase">J&J PREMIUM</h2>
        <p class="text-zinc-500 font-bold uppercase text-[8px] mb-8 tracking-[0.3em]">STUDIO PROFESIONAL MÓVIL</p>

        <div class="grid grid-cols-1 md:grid-cols-3 gap-4 w-full max-w-5xl mb-8">
            <div onclick="initTool('color')" class="bg-black/40 p-6 rounded-3xl border border-white/5 active:scale-95 transition-transform">
                <div class="text-4xl mb-2">🎨</div>
                <h3 class="font-black uppercase italic">Colorizador</h3>
            </div>
            <div onclick="initTool('bg')" class="bg-black/40 p-6 rounded-3xl border border-white/5 active:scale-95 transition-transform">
                <div class="text-4xl mb-2">✂️</div>
                <h3 class="font-black uppercase italic text-red-600">Quitar Fondo</h3>
            </div>
            <div onclick="initTool('ia')" class="bg-black/40 p-6 rounded-3xl border border-white/5 active:scale-95 transition-transform">
                <div class="text-4xl mb-2">✨</div>
                <h3 class="font-black uppercase italic">Mejorador IA</h3>
            </div>
        </div>

        <div class="flex flex-col gap-3 w-full max-w-md pb-10">
            <a href="https://wa.me/51916689969" class="bg-white/5 p-4 rounded-xl border border-white/10 flex items-center justify-between">
                <span class="font-black text-[10px] uppercase italic">👑 Quiero ser Premium</span>
                <span class="text-xl">➔</span>
            </a>
            <a href="https://wa.me/51904503246" class="bg-white/5 p-4 rounded-xl border border-white/10 flex items-center justify-between">
                <span class="font-black text-[10px] uppercase italic">🔄 Renovar</span>
                <span class="text-xl">➔</span>
            </a>
        </div>
    </section>

    <section id="view-tool" class="tool-view">
        <main class="viewport" id="viewport">
            <div id="zoom-container">
                <div id="canvas-wrapper">
                    <div id="selection-box"></div>
                    <canvas id="canvas"></canvas>
                </div>
            </div>
        </main>

        <aside class="sidebar custom-scroll">
            <button onclick="showView('home')" class="btn-back">← VOLVER</button>
            
            <div class="card">
                <input type="file" id="upload" class="text-[10px] w-full"/>
            </div>

            <div id="panel-color" class="hidden space-y-3">
                <div class="card border-red-600/30">
                    <div id="design-palette" class="flex flex-wrap gap-1 mb-3 justify-center"></div>
                    <div class="flex items-center gap-4 justify-center bg-black p-2 rounded-lg mb-2">
                        <div id="color-old" class="w-8 h-8 rounded border border-white/10"></div>
                        <span class="text-[10px]">➔</span>
                        <input type="color" id="custom-picker" class="w-8 h-8 bg-transparent border-none">
                    </div>
                    <button onclick="applyColorAction()" class="btn-jj w-full">Cambiar Color</button>
                </div>
            </div>

            <div id="panel-bg" class="hidden space-y-3">
                <div class="card border-red-600/30">
                    <div class="grid grid-cols-2 gap-2 mb-2">
                        <button onclick="quickRemove('white')" class="py-2 bg-white text-black text-[8px] font-black rounded">QUITAR BLANCO</button>
                        <button onclick="quickRemove('black')" class="py-2 bg-zinc-800 text-white text-[8px] font-black rounded">QUITAR NEGRO</button>
                    </div>
                    <button onclick="applyBgRemovePro()" class="btn-jj w-full">BORRAR FONDO</button>
                </div>
            </div>

            <div id="panel-ia" class="hidden space-y-3">
                <div class="card border-red-600/30">
                    <button onclick="upscaleIA(2)" class="w-full py-2 bg-zinc-900 border border-red-900/30 rounded-lg text-[9px] font-black text-red-500 mb-2">HD x2</button>
                    <button onclick="applyBetterIA()" class="btn-jj w-full text-[10px]">MEJORAR IA</button>
                </div>
            </div>

            <div class="flex gap-2">
                <button onclick="resetToOriginal()" class="btn-restore flex-1 text-[9px]">RESTAURAR</button>
                <button onclick="openExportModal()" class="bg-white text-black font-black rounded-lg flex-1 text-[9px] uppercase">Descargar</button>
            </div>
        </aside>
    </section>

    <div id="export-modal">
        <div class="modal-content text-center">
            <h3 class="text-red-600 font-black mb-4 italic uppercase">Exportar Diseño</h3>
            <div class="grid grid-cols-2 gap-2 mb-4">
                <input type="number" id="exp-width" class="input-jj" oninput="syncDim('w')" placeholder="Ancho">
                <input type="number" id="exp-height" class="input-jj" oninput="syncDim('h')" placeholder="Alto">
            </div>
            <div class="flex gap-2">
                <button onclick="closeExportModal()" class="flex-1 py-3 bg-zinc-900 text-gray-500 rounded-lg font-black text-[9px] uppercase">Cerrar</button>
                <button onclick="downloadPro()" class="flex-1 btn-jj py-3 text-[10px] text-white">DESCARGAR</button>
            </div>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('canvas'), ctx = canvas.getContext('2d', { willReadFrequently: true });
        const viewport = document.getElementById('viewport'), zoomContainer = document.getElementById('zoom-container');
        const selectionBox = document.getElementById('selection-box'), upload = document.getElementById('upload');
        let originalImg = null, scale = 1, posX = 0, posY = 0, isSelecting = false, isPanning = false, startX, startY, ratio = 1;
        let lastTouchDist = 0; // Para Pinch Zoom en móvil

        // NAVEGACIÓN
        function showView(view) {
            document.getElementById('view-home').classList.toggle('hidden', view !== 'home');
            document.getElementById('view-tool').classList.toggle('active-view', view !== 'home');
            document.getElementById('top-info').classList.toggle('flex', view !== 'home');
            if(view === 'home') { originalImg = null; ctx.clearRect(0,0,canvas.width,canvas.height); }
        }

        function initTool(tool) {
            currentTool = tool; showView('tool');
            document.getElementById('panel-color').classList.toggle('hidden', tool !== 'color');
            document.getElementById('panel-bg').classList.toggle('hidden', tool !== 'bg');
            document.getElementById('panel-ia').classList.toggle('hidden', tool !== 'ia');
        }

        // CARGA
        upload.onchange = (e) => {
            const reader = new FileReader();
            reader.onload = (ev) => {
                const img = new Image();
                img.onload = () => {
                    canvas.width = img.width; canvas.height = img.height;
                    ctx.drawImage(img, 0, 0);
                    originalImg = img; ratio = img.width / img.height;
                    document.getElementById('exp-width').value = img.width;
                    document.getElementById('exp-height').value = img.height;
                    scale = 0.5; posX = 0; posY = 0; updateTransform();
                };
                img.src = ev.target.result;
            };
            reader.readAsDataURL(e.target.files[0]);
        };

        // ZOOM Y GESTOS MÓVILES
        viewport.addEventListener('touchstart', (e) => {
            if(!originalImg) return;
            if (e.touches.length === 2) {
                lastTouchDist = Math.hypot(e.touches[0].pageX - e.touches[1].pageX, e.touches[0].pageY - e.touches[1].pageY);
            } else {
                isPanning = true;
                startX = e.touches[0].pageX - posX;
                startY = e.touches[0].pageY - posY;
            }
        });

        viewport.addEventListener('touchmove', (e) => {
            if(!originalImg) return;
            if (e.touches.length === 2) {
                const dist = Math.hypot(e.touches[0].pageX - e.touches[1].pageX, e.touches[0].pageY - e.touches[1].pageY);
                const zoom = dist / lastTouchDist;
                scale = Math.max(0.05, Math.min(10, scale * zoom));
                lastTouchDist = dist;
                updateTransform();
            } else if (isPanning) {
                posX = e.touches[0].pageX - startX;
                posY = e.touches[0].pageY - startY;
                updateTransform();
            }
        });

        viewport.addEventListener('touchend', () => { isPanning = false; });

        // ZOOM RATÓN
        viewport.onwheel = (e) => {
            if(!originalImg) return; e.preventDefault();
            scale = Math.max(0.05, Math.min(15, scale + (e.deltaY > 0 ? -0.1 : 0.1) * scale));
            updateTransform();
        };

        function updateTransform() {
            zoomContainer.style.transform = `translate(${posX}px, ${posY}px) scale(${scale})`;
            document.getElementById('zoom-label').innerText = Math.round(scale * 100);
        }

        // ACCIONES
        function resetToOriginal() { if(originalImg) ctx.drawImage(originalImg,0,0); }
        function openExportModal() { document.getElementById('export-modal').style.display='flex'; }
        function closeExportModal() { document.getElementById('export-modal').style.display='none'; }
        function downloadPro() {
            const w = document.getElementById('exp-width').value;
            const h = document.getElementById('exp-height').value;
            const oc = document.createElement('canvas'); oc.width = w; oc.height = h;
            const octx = oc.getContext('2d'); octx.imageSmoothingQuality='high';
            octx.drawImage(canvas,0,0,w,h);
            const a = document.createElement('a'); a.download = 'jj_final.png'; a.href = oc.toDataURL(); a.click();
            closeExportModal();
        }
        function setBg(c) { viewport.style.backgroundColor = c; }
        // ... (Resto de funciones: applyColorAction, applyBgRemovePro, etc similares a la v7)
    </script>
</body>
</html>
