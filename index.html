<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>J&J PREMIUM v40</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Lato:wght@400;700;900&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/imagetracerjs/1.2.6/imagetracer_v1.2.6.js"></script>
    <style>
        body { font-family: 'Lato', sans-serif; background: #050505; color: white; margin: 0; overflow: hidden; position: fixed; width: 100%; height: 100%; }
        .bg-premium { background: radial-gradient(circle at center, #250000 0%, #050505 100%); }
        
        /* Control de Vistas */
        #view-home { display: flex; flex-direction: column; align-items: center; }
        #view-tool { display: none; }
        .active-tool-view { display: flex !important; }

        .tool-view { height: calc(100vh - 65px); width: 100%; }
        @media (min-width: 1025px) { 
            .tool-view { flex-direction: row; } 
            .viewport { flex-grow: 1; height: 100%; } 
            .sidebar { width: 350px; border-left: 2px solid #222; } 
        }
        @media (max-width: 1024px) { 
            .tool-view { flex-direction: column; } 
            .viewport { flex-grow: 1; width: 100%; } 
            .sidebar { width: 100%; height: 350px; border-top: 2px solid #dc2626; overflow-y: auto; } 
        }

        .viewport { position: relative; overflow: hidden; display: flex; align-items: center; justify-content: center; background: #0a0a0a; touch-action: none; }
        #zoom-container { transform-origin: center center; position: absolute; pointer-events: none; }
        canvas { box-shadow: 0 0 60px #000; pointer-events: auto; }
        
        .sidebar { background: #0a0a0a; padding: 15px; display: flex; flex-direction: column; gap: 12px; z-index: 50; }
        .card { background: #111; border: 1px solid #222; border-radius: 12px; padding: 12px; }
        .btn-jj { background: #dc2626; font-weight: 900; text-transform: uppercase; border-radius: 10px; padding: 14px; width: 100%; color: white; border: none; cursor: pointer; text-align: center; }
        
        #loader-vector { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.9); z-index: 9999; flex-direction: column; align-items: center; justify-content: center; }
        .spinner { width: 50px; height: 50px; border: 5px solid #333; border-top: 5px solid #dc2626; border-radius: 50%; animation: spin 1s linear infinite; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>

    <div id="loader-vector">
        <div class="spinner mb-4"></div>
        <p class="font-black text-white uppercase italic">Procesando con J&J IA...</p>
    </div>

    <header class="h-[65px] px-4 md:px-8 flex justify-between items-center bg-black border-b border-red-900/40 z-[1000]">
        <div class="flex items-center gap-2 cursor-pointer" onclick="location.reload()">
            <div class="w-10 h-10 bg-red-600 rounded flex items-center justify-center font-black text-xl text-white">J&J</div>
            <h1 class="font-black text-lg uppercase italic text-white">J&J <span class="text-red-600">PREMIUM</span></h1>
        </div>
        <button id="btn-top-dl" onclick="openExport()" class="hidden bg-yellow-500 text-black font-black text-[10px] px-4 py-2 rounded uppercase shadow-lg">📥 Exportar Master</button>
    </header>

    <section id="view-home" class="h-[calc(100vh-65px)] bg-premium py-10 px-6 overflow-y-auto w-full">
        <h2 class="text-5xl md:text-7xl font-black italic mb-2 uppercase text-center text-white tracking-tighter">J&J PREMIUM</h2>
        <p class="text-zinc-500 font-bold uppercase text-[9px] tracking-[0.4em] mb-12 italic text-center">Suite de Ingeniería Textil</p>
        
        <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-4 w-full max-w-7xl mb-12">
            <div onclick="initTool('vector')" class="bg-black/40 p-8 rounded-3xl border border-yellow-600/20 cursor-pointer hover:border-yellow-500 text-center transition-all">
                <div class="text-4xl font-black text-yellow-500 mb-2">SVG</div>
                <h3 class="font-black uppercase text-xl italic text-white">Vector Pro</h3>
            </div>
            <div onclick="initTool('color')" class="bg-black/40 p-8 rounded-3xl border border-white/5 cursor-pointer hover:border-red-600 text-center transition-all">
                <div class="text-4xl font-black text-blue-500 mb-2">HEX</div>
                <h3 class="font-black uppercase text-xl italic text-white">Extract Tintas</h3>
            </div>
            <div onclick="initTool('bg')" class="bg-black/40 p-8 rounded-3xl border border-white/5 cursor-pointer hover:border-red-600 text-center transition-all">
                <div class="text-4xl font-black text-red-600 mb-2">PNG</div>
                <h3 class="font-black uppercase text-xl italic text-white">Quitar Fondo</h3>
            </div>
            <div onclick="initTool('ia')" class="bg-black/40 p-8 rounded-3xl border border-white/5 cursor-pointer hover:border-red-600 text-center transition-all">
                <div class="text-4xl font-black text-white mb-2">IA+</div>
                <h3 class="font-black uppercase text-xl italic text-white">Mejorador HD</h3>
            </div>
        </div>

        <div class="grid grid-cols-1 md:grid-cols-2 gap-4 w-full max-w-2xl pb-10">
            <a href="https://wa.me/51916689969" target="_blank" class="bg-white/5 p-6 rounded-2xl border border-white/10 flex items-center justify-between text-white hover:bg-green-600/20 transition-all">
                <div class="flex flex-col">
                    <span class="font-black uppercase italic text-lg">Suscribirme VIP</span>
                    <span class="text-[9px] text-zinc-500 font-bold uppercase tracking-widest">Acceso Ilimitado</span>
                </div>
                <span class="text-2xl">➔</span>
            </a>
            <a href="https://wa.me/51904503246" target="_blank" class="bg-white/5 p-6 rounded-2xl border border-white/10 flex items-center justify-between text-white hover:bg-red-600/20 transition-all">
                <div class="flex flex-col">
                    <span class="font-black uppercase italic text-lg text-red-500">Renovar Plan</span>
                    <span class="text-[9px] text-zinc-500 font-bold uppercase tracking-widest">Soporte Directo</span>
                </div>
                <span class="text-2xl">➔</span>
            </a>
        </div>
    </section>

    <section id="view-tool" class="tool-view">
        <main class="viewport" id="viewport">
            <div id="zoom-container"><canvas id="canvas"></canvas></div>
        </main>
        <aside class="sidebar">
            <button onclick="location.reload()" class="bg-zinc-900 text-red-500 font-black py-4 rounded-xl text-[10px] uppercase border border-red-900/20 w-full">← Volver al Menú</button>
            <div class="card"><input type="file" id="upload" class="text-[10px] w-full text-zinc-500" accept="image/*"/></div>

            <div id="panel-vector" class="hidden space-y-4">
                <div class="card border-yellow-600/30">
                    <button onclick="runVectorization()" class="btn-jj bg-yellow-600 text-black text-[11px]">Trazar Curvas Bézier</button>
                    <p id="vector-status" class="text-[9px] text-zinc-500 text-center mt-2 uppercase font-black">Estado: Listo</p>
                </div>
            </div>

            <div id="panel-color" class="hidden space-y-4">
                <div class="card border-blue-600/30">
                    <button onclick="manualScan()" class="w-full py-2 bg-zinc-800 text-[9px] font-black rounded mb-2">Escanear Diseño</button>
                    <div id="design-palette" class="flex flex-wrap gap-2 justify-center mb-2"></div>
                    <input type="color" id="custom-picker" class="w-full h-10 bg-transparent border-none p-0 cursor-pointer">
                    <button onclick="applyColor()" class="btn-jj text-[10px] mt-2">Reemplazar Color</button>
                </div>
            </div>

            <div id="panel-bg" class="hidden space-y-4">
                <div class="card border-red-600/30">
                    <p class="text-[9px] text-zinc-500 mb-2 uppercase font-black">Tolerancia de Borrado</p>
                    <input type="range" id="bg-tolerance" min="1" max="150" value="40" class="w-full accent-red-600">
                    <button onclick="removeBG()" class="btn-jj text-[10px] mt-4">Eliminar Fondo Blanco</button>
                </div>
            </div>

            <div id="panel-ia" class="hidden space-y-4">
                <div class="card border-white/20">
                    <button onclick="upscaleIA()" class="btn-jj bg-white text-black text-[11px]">Super Resolución x2</button>
                </div>
            </div>
            
            <button onclick="resetCanvas()" class="w-full py-3 bg-zinc-900 text-yellow-500 font-black rounded-xl text-[10px] uppercase mt-auto">Limpiar Cambios</button>
        </aside>
    </section>

    <div id="export-modal" class="fixed inset-0 bg-black/95 z-[5000] hidden flex-col items-center justify-center p-6">
        <div class="bg-[#111] border border-red-600 p-8 rounded-3xl w-full max-w-md">
            <h3 class="text-red-600 font-black text-center mb-6 text-xl uppercase italic underline">Descarga Final</h3>
            <div class="space-y-4">
                <button onclick="downloadSVG()" id="dl-svg-btn" class="w-full p-4 bg-zinc-900 border border-yellow-600/30 rounded-xl flex justify-between items-center opacity-50 cursor-not-allowed">
                    <span class="text-yellow-500 font-black uppercase text-xs">Archivo SVG (Vector)</span>
                    <span>📥</span>
                </button>
                <button onclick="downloadPNG()" class="w-full p-4 bg-zinc-900 border border-white/10 rounded-xl flex justify-between items-center">
                    <span class="text-white font-black uppercase text-xs">Archivo PNG (Alta Res)</span>
                    <span>📥</span>
                </button>
            </div>
            <button onclick="closeExport()" class="w-full mt-6 py-2 text-zinc-600 font-black uppercase text-[10px]">Cerrar</button>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('canvas'), ctx = canvas.getContext('2d', { willReadFrequently: true });
        const viewport = document.getElementById('viewport'), zoomContainer = document.getElementById('zoom-container');
        const upload = document.getElementById('upload'), loader = document.getElementById('loader-vector');
        let originalImg = null, currentSVG = null, scale = 1, posX = 0, posY = 0, isPanning = false, startX, startY;

        // INICIAR HERRAMIENTAS
        function initTool(tool) {
            document.getElementById('view-home').style.display = 'none';
            document.getElementById('view-tool').classList.add('active-tool-view');
            document.getElementById('btn-top-dl').style.display = 'block';

            // Ocultar todos los paneles
            ['panel-vector', 'panel-color', 'panel-bg', 'panel-ia'].forEach(id => {
                document.getElementById(id).classList.add('hidden');
            });
            // Mostrar el elegido
            document.getElementById('panel-' + tool).classList.remove('hidden');
        }

        // CARGA DE IMAGEN
        upload.onchange = (e) => {
            const reader = new FileReader();
            reader.onload = (ev) => {
                const img = new Image();
                img.onload = () => {
                    canvas.width = img.width; canvas.height = img.height;
                    ctx.drawImage(img, 0, 0); 
                    originalImg = img;
                    scale = 0.5; posX = 0; posY = 0; updateTransform();
                };
                img.src = ev.target.result;
            };
            reader.readAsDataURL(e.target.files[0]);
        };

        // VECTORIZACIÓN
        function runVectorization() {
            if(!originalImg) return;
            loader.style.display = 'flex';
            setTimeout(() => {
                ImageTracer.imageToSVG(canvas.toDataURL(), (svgstr) => {
                    currentSVG = svgstr;
                    loader.style.display = 'none';
                    document.getElementById('vector-status').innerText = "VECTORES LISTOS ✅";
                    document.getElementById('dl-svg-btn').classList.remove('opacity-50', 'cursor-not-allowed');
                    alert("Diseño convertido a curvas.");
                }, { ltres: 1, qtres: 1, pathomit: 8 });
            }, 100);
        }

        // FUNCIONES DE EDICIÓN
        function removeBG() {
            const tol = document.getElementById('bg-tolerance').value;
            const id = ctx.getImageData(0,0,canvas.width,canvas.height);
            const d = id.data;
            for(let i=0; i<d.length; i+=4) {
                if(d[i] > 255 - tol && d[i+1] > 255 - tol && d[i+2] > 255 - tol) d[i+3] = 0;
            }
            ctx.putImageData(id, 0, 0);
        }

        function upscaleIA() {
            const temp = document.createElement('canvas');
            temp.width = canvas.width * 2; temp.height = canvas.height * 2;
            temp.getContext('2d').drawImage(canvas, 0, 0, temp.width, temp.height);
            canvas.width = temp.width; canvas.height = temp.height;
            ctx.drawImage(temp, 0, 0);
            updateTransform();
        }

        // NAVEGACIÓN Y EXPORTACIÓN
        function openExport() { document.getElementById('export-modal').style.display = 'flex'; }
        function closeExport() { document.getElementById('export-modal').style.display = 'none'; }
        function downloadSVG() {
            if(!currentSVG) return;
            const blob = new Blob([currentSVG], {type: 'image/svg+xml'});
            const a = document.createElement('a');
            a.download = "JJ_DISEÑO.svg"; a.href = URL.createObjectURL(blob); a.click();
        }
        function downloadPNG() {
            const a = document.createElement('a');
            a.download = "JJ_DISEÑO_300DPI.png"; a.href = canvas.toDataURL(); a.click();
        }

        // ZOOM Y PAN
        viewport.onwheel = (e) => { e.preventDefault(); scale = Math.max(0.1, scale * (e.deltaY > 0 ? 0.9 : 1.1)); updateTransform(); };
        viewport.onmousedown = (e) => { isPanning = true; startX = e.clientX - posX; startY = e.clientY - posY; };
        window.onmousemove = (e) => { if(isPanning) { posX = e.clientX - startX; posY = e.clientY - startY; updateTransform(); } };
        window.onmouseup = () => isPanning = false;
        function updateTransform() { zoomContainer.style.transform = `translate(${posX}px, ${posY}px) scale(${scale})`; }
        function resetCanvas() { if(originalImg) { canvas.width = originalImg.width; canvas.height = originalImg.height; ctx.drawImage(originalImg,0,0); } }
    </script>
</body>
</html>
